.pcw-input{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 9px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;color:#1e293b;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;box-sizing:border-box;}
.pcw-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.pcw-pct{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:10px;color:#94a3b8;pointer-events:none;}
.pcw-btn-primary{background:#2563eb;color:#fff;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:background .15s;font-family:'IBM Plex Sans',sans-serif;}
.pcw-btn-primary:hover{background:#1d4ed8;}
.pcw-btn-primary:disabled{background:#93c5fd;cursor:not-allowed;}
.pcw-btn-secondary{background:#fff;color:#374151;border:1px solid #e2e8f0;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:border-color .15s,color .15s;font-family:'IBM Plex Sans',sans-serif;}
.pcw-btn-secondary:hover{border-color:#3b82f6;color:#2563eb;}
.pcw-btn-secondary:disabled{opacity:.4;cursor:not-allowed;}
.pcw-bu-btn{flex:1;padding:6px;border-radius:6px;font-size:12px;font-weight:700;border:1.5px solid #e2e8f0;cursor:pointer;background:#fff;color:#475569;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
.pcw-bu-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.pcw-bu-btn:hover:not(.active){border-color:#93c5fd;}
.pcw-ccy-btn{flex:1;padding:7px;border-radius:6px;font-size:12px;font-weight:700;border:1.5px solid #e2e8f0;cursor:pointer;background:#fff;color:#475569;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
.pcw-ccy-btn.active{background:#1e40af;color:#fff;border-color:#1e40af;}
.pcw-ccy-btn:hover:not(.active){border-color:#93c5fd;}
.pcw-table-wrap{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:auto;max-height:calc(100vh - 220px);scrollbar-gutter:stable;}
.pcw-table{width:100%;border-collapse:collapse;table-layout:auto;}
.pcw-table th,.pcw-table td{white-space:nowrap;}
.pcw-tr-head{background:#0f172a;position:sticky;top:0;z-index:11;}
.pcw-row-d0 .pcw-td-sticky-left,.pcw-row-d0 .pcw-td-sticky-left-2{background:#fff;}
.pcw-row-d1 .pcw-td-sticky-left,.pcw-row-d1 .pcw-td-sticky-left-2{background:#f8fafc;}
.pcw-row-d2 .pcw-td-sticky-left,.pcw-row-d2 .pcw-td-sticky-left-2{background:#f0f4ff;}
.pcw-row-d3 .pcw-td-sticky-left,.pcw-row-d3 .pcw-td-sticky-left-2{background:#f5f0ff;}
.pcw-th{padding:9px 8px;font-size:9px;font-weight:700;letter-spacing:.07em;color:#94a3b8;text-transform:uppercase;white-space:nowrap;position:sticky!important;top:0!important;z-index:10;background:#0f172a;user-select:none;cursor:grab;}
.pcw-th .pcw-resize-handle{cursor:col-resize;}
.pcw-th-sticky-left{left:0;z-index:11!important;}
.pcw-td-sticky-left{position:sticky;left:0;z-index:8;background:inherit;}
.pcw-th-sticky-left-2{left:40px;z-index:11!important;}
.pcw-td-sticky-left-2{position:sticky;left:40px;z-index:8;background:inherit;}
.pcw-row:hover{background:#fefce8!important;}
.pcw-row:hover .pcw-td-sticky-left,.pcw-row:hover .pcw-td-sticky-left-2{background:#fefce8!important;}
.pcw-ci{background:transparent;border:none;font-size:12px;color:#1e293b;outline:none;border-radius:4px;padding:2px 4px;font-family:'IBM Plex Sans',sans-serif;transition:box-shadow .15s,background .15s;width:100%;box-sizing:border-box;}
.pcw-ci:focus{box-shadow:0 0 0 2px rgba(59,130,246,.25);background:#eff6ff;}
input:focus[data-cell],select:focus[data-cell]{box-shadow:0 0 0 2px rgba(59,130,246,.4)!important;background:#dbeafe!important;}
.pcw-ms{background:transparent;border:none;font-size:11px;color:#64748b;outline:none;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;max-width:100%;}
.pcw-badge-bom{font-size:8px;background:#dbeafe;color:#1d4ed8;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:.04em;white-space:nowrap;}
.pcw-manual-price{background:#fef3c7!important;color:#92400e!important;border-color:#fbbf24!important;}
[data-theme="dark"] .pcw-manual-price{background:#78350f!important;color:#fde68a!important;border-color:#d97706!important;}
.pcw-badge-est{font-size:8px;background:#fef3c7;color:#92400e;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.04em;white-space:nowrap;cursor:help;border:1px solid #fde68a;}
[data-theme="dark"] .pcw-badge-est{background:#451a03;color:#fbbf24;border-color:#78350f;}
.pcw-btn-sub{font-size:9px;background:#f0fdf4;color:#166534;border:1px solid #86efac;border-radius:4px;padding:1px 5px;cursor:pointer;white-space:nowrap;}
.pcw-btn-rm{font-size:9px;background:#fff1f2;color:#be123c;border:1px solid #fda4af;border-radius:4px;padding:1px 5px;cursor:pointer;}
.pcw-btn-note{font-size:11px;background:#fffbeb;color:#92400e;border:1px solid #fde68a;border-radius:4px;padding:1px 5px;cursor:pointer;transition:all .15s;}
.pcw-btn-quotes{font-size:9px;background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;border-radius:4px;padding:1px 5px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.pcw-btn-quotes.has-quotes{background:#e0f2fe;border-color:#38bdf8;color:#0c4a6e;font-weight:600;}
.pcw-btn-quotes:hover{background:#bae6fd;}
.pcw-btn-note.has-note{background:#fef3c7;border-color:#f59e0b;color:#b45309;}
.pcw-btn-note:hover{background:#fde68a;}
.pcw-notes-input{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:11px;font-family:'IBM Plex Sans',sans-serif;color:#475569;background:#fefce8;outline:none;resize:vertical;transition:border-color .15s;}
.pcw-notes-input:focus{border-color:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.12);}
.pcw-heading-row{background:#f1f5f9;border-bottom:1px solid #e2e8f0;}
.pcw-heading-tag{font-size:11px;font-weight:700;color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:4px;padding:1px 6px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
.pcw-heading-input{background:transparent;border:none;font-size:12px;font-weight:600;color:#374151;outline:none;font-family:'IBM Plex Sans',sans-serif;letter-spacing:.02em;width:100%;}
.pcw-heading-input::placeholder{color:#94a3b8;font-weight:400;}
.pcw-heading-input:focus{outline:1px solid #ddd6fe;border-radius:4px;}
[data-theme="dark"] .pcw-heading-row{background:#161f30;border-bottom-color:#334155;}
[data-theme="dark"] .pcw-heading-tag{color:#a78bfa;background:#2e1065;border-color:#4c1d95;}
[data-theme="dark"] .pcw-heading-input{color:#c4b5fd;}
[data-theme="dark"] .pcw-heading-input::placeholder{color:#4b5563;}
.pcw-row-d0{background:#fff;}
.pcw-row-d1{background:#f8fafc;}
.pcw-row-d2{background:#f0f4ff;}
.pcw-row-d3{background:#f5f0ff;}
[data-theme="dark"] .pcw-row-d0{background:#1e293b;}
[data-theme="dark"] .pcw-row-d1{background:#1a2438;}
[data-theme="dark"] .pcw-row-d2{background:#1a1f38;}
[data-theme="dark"] .pcw-row-d3{background:#1e1a33;}
/* ── Table display options ───────────────────────────────── */
.pcw-table-gridlines .pcw-table td,.pcw-table-gridlines .pcw-table th{border:1px solid #e2e8f0;}
[data-theme="dark"] .pcw-table-gridlines .pcw-table td,[data-theme="dark"] .pcw-table-gridlines .pcw-table th{border-color:#334155;}
.pcw-table-density-compact .pcw-table td,.pcw-table-density-compact .pcw-table th{padding-top:2px!important;padding-bottom:2px!important;}
.pcw-table-density-comfortable .pcw-table td,.pcw-table-density-comfortable .pcw-table th{padding-top:7px!important;padding-bottom:7px!important;}
.pcw-dup-input{border-color:#fbbf24 !important;background:#fffbeb !important;}
@keyframes pcw-flash{0%{background:inherit;}10%{background:#fde047 !important;}60%{background:#fde047 !important;}100%{background:inherit;}}
.pcw-flash-row{animation:pcw-flash 2s ease;}
[data-theme="dark"] .pcw-dup-input{border-color:#b45309 !important;background:#451a03 !important;}
.pcw-pricelist-tag{font-size:8px;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;border-radius:3px;padding:1px 4px;font-weight:700;white-space:nowrap;letter-spacing:.04em;}
.pcw-empty{text-align:center;padding:48px;color:#94a3b8;font-size:13px;}
.pcw-hint{font-size:11px;color:#94a3b8;background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:5px 10px;}
.pcw-info-box{font-size:11px;padding:8px 10px;border-radius:8px;border:1px solid;line-height:1.5;}
.pcw-cit-notice{font-size:11px;color:#991b1b;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:4px 8px;margin-top:6px;font-weight:500;}
.pcw-hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 55%,#1d4ed8 100%);color:#fff;border-radius:14px;padding:22px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;box-shadow:0 4px 24px rgba(15,23,42,.4);}
.pcw-hero-meta{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#93c5fd;margin-bottom:4px;}
.pcw-hero-title{font-size:20px;font-weight:700;margin-bottom:3px;}
.pcw-hero-sub{font-size:12px;color:#94a3b8;}
.pcw-hero-total{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:30px;color:#fbbf24;}
.pcw-pill{font-size:10px;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:20px;color:#cbd5e1;}
.pcw-stat-lbl{font-size:10px;color:#64748b;margin-bottom:3px;font-weight:500;}
.pcw-stat-val{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;color:#1e293b;}
.pcw-stat-sub{font-size:10px;color:#94a3b8;margin-top:2px;}
.pcw-kpi-dark{background:#0f172a;border-color:#334155;}
.pcw-kpi-dark .pcw-stat-lbl{color:#94a3b8;}
.pcw-kpi-dark .pcw-stat-sub{color:#64748b;}
.pcw-sp-badge{display:inline-block;margin-left:8px;font-size:9px;font-weight:700;letter-spacing:.05em;background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:4px;padding:1px 6px;vertical-align:middle;text-transform:uppercase;}
.pcw-btn-sp{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;transition:background .15s;}
.pcw-btn-sp:hover{background:#1d4ed8;}
.pcw-btn-sp:disabled{background:#93c5fd;cursor:not-allowed;}
.pcw-btn-history{font-size:10px;background:#fff;border:1px solid #e2e8f0;border-radius:4px;padding:1px 4px;cursor:pointer;transition:all .15s;line-height:1.4;}
.pcw-btn-history:hover{border-color:#f59e0b;background:#fffbeb;}
.pcw-btn-cost-history{font-size:10px;background:#fff;border:1px solid #e2e8f0;border-radius:4px;padding:1px 4px;cursor:pointer;transition:all .15s;line-height:1.4;}
.pcw-btn-cost-history:hover{border-color:#2563eb;background:#eff6ff;}
.pcw-status-quoted{font-size:9px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:4px;padding:1px 6px;font-weight:600;}
.pcw-status-purchased{font-size:9px;background:#f0fdf4;color:#166534;border:1px solid #86efac;border-radius:4px;padding:1px 6px;font-weight:600;}
.pcw-sp-results{border:1px solid #bfdbfe;border-radius:8px;overflow:hidden;margin-top:4px;box-shadow:0 4px 12px rgba(37,99,235,.1);max-height:220px;overflow-y:auto;}
.pcw-sp-result-row{padding:8px 12px;cursor:pointer;border-bottom:1px solid #eff6ff;transition:background .1s;}
.pcw-sp-result-row:last-child{border-bottom:none;}
.pcw-sp-result-row:hover{background:#eff6ff;}
.pcw-sp-result-name{color:#1e293b;}
.pcw-sp-result-details{color:#64748b;}
[data-theme="dark"] .pcw-sp-results{border-color:#334155;background:#1e293b;}
[data-theme="dark"] .pcw-sp-result-row{border-bottom-color:#334155;}
[data-theme="dark"] .pcw-sp-result-row:hover{background:#0f172a;}
[data-theme="dark"] .pcw-sp-result-name{color:#e2e8f0;}
[data-theme="dark"] .pcw-sp-result-details{color:#94a3b8;}
.pcw-drag-handle{color:#94a3b8;font-size:11px;cursor:grab;user-select:none;margin-right:4px;line-height:1;}
.pcw-drag-handle:active{cursor:grabbing;}
tr[draggable="true"]:active{cursor:grabbing;}
.pcw-resize-handle{position:absolute;top:0;right:0;width:10px;height:100%;cursor:col-resize;z-index:20;background:transparent;transition:background .15s;display:flex;align-items:center;justify-content:center;}
.pcw-resize-handle::after{content:'';position:absolute;top:15%;right:3px;width:3px;height:70%;background:rgba(148,163,184,.4);border-radius:2px;transition:all .15s;}
.pcw-resize-handle:hover{background:rgba(37,99,235,.12);}
.pcw-resize-handle:hover::after{background:#3b82f6;width:3px;box-shadow:0 0 4px rgba(59,130,246,.5);}
.pcw-th-resizable{position:relative;user-select:none;cursor:grab;}
.pcw-th-resizable:active{cursor:grabbing;}
.pcw-th-resizable:hover .pcw-resize-handle::after{background:rgba(148,163,184,.7);}
.pcw-input-invalid{border-color:#ef4444 !important;background:#fef2f2 !important;}
.pcw-input-invalid:focus{box-shadow:0 0 0 2px rgba(239,68,68,.12) !important;}
`;

 const root = ReactDOM.createRoot(document.getElementById('root'));
 root.render(<PartsWorksheet />);
 // Dismiss skeleton once React has painted its first frame
 requestAnimationFrame(() => requestAnimationFrame(() => {
  const sk = document.getElementById('pcw-skeleton');
  if (sk) sk.classList.add('hidden');
 }));
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('[PCW] SW registration failed:', err));
  });
}
</script>
