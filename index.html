  <script>
/* ═══ COSTING ENGINE & CONSTANTS (no JSX) ══════════════════════════════════ */
/* Everything below is pure JS — no Babel/JSX needed, no size limit applies. */
/* React components start in the <script type="text/babel"> block below.     */

const PCW_VERSION = 'v0.7';

const sanitizeHTML = (val) => {
if (val === null || val === undefined) return '';
return String(val)
 .replace(/&/g, '&amp;')
 .replace(/</g, '&lt;')
 .replace(/>/g, '&gt;')
 .replace(/"/g, '&quot;')
 .replace(/'/g, '&#x27;');
};

const sha256 = async (str) => {
const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
};

// Compute a deterministic state hash for approval integrity checking.
// We hash: items costs/margins, grand total, revision — enough to detect tampering.
const computeApprovalHash = async (proj, items, grand) => {
const payload = JSON.stringify({
 rev: proj.rev,
 sellCcy: proj.sellCcy,
 grand: Math.round(grand * 100), // cents to avoid float noise
 items: items
  .filter(i => i.type !== 'heading')
  .map(i => ({ id: i.id, pn: i.partNumber, qty: i.qty, cost: i.unitCost, margin: i.margin, contingency: i.contingency }))
  .sort((a,b) => a.id.localeCompare(b.id)),
});
return sha256(payload);
};

// Returns 'match' | 'mismatch' | 'pending' given an approval record and current state.
// 'pending' means we haven't computed yet (async).
const checkApprovalIntegrity = async (approval, proj, items, grand) => {
if (!approval.stateHash) return 'no-hash';
const current = await computeApprovalHash(proj, items, grand);
return current === approval.stateHash ? 'match' : 'mismatch';
};

const SCHEMA_VERSION = 2;

const MIGRATIONS = {
0: (data) => ({
 ...data,
 project: {
 ...data.project,
 sAndAExpense:       data.project?.sAndAExpense       ?? 10,
 insideSales:        data.project?.insideSales        ?? '',
 outsideSales:       data.project?.outsideSales       ?? '',
 freightPaymentTerm: data.project?.freightPaymentTerm ?? '',
 locked:             data.project?.locked             ?? false,
 },
}),
1: (data) => ({
 ...data,
 project: {
 ...data.project,
 approvals: data.project?.approvals ?? [],
 },
}),
};

const migrateData = (data) => {
let schemaVer = typeof data.schemaVersion === 'number' ? data.schemaVersion : 0;
// Normalise key names — files saved with 'proj' key must be aliased to 'project'
// before migrations run, since migrations reference data.project
let d = data;
if (d.proj && !d.project) d = { ...d, project: d.proj };
if (d.frt && !d.freight) d = { ...d, freight: d.frt };
if (d.sched && !d.schedule) d = { ...d, schedule: d.sched };
while (schemaVer < SCHEMA_VERSION) {
 if (MIGRATIONS[schemaVer]) d = MIGRATIONS[schemaVer](d);
 schemaVer++;
}
// Re-normalise back to short keys after migration
return { ...d, schemaVersion: SCHEMA_VERSION };
};

const validateLoadedData = (data) => {
const errors = [];
if (!data || typeof data !== 'object') { errors.push('File is not a valid JSON object'); return errors; }
if (!data.project || typeof data.project !== 'object') errors.push('Missing or invalid project data');
if (!Array.isArray(data.items)) errors.push('Missing or invalid items list');
if (data.project) {
 if (data.project.name !== undefined && typeof data.project.name !== 'string') errors.push('Project name must be a string');
 if (data.project.sellCcy && typeof data.project.sellCcy !== 'string') errors.push('Invalid selling currency');
 if (data.project.defaultMargin !== undefined && isNaN(Number(data.project.defaultMargin))) errors.push('Default margin must be a number');
}
if (Array.isArray(data.items)) {
 data.items.forEach((item, i) => {
 if (!item.id)   errors.push(`Item ${i+1}: missing id`);
 if (!item.type) errors.push(`Item ${i+1}: missing type`);
 if (item.qty !== undefined && isNaN(Number(item.qty))) errors.push(`Item ${i+1}: qty must be a number`);
 if (item.unitCost !== undefined && isNaN(Number(item.unitCost))) errors.push(`Item ${i+1}: unitCost must be a number`);
 });
}
return errors;
};

const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext, memo, startTransition } = React;

const CURRENCIES   = ["USD","GBP","EUR","ARS","BRL"];
const BE_EMPTY_DEF = {margin:'',contingency:'',discount:'',tariff:'',unitCost:'',supplier:'',ccy:'',source:'',leadTime:'',imported:'',afrmm:''};
const BZ_EMPTY_DEF = {ncm:'',ii:'',ipi:'',pis:'',cofins:'',icmsBase:'',icms:''};
const BUS          = ["CIW","ECL","CIT","CIA"];

const calcICMSRate = (originState, destState) => {
if (!originState || !destState) return 18; // default
if (originState === destState) {
 return BR_STATES[destState]?.intrastate || 18;
}

const origin = BR_STATES[originState];
const dest = BR_STATES[destState];
if (!origin || !dest) return 18;

const southSoutheast = ["South", "Southeast"];
const others = ["North", "Northeast", "Center-West"];

if (southSoutheast.includes(origin.region) && others.includes(dest.region)) {
 return 7; // South/Southeast → North/Northeast/Center-West
}
return 12; // All other interstate operations
};

function parseSalesforceLink(url) {
 if (!url || !url.trim()) return { type: null, id: null };
 // Lightning URL: /lightning/r/Opportunity/006.../view or /lightning/r/Case/500.../view
 const lightningMatch = url.match(/\/lightning\/r\/(Opportunity|Case)\/([a-zA-Z0-9]{15,18})/i);
 if (lightningMatch) return { type: lightningMatch[1], id: lightningMatch[2] };
 // Classic URL: salesforce.com/006... or salesforce.com/500...
 const classicMatch = url.match(/salesforce\.com\/([a-zA-Z0-9]{15,18})/i);
 if (classicMatch) {
  const id = classicMatch[1];
  if (id.startsWith('006')) return { type: 'Opportunity', id };
  if (id.startsWith('500')) return { type: 'Case', id };
 }
 // Any URL containing /Case/ or /Opportunity/
 if (/\/Opportunity\//i.test(url)) return { type: 'Opportunity', id: null };
 if (/\/Case\//i.test(url)) return { type: 'Case', id: null };
 return { type: null, id: null };
}

const conv = (amt,from,to,rates) => from===to ? amt : (amt/(rates[from]||1))*(rates[to]||1);

const applyMargins = (base,{margin=0,contingency=0,dealer=0,discountMitigation=0}) => {
let p=base;
if(margin>0&&margin<100)           p/=(1-margin/100);
if(contingency>0&&contingency<100) p/=(1-contingency/100);
if(dealer>0&&dealer<100)           p/=(1-dealer/100);
if(discountMitigation>0&&discountMitigation<100) p/=(1-discountMitigation/100);
return p;
};

const d=new Date(dateStr||Date.now());
d.setDate(d.getDate()+(parseInt(n)||0));
return d.toISOString().slice(0,10);

const calcSiscomex = (numImportedItems) => {
if (numImportedItems === 0) return 0;

const BASE_DI = 185.00; // Base declaration fee
let total = BASE_DI;

for (let i = 1; i <= numImportedItems; i++) {
 if (i === 1) {
 total += 29.50;
 } else if (i >= 2 && i <= 3) {
 total += 23.60;
 } else if (i >= 4 && i <= 10) {
 total += 17.70;
 } else if (i >= 11 && i <= 20) {
 total += 11.80;
 } else if (i >= 21 && i <= 50) {
 total += 5.90;
 } else { // 51+
 total += 2.95;
 }
}

return total;
};

const calcImportTax = (cogsBRL, customsCharges=9, ii=0) => {
const customs = cogsBRL * (customsCharges / 100);
const iiAmt = cogsBRL * (ii / 100);
return {
 customs,
 ii: iiAmt,
 total: customs + iiAmt
};
};

const calcSalesTax = (sellPriceBRL, tc={}) => {

const cfg = {...BR_DEFAULTS, ...tc};
const ipi_r    = (cfg.ipi    || 0) / 100;
const pis_r    = (cfg.pis    || 0) / 100;
const cofins_r = (cfg.cofins || 0) / 100;
const icms_f   = ((cfg.icms || 0) / 100) * ((cfg.icmsBase || 100) / 100);

const x     = 1 / (1 + ipi_r);                                 // 1/(1+IPI)
const denom = (x - icms_f) * (1 - pis_r - cofins_r);
if (denom <= 0) return { ipi: 0, pis: 0, cofins: 0, icms: 0, total: 0 };

const gross  = sellPriceBRL / denom;                            // grossPrice = net * markup
const B      = gross / (1 + ipi_r);                            // ex-IPI base
const TB     = B - gross * icms_f;                             // PIS/COFINS base

const ipi    = B  * ipi_r;
const pis    = TB * pis_r;
const cofins = TB * cofins_r;
const icms   = gross * icms_f;

return {
 ipi,
 pis,
 cofins,
 icms,
 total: ipi + pis + cofins + icms
};
};

const buildTree = flat => {
const map={};
flat.filter(i=>i.type!=="heading").forEach(i=>(map[i.id]={...i,_ch:[]}));
const roots=[];
flat.filter(i=>i.type!=="heading").forEach(i=>{
 if(i.parentId&&map[i.parentId]) map[i.parentId]._ch.push(map[i.id]);
 else roots.push(map[i.id]);
});
return roots;
};

const calcNode = (n, rates, sellCcy, opts={}) => {
const cv = (a,c) => conv(a, c||"USD", sellCcy, rates);

if (!n._ch.length) {
 const unitC = cv(n.unitCost||0, n.ccy);
 const totalCOGS = unitC * (n.qty||1);
 const importedSubCount = 0;
 const afrmmSubCount = 0;
 // Leaf node: critical path = its own lead time (supplier delivery time)
 const criticalPathDays = n.leadTimeOverride ?? (n.leadTime||0);
 return { ...n, _ch: [], unitC, totalCOGS, importedSubCount, afrmmSubCount, criticalPathDays };
}

const children = n._ch.map(c => calcNode(c, rates, sellCcy, opts));
const ownC = cv(n.unitCost||0, n.ccy);
const childSum = children.reduce((s,c) => s + c.totalCOGS, 0);
const totalCOGS = (childSum + ownC) * (n.qty||1);

const importedSubCount = children.reduce((s,c) =>
 s + (c.importedSubCount||0) + (c.imported ? 1 : 0), 0);
const afrmmSubCount = children.reduce((s,c) =>
 s + (c.afrmmSubCount||0) + (c.afrmm ? 1 : 0), 0);

// Parent critical path: children procured in parallel → max child path,
// then add own fabrication/assembly time (leadTime on the parent node).
// leadTimeOverride lets the user manually specify the total if the parallel
// assumption doesn't hold for a particular assembly.
const longestChildPath = Math.max(0, ...children.map(c => c.criticalPathDays||0));
const criticalPathDays = n.leadTimeOverride != null
 ? n.leadTimeOverride
 : longestChildPath + (n.leadTime||0);

return {
 ...n, _ch: children,
 unitC: totalCOGS / (n.qty||1),
 totalCOGS,
 importedSubCount,
 afrmmSubCount,
 criticalPathDays,
};
};

// Minimal IndexedDB helpers for storing/retrieving the file handle
// (localStorage can't store non-serialisable objects like FileSystemFileHandle)
const _idb = (() => {
 let _db = null;
 const open = () => new Promise((res, rej) => {
  if (_db) return res(_db);
  const req = indexedDB.open('pcw-store', 1);
  req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
  req.onsuccess = e => { _db = e.target.result; res(_db); };
  req.onerror = () => rej(req.error);
 });
 return {
  async get(key) {
   try {
   const db = await open();
   return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = () => res(req.result ?? null);
    req.onerror = () => rej(req.error);
   });
   } catch(e) { return null; }
  },
  async set(key, value) {
   try {
   const db = await open();
   return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    const req = tx.objectStore('kv').put(value, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
   });
   } catch(e) {}
  },
  async del(key) {
   try {
   const db = await open();
   return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    const req = tx.objectStore('kv').delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
   });
   } catch(e) {}
  },
 };
})();

function detectColIdx(headers, candidates) {
const lc = headers.map(h => (h||'').toString().toLowerCase().trim());
for (const c of candidates) {
 const i = lc.findIndex(h => h === c);
 if (i !== -1) return i;
}
for (const c of candidates) {
 const i = lc.findIndex(h => h.includes(c));
 if (i !== -1) return i;
}
return -1;
}

function buildColMap(headers, fieldDefs) {
const map = {};
for (const [field, candidates] of Object.entries(fieldDefs)) {
 map[field] = detectColIdx(headers, candidates);
}
return map;
}

function mapSheetRow(row, colMap) {
const out = {};
for (const [field, idx] of Object.entries(colMap)) {
 if (idx >= 0 && row[idx] !== undefined && row[idx] !== null && row[idx] !== '') {
 out[field] = row[idx];
 }
}
return out;
}

function fmtDate(v) {
if (!v) return '';
if (v instanceof Date) return v.toISOString().slice(0,10);
if (typeof v === 'number') {
 const d = new Date(Math.round((v - 25569) * 86400 * 1000));
 return d.toISOString().slice(0,10);
}
return v.toString().slice(0,10);
}

function parsePrice(v) {
if (v === null || v === undefined || v === '') return 0;
if (v instanceof Date) {
 if (v.getFullYear() < 1980) {
 const serial = Math.round((v.getTime() / 86400000) + 25569);
 return serial > 0 ? serial : 0;
 }
 return 0; // A real date in a price field — shouldn't happen, return 0
}
if (typeof v === 'string' && /^1[89]\d\d-\d\d-\d\d$/.test(v)) {
 const d = new Date(v);
 if (!isNaN(d) && d.getFullYear() < 1980) {
 const serial = Math.round((d.getTime() / 86400000) + 25569);
 return serial > 0 ? serial : 0;
 }
}
return parseFloat(v) || 0;
}

function matchSheet(wb, sheetKey) {
 const def  = FEED_SHEET_DEFS[sheetKey];
 const names = wb.SheetNames.map(n => n.toLowerCase().trim());
 for (const match of def.sheetMatch) {
 const idx = names.findIndex(n => n === match || n.includes(match));
 if (idx !== -1) return wb.SheetNames[idx];
 }
 return null; // sheet not found — caller must handle null
}

async function loadSheet(sheetKey, forceRefresh) {
 if (_cache[sheetKey] && !forceRefresh) return _cache[sheetKey];
 if (!_handle) return null;
 const wb = await readAllSheets();
 if (!wb) return null;
 const sheetName = matchSheet(wb, sheetKey);
 if (!sheetName) return null; // sheet not present in this workbook
 const ws        = wb.Sheets[sheetName];
 const rows      = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
 if (rows.length < 2) return [];
 const headers = rows[0].map(h => (h||'').toString());

 try {
 const hc = JSON.parse(localStorage.getItem('pcw-fs-headers') || '{}');
 const prevHeaders = hc[sheetKey];
 const headersChanged = prevHeaders && JSON.stringify(prevHeaders) !== JSON.stringify(headers);
 if (headersChanged) {
  const maps = getColMaps() || {};
  if (maps[sheetKey]) {
  delete maps[sheetKey];
  saveColMaps(maps);
  }
 }
 hc[sheetKey] = headers;
 localStorage.setItem('pcw-fs-headers', JSON.stringify(hc));
 } catch(e) {}

 const overrides = (getColMaps() || {})[sheetKey] || {};
 const autoDef   = buildColMap(headers, FEED_SHEET_DEFS[sheetKey].fields);
 const colMap    = {...autoDef, ...overrides};
 const data = rows.slice(1).map(row => mapSheetRow(row, colMap));
 _cache[sheetKey] = data;
 return data;
}

.pcw-mono{font-family:'IBM Plex Mono',monospace;}
.pcw-header{background:#0f172a;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.5);position:sticky;top:0;z-index:100;}
.pcw-logo{width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;letter-spacing:.04em;color:#fff;font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
.pcw-logo-title{font-weight:700;font-size:13px;}
.pcw-logo-sub{font-size:10px;color:#64748b;}
.pcw-header-total{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;color:#fbbf24;}
.pcw-nav{background:#fff;border-bottom:1px solid #e2e8f0;display:flex;padding:0 20px;overflow-x:auto;}
.pcw-tab{padding:10px 14px;font-size:12px;font-weight:500;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;color:#64748b;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s,border-color .15s;}
.pcw-tab:hover{color:#1e293b;}
.pcw-tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600;}
.pcw-tab-br{color:#dc2626!important;}
.pcw-tab-br.active{border-bottom-color:#dc2626!important;}
.pcw-main{padding:12px;max-width:1800px;margin:0 auto;min-height:calc(100vh - 100px);}
.pcw-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:14px;}
.pcw-h3{font-size:11px;font-weight:700;color:#374151;border-bottom:1px solid #f1f5f9;padding-bottom:7px;margin-bottom:12px;letter-spacing:.04em;text-transform:uppercase;}
.pcw-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.col-span-2{grid-column:span 2;}
.pcw-label{display:block;font-size:10px;font-weight:600;color:#64748b;margin-bottom:3px;letter-spacing:.04em;text-transform:uppercase;}
.pcw-input{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:6px 9px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;color:#1e293b;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;box-sizing:border-box;}
.pcw-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.pcw-pct{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:10px;color:#94a3b8;pointer-events:none;}
.pcw-btn-primary{background:#2563eb;color:#fff;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:background .15s;font-family:'IBM Plex Sans',sans-serif;}
.pcw-btn-primary:hover{background:#1d4ed8;}
.pcw-btn-primary:disabled{background:#93c5fd;cursor:not-allowed;}
.pcw-btn-secondary{background:#fff;color:#374151;border:1px solid #e2e8f0;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:border-color .15s,color .15s;font-family:'IBM Plex Sans',sans-serif;}
.pcw-btn-secondary:hover{border-color:#3b82f6;color:#2563eb;}
.pcw-btn-secondary:disabled{opacity:.4;cursor:not-allowed;}
.pcw-bu-btn{flex:1;padding:6px;border-radius:6px;font-size:12px;font-weight:700;border:1.5px solid #e2e8f0;cursor:pointer;background:#fff;color:#475569;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
.pcw-bu-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.pcw-bu-btn:hover:not(.active){border-color:#93c5fd;}
.pcw-ccy-btn{flex:1;padding:7px;border-radius:6px;font-size:12px;font-weight:700;border:1.5px solid #e2e8f0;cursor:pointer;background:#fff;color:#475569;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
.pcw-ccy-btn.active{background:#1e40af;color:#fff;border-color:#1e40af;}
.pcw-ccy-btn:hover:not(.active){border-color:#93c5fd;}
.pcw-table-wrap{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:auto;max-height:calc(100vh - 220px);scrollbar-gutter:stable;}
.pcw-table{width:100%;border-collapse:collapse;table-layout:auto;}
.pcw-table th,.pcw-table td{white-space:nowrap;}
.pcw-tr-head{background:#0f172a;position:sticky;top:0;z-index:11;}
.pcw-row-d0 .pcw-td-sticky-left,.pcw-row-d0 .pcw-td-sticky-left-2{background:#fff;}
.pcw-row-d1 .pcw-td-sticky-left,.pcw-row-d1 .pcw-td-sticky-left-2{background:#f8fafc;}
.pcw-row-d2 .pcw-td-sticky-left,.pcw-row-d2 .pcw-td-sticky-left-2{background:#f0f4ff;}
.pcw-row-d3 .pcw-td-sticky-left,.pcw-row-d3 .pcw-td-sticky-left-2{background:#f5f0ff;}
.pcw-th{padding:9px 8px;font-size:9px;font-weight:700;letter-spacing:.07em;color:#94a3b8;text-transform:uppercase;white-space:nowrap;position:sticky!important;top:0!important;z-index:10;background:#0f172a;user-select:none;cursor:grab;}
