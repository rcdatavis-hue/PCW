const sanitizeHTML = (val) => {
if (val === null || val === undefined) return '';
return String(val)
 .replace(/&/g, '&amp;')
 .replace(/</g, '&lt;')
 .replace(/>/g, '&gt;')
 .replace(/"/g, '&quot;')
 .replace(/'/g, '&#x27;');
};

const sha256 = async (str) => {
const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
};

// Compute a deterministic state hash for approval integrity checking.
// We hash: items costs/margins, grand total, revision — enough to detect tampering.
const computeApprovalHash = async (proj, items, grand) => {
const payload = JSON.stringify({
 rev: proj.rev,
 sellCcy: proj.sellCcy,
 grand: Math.round(grand * 100), // cents to avoid float noise
 items: items
  .filter(i => i.type !== 'heading')
  .map(i => ({ id: i.id, pn: i.partNumber, qty: i.qty, cost: i.unitCost, margin: i.margin, contingency: i.contingency }))
  .sort((a,b) => a.id.localeCompare(b.id)),
});
return sha256(payload);
};

// Returns 'match' | 'mismatch' | 'pending' given an approval record and current state.
// 'pending' means we haven't computed yet (async).
const checkApprovalIntegrity = async (approval, proj, items, grand) => {
if (!approval.stateHash) return 'no-hash';
const current = await computeApprovalHash(proj, items, grand);
return current === approval.stateHash ? 'match' : 'mismatch';
};

const SCHEMA_VERSION = 2;

const MIGRATIONS = {
0: (data) => ({
 ...data,
 project: {
 ...data.project,
 sAndAExpense:       data.project?.sAndAExpense       ?? 10,
 insideSales:        data.project?.insideSales        ?? '',
 outsideSales:       data.project?.outsideSales       ?? '',
 freightPaymentTerm: data.project?.freightPaymentTerm ?? '',
 locked:             data.project?.locked             ?? false,
 },
}),
1: (data) => ({
 ...data,
 project: {
 ...data.project,
 approvals: data.project?.approvals ?? [],
 },
}),
};

const migrateData = (data) => {
let schemaVer = typeof data.schemaVersion === 'number' ? data.schemaVersion : 0;
let d = data;
while (schemaVer < SCHEMA_VERSION) {
 if (MIGRATIONS[schemaVer]) d = MIGRATIONS[schemaVer](d);
 schemaVer++;
}
return { ...d, schemaVersion: SCHEMA_VERSION };
};

const validateLoadedData = (data) => {
const errors = [];
if (!data || typeof data !== 'object') { errors.push('File is not a valid JSON object'); return errors; }
if (!data.project || typeof data.project !== 'object') errors.push('Missing or invalid project data');
if (!Array.isArray(data.items)) errors.push('Missing or invalid items list');
if (data.project) {
 if (data.project.name !== undefined && typeof data.project.name !== 'string') errors.push('Project name must be a string');
 if (data.project.sellCcy && typeof data.project.sellCcy !== 'string') errors.push('Invalid selling currency');
 if (data.project.defaultMargin !== undefined && isNaN(Number(data.project.defaultMargin))) errors.push('Default margin must be a number');
}
if (Array.isArray(data.items)) {
 data.items.forEach((item, i) => {
 if (!item.id)   errors.push(`Item ${i+1}: missing id`);
 if (!item.type) errors.push(`Item ${i+1}: missing type`);
 if (item.qty !== undefined && isNaN(Number(item.qty))) errors.push(`Item ${i+1}: qty must be a number`);
 if (item.unitCost !== undefined && isNaN(Number(item.unitCost))) errors.push(`Item ${i+1}: unitCost must be a number`);
 });
}
return errors;
};

const calcICMSRate = (originState, destState) => {
if (!originState || !destState) return 18; // default
if (originState === destState) {
 return BR_STATES[destState]?.intrastate || 18;
}

const origin = BR_STATES[originState];
const dest = BR_STATES[destState];
if (!origin || !dest) return 18;

const southSoutheast = ["South", "Southeast"];
const others = ["North", "Northeast", "Center-West"];

if (southSoutheast.includes(origin.region) && others.includes(dest.region)) {
 return 7; // South/Southeast → North/Northeast/Center-West
}
return 12; // All other interstate operations
};

function parseSalesforceLink(url) {
 if (!url || !url.trim()) return { type: null, id: null };
 // Lightning URL: /lightning/r/Opportunity/006.../view or /lightning/r/Case/500.../view
 const lightningMatch = url.match(/\/lightning\/r\/(Opportunity|Case)\/([a-zA-Z0-9]{15,18})/i);
 if (lightningMatch) return { type: lightningMatch[1], id: lightningMatch[2] };
 // Classic URL: salesforce.com/006... or salesforce.com/500...
 const classicMatch = url.match(/salesforce\.com\/([a-zA-Z0-9]{15,18})/i);
 if (classicMatch) {
  const id = classicMatch[1];
  if (id.startsWith('006')) return { type: 'Opportunity', id };
  if (id.startsWith('500')) return { type: 'Case', id };
 }
 // Any URL containing /Case/ or /Opportunity/
 if (/\/Opportunity\//i.test(url)) return { type: 'Opportunity', id: null };
 if (/\/Case\//i.test(url)) return { type: 'Case', id: null };
 return { type: null, id: null };
}

const conv = (amt,from,to,rates) => from===to ? amt : (amt/(rates[from]||1))*(rates[to]||1);

const applyMargins = (base,{margin=0,contingency=0,dealer=0,discountMitigation=0}) => {
let p=base;
if(margin>0&&margin<100)           p/=(1-margin/100);
if(contingency>0&&contingency<100) p/=(1-contingency/100);
if(dealer>0&&dealer<100)           p/=(1-dealer/100);
if(discountMitigation>0&&discountMitigation<100) p/=(1-discountMitigation/100);
return p;
};

const calcSiscomex = (numImportedItems) => {
if (numImportedItems === 0) return 0;

const BASE_DI = 185.00; // Base declaration fee
let total = BASE_DI;

for (let i = 1; i <= numImportedItems; i++) {
 if (i === 1) {
 total += 29.50;
 } else if (i >= 2 && i <= 3) {
 total += 23.60;
 } else if (i >= 4 && i <= 10) {
 total += 17.70;
 } else if (i >= 11 && i <= 20) {
 total += 11.80;
 } else if (i >= 21 && i <= 50) {
 total += 5.90;
 } else { // 51+
 total += 2.95;
 }
}

return total;
};

const calcImportTax = (cogsBRL, customsCharges=9, ii=0) => {
const customs = cogsBRL * (customsCharges / 100);
const iiAmt = cogsBRL * (ii / 100);
return {
 customs,
 ii: iiAmt,
 total: customs + iiAmt
};
};

const calcSalesTax = (sellPriceBRL, tc={}) => {

const cfg = {...BR_DEFAULTS, ...tc};
const ipi_r    = (cfg.ipi    || 0) / 100;
const pis_r    = (cfg.pis    || 0) / 100;
const cofins_r = (cfg.cofins || 0) / 100;
const icms_f   = ((cfg.icms || 0) / 100) * ((cfg.icmsBase || 100) / 100);

const x     = 1 / (1 + ipi_r);                                 // 1/(1+IPI)
const denom = (x - icms_f) * (1 - pis_r - cofins_r);
if (denom <= 0) return { ipi: 0, pis: 0, cofins: 0, icms: 0, total: 0 };

const gross  = sellPriceBRL / denom;                            // grossPrice = net * markup
const B      = gross / (1 + ipi_r);                            // ex-IPI base
const TB     = B - gross * icms_f;                             // PIS/COFINS base

const ipi    = B  * ipi_r;
const pis    = TB * pis_r;
const cofins = TB * cofins_r;
const icms   = gross * icms_f;

return {
 ipi,
 pis,
 cofins,
 icms,
 total: ipi + pis + cofins + icms
};
};

const buildTree = flat => {
const map={};
flat.filter(i=>i.type!=="heading").forEach(i=>(map[i.id]={...i,_ch:[]}));
const roots=[];
flat.filter(i=>i.type!=="heading").forEach(i=>{
 if(i.parentId&&map[i.parentId]) map[i.parentId]._ch.push(map[i.id]);
 else roots.push(map[i.id]);
});
return roots;
};

const calcNode = (n, rates, sellCcy, opts={}) => {
const cv = (a,c) => conv(a, c||"USD", sellCcy, rates);

if (!n._ch.length) {
 const unitC = cv(n.unitCost||0, n.ccy);
 const totalCOGS = unitC * (n.qty||1);
 const importedSubCount = 0;
 const afrmmSubCount = 0;
 // Leaf node: critical path = its own lead time (supplier delivery time)
 const criticalPathDays = n.leadTimeOverride ?? (n.leadTime||0);
 return { ...n, _ch: [], unitC, totalCOGS, importedSubCount, afrmmSubCount, criticalPathDays };
}

const children = n._ch.map(c => calcNode(c, rates, sellCcy, opts));
const ownC = cv(n.unitCost||0, n.ccy);
const childSum = children.reduce((s,c) => s + c.totalCOGS, 0);
const totalCOGS = (childSum + ownC) * (n.qty||1);

const importedSubCount = children.reduce((s,c) =>
 s + (c.importedSubCount||0) + (c.imported ? 1 : 0), 0);
const afrmmSubCount = children.reduce((s,c) =>
 s + (c.afrmmSubCount||0) + (c.afrmm ? 1 : 0), 0);

// Parent critical path: children procured in parallel → max child path,
// then add own fabrication/assembly time (leadTime on the parent node).
// leadTimeOverride lets the user manually specify the total if the parallel
// assumption doesn't hold for a particular assembly.
const longestChildPath = Math.max(0, ...children.map(c => c.criticalPathDays||0));
const criticalPathDays = n.leadTimeOverride != null
 ? n.leadTimeOverride
 : longestChildPath + (n.leadTime||0);

return {
 ...n, _ch: children,
 unitC: totalCOGS / (n.qty||1),
 totalCOGS,
 importedSubCount,
 afrmmSubCount,
 criticalPathDays,
};
};

// Minimal IndexedDB helpers for storing/retrieving the file handle
// (localStorage can't store non-serialisable objects like FileSystemFileHandle)
const _idb = (() => {
 let _db = null;
 const open = () => new Promise((res, rej) => {
  if (_db) return res(_db);
  const req = indexedDB.open('pcw-store', 1);
  req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
  req.onsuccess = e => { _db = e.target.result; res(_db); };
  req.onerror = () => rej(req.error);
 });
 return {
  async get(key) {
   try {
   const db = await open();
   return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = () => res(req.result ?? null);
    req.onerror = () => rej(req.error);
   });
   } catch(e) { return null; }
  },
  async set(key, value) {
   try {
   const db = await open();
   return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    const req = tx.objectStore('kv').put(value, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
   });
   } catch(e) {}
  },
  async del(key) {
   try {
   const db = await open();
   return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    const req = tx.objectStore('kv').delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
   });
   } catch(e) {}
  },
 };
})();

function detectColIdx(headers, candidates) {
const lc = headers.map(h => (h||'').toString().toLowerCase().trim());
for (const c of candidates) {
 const i = lc.findIndex(h => h === c);
 if (i !== -1) return i;
}
for (const c of candidates) {
 const i = lc.findIndex(h => h.includes(c));
 if (i !== -1) return i;
}
return -1;
}

function buildColMap(headers, fieldDefs) {
const map = {};
for (const [field, candidates] of Object.entries(fieldDefs)) {
 map[field] = detectColIdx(headers, candidates);
}
return map;
}

function mapSheetRow(row, colMap) {
const out = {};
for (const [field, idx] of Object.entries(colMap)) {
 if (idx >= 0 && row[idx] !== undefined && row[idx] !== null && row[idx] !== '') {
 out[field] = row[idx];
 }
}
return out;
}

function fmtDate(v) {
if (!v) return '';
if (v instanceof Date) return v.toISOString().slice(0,10);
if (typeof v === 'number') {
 const d = new Date(Math.round((v - 25569) * 86400 * 1000));
 return d.toISOString().slice(0,10);
}
return v.toString().slice(0,10);
}

function parsePrice(v) {
if (v === null || v === undefined || v === '') return 0;
if (v instanceof Date) {
 if (v.getFullYear() < 1980) {
 const serial = Math.round((v.getTime() / 86400000) + 25569);
 return serial > 0 ? serial : 0;
 }
 return 0; // A real date in a price field — shouldn't happen, return 0
}
if (typeof v === 'string' && /^1[89]\d\d-\d\d-\d\d$/.test(v)) {
 const d = new Date(v);
 if (!isNaN(d) && d.getFullYear() < 1980) {
 const serial = Math.round((d.getTime() / 86400000) + 25569);
 return serial > 0 ? serial : 0;
 }
}
return parseFloat(v) || 0;
}

 if (!_handle) return false;
 try {
 if (_handle.queryPermission) {
  const perm = await _handle.queryPermission({mode: 'read'});
  if (perm === 'granted') return true;
  if (perm === 'denied') { _markStale(); return false; }
  _markStale();
  return false;
 }
 await _handle.getFile();
 return true;
 } catch(e) {

 return false;
 }
}

  const perm = await _handle.requestPermission({mode: 'read'});

 } catch(e) {}

}

 const XLSXlib = XLSX;

  const buf  = await file.arrayBuffer();
  _wbCache = XLSXlib.read(buf, {type:'array'});

}

function matchSheet(wb, sheetKey) {
 const def  = FEED_SHEET_DEFS[sheetKey];
 const names = wb.SheetNames.map(n => n.toLowerCase().trim());
 for (const match of def.sheetMatch) {
 const idx = names.findIndex(n => n === match || n.includes(match));
 if (idx !== -1) return wb.SheetNames[idx];
 }

async function loadSheet(sheetKey, forceRefresh) {

 if (!wb) return null;
 const sheetName = matchSheet(wb, sheetKey);
 if (!sheetName) return null; // sheet not present in this workbook
 const ws        = wb.Sheets[sheetName];
 const rows      = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
 if (rows.length < 2) return [];
 const headers = rows[0].map(h => (h||'').toString());

 try {
 const hc = JSON.parse(localStorage.getItem('pcw-fs-headers') || '{}');
 const prevHeaders = hc[sheetKey];
 const headersChanged = prevHeaders && JSON.stringify(prevHeaders) !== JSON.stringify(headers);
 if (headersChanged) {
  const maps = getColMaps() || {};
  if (maps[sheetKey]) {
  delete maps[sheetKey];
  saveColMaps(maps);
  }
 }
 hc[sheetKey] = headers;
 localStorage.setItem('pcw-fs-headers', JSON.stringify(hc));
 } catch(e) {}

 const overrides = (getColMaps() || {})[sheetKey] || {};
 const autoDef   = buildColMap(headers, FEED_SHEET_DEFS[sheetKey].fields);
 const colMap    = {...autoDef, ...overrides};
 const data = rows.slice(1).map(row => mapSheetRow(row, colMap));
 _cache[sheetKey] = data;
 return data;
}

 function cleanDwg(v) {

 async function searchSheets(buFilter) {

  if (po) {

  const pq = await loadSheet('purchaseQuotes', false);
  if (pq) {
   const matches = pq
   .filter(row => (row.itemNo||'').toString().toLowerCase() === pn && dbMatchesBU(row.db, buFilter))
   .sort((a,b) => fmtDate(b.date).localeCompare(fmtDate(a.date)));
   if (matches.length) {
   const m = matches[0];
   if (!r.description) r.description = m.description || '';

  if (!r.description || !r.drawing) {

   .filter(row => (row.itemNo||'').toString().toLowerCase() === pn && dbMatchesBU(row.db, buFilter))
   .sort((a,b) => fmtDate(b.date).localeCompare(fmtDate(a.date)));
   if (matches.length) {

   if (!r.description) r.description = m.description || '';

   found = true;

  if (!r.description) {

   if (matches.length) {
   const m = matches[0];

 async lookupTaxCode(icms, icmsBasis, ipi, pis, cofins) {

  ipi:       r(ipi),
  pis:       r(pis),

  if (!row.code) return false;
  const icmsMatch   = r((row.icms||0)*100)   === target.icms;

  } else {
  basisMatch = true; // can't check — skip

const Tooltip = memo(function Tooltip({ text, children }) {
if (!text) return children;
const isRich = typeof text !== 'string';
const [vis, setVis] = React.useState(false);
const [pos, setPos] = React.useState({x:0,y:0});
const ref = React.useRef(null);
if (!isRich) {
 return (
 <span title={text} style={{cursor:'help',borderBottom:'1px dotted currentColor'}}>
  {children}
 </span>
 );
}
const show = e => {
 const r = e.currentTarget.getBoundingClientRect();
 setPos({x: Math.min(r.left, window.innerWidth - 300), y: r.bottom + 4});
 setVis(true);
};
return (
 <span
 ref={ref}
 onMouseEnter={show}
 onMouseLeave={()=>setVis(false)}
 style={{cursor:'help',borderBottom:'1px dotted currentColor',position:'relative'}}
 >
 {children}
 {vis && (
  <span style={{
  position:'fixed',left:pos.x,top:pos.y,zIndex:99999,
  background:'#1e293b',color:'#f1f5f9',borderRadius:8,
  padding:'8px 12px',fontSize:11,lineHeight:1.6,
  maxWidth:280,boxShadow:'0 4px 16px rgba(0,0,0,.4)',
  pointerEvents:'none',whiteSpace:'normal'
  }}>
  {text}
  </span>
 )}
 </span>
);
});

const HoverCard = memo(function HoverCard({ rows, getRows, children, style={} }) {
const [visible, setVisible] = useState(false);
const [pos, setPos] = useState({x:0, y:0});
const cardRef = useRef(null);
const computedRowsRef = useRef(null);

const show = (e) => {
 const r = e.currentTarget.getBoundingClientRect();
 setPos({ x: r.left, y: r.bottom + 4 });
 // Compute rows lazily on first hover — store in ref so re-renders don't recompute
 if (getRows && !computedRowsRef.current) computedRowsRef.current = getRows();
 setVisible(true);
};
const hide = () => setVisible(false);

// When underlying data changes (getRows identity changes), clear the cache
useEffect(() => { computedRowsRef.current = null; }, [getRows]);

const activeRows = computedRowsRef.current ?? rows;

const cardStyle = {
 position: 'fixed',
 top: pos.y,
 left: pos.x,
 zIndex: 99999,
 background: '#1e293b',
 color: '#f1f5f9',
 borderRadius: 8,
 padding: '8px 12px',
 fontSize: 11,
 fontFamily: 'ui-monospace, monospace',
 boxShadow: '0 8px 32px rgba(0,0,0,0.4)',
 minWidth: 220,
 maxWidth: 340,
 pointerEvents: 'none',
 lineHeight: 1.6,
 whiteSpace: 'nowrap',
};

return (
 <span
 onMouseEnter={show}
 onMouseLeave={hide}
 style={{cursor:'default', ...style}}
 >
 {children}
 {visible && activeRows && activeRows.length > 0 && (
  <div ref={cardRef} style={cardStyle}>
  {activeRows.map((row, i) => {
   if (row.separator) return (
   <div key={i} style={{borderTop:'1px solid #334155', margin:'4px 0'}}/>
   );
   return (
   <div key={i} style={{
    display:'flex',
    justifyContent:'space-between',
    gap: 12,
    paddingLeft: row.indent ? 12 : 0,
    fontWeight: row.bold ? 700 : 400,
    color: row.color || (row.bold ? '#fff' : '#cbd5e1'),
    fontSize: row.bold ? 12 : 11,
   }}>
    <span style={{color: row.labelColor || (row.bold ? '#e2e8f0' : '#94a3b8')}}>{row.label}</span>
    <span style={{color: row.color || (row.bold ? '#fff' : '#f1f5f9')}}>{row.value}</span>
   </div>
   );
  })}
  </div>
 )}
 </span>
);
});

const SupplierAutocomplete = memo(function SupplierAutocomplete({value, onChange, onKeyDown, onFocus, dataCellAttr, onPasteHandler, itemId, bu, autofilled, onClearAuto, locked, onCommit}) {
const [suggestions, setSuggestions] = React.useState([]);
const [open, setOpen]               = React.useState(false);
const [busy, setBusy]               = React.useState(false);
const [dropRect, setDropRect]       = React.useState(null);
const inputRef                      = React.useRef(null);
const debounceRef                   = React.useRef(null);
const committedRef                  = React.useRef(value); // track last committed value

const search = async (q) => {
 if (!q || q.length < 2) { setSuggestions([]); setOpen(false); return; }
 setBusy(true);
 try {
 const results = await DataService.searchBP(q, bu);
 setSuggestions(results.slice(0, 10));
 if (results.length > 0 && inputRef.current) {
  const r = inputRef.current.getBoundingClientRect();
  setDropRect({top: r.bottom + 2, left: r.left, width: Math.max(r.width, 260)});
  setOpen(true);
 } else {
  setOpen(false);
 }
 } catch(e) { setSuggestions([]); setOpen(false); }
 setBusy(false);
};

React.useEffect(() => {
 if (open && value && value.length >= 2) search(value);
 else if (open) setOpen(false);
}, [bu]);

const handleChange = (e) => {
 const v = e.target.value;
 onChange(v); // parent onChange now atomically clears _autoSupplier flag
 clearTimeout(debounceRef.current);
 debounceRef.current = setTimeout(() => search(v), 250);
};

const pick = (name) => {
 onChange(name);
 setSuggestions([]);
 setOpen(false);
 committedRef.current = name;
 if (onCommit) onCommit(name);
};

const dropdown = open && suggestions.length > 0 && dropRect ? ReactDOM.createPortal(
 <div style={{
 position:'fixed', top:dropRect.top, left:dropRect.left, width:dropRect.width,
 zIndex:99999, background:'#fff', border:'1px solid #bfdbfe', borderRadius:8,
 boxShadow:'0 12px 32px rgba(0,0,0,.18)', maxHeight:280, overflowY:'auto'
 }}>

  >

  {(s.code||s.country||s.type) && (
   <div style={{fontSize:10, color:'#94a3b8', marginTop:1}}>
   {[s.code, s.type, s.country].filter(Boolean).join(' · ')}
   </div>
  )}
  </div>
 ))}
 </div>,
 document.body
) : null;

return (
 <div style={{position:'relative', width:'100%'}}>
 <input
  ref={inputRef}
  className={`pcw-ci w-full${autofilled ? ' pcw-ci-autofilled' : ''}`}
  title={autofilled ? 'Autofilled from data source' : undefined}
  value={value||""}
  readOnly={locked}
  style={locked ? {background:'#f8fafc',color:'#94a3b8',cursor:'not-allowed'} : undefined}
  onChange={locked ? undefined : handleChange}
  onKeyDown={e => { if(locked) return; if(e.key==='Escape'){setOpen(false);} if(onKeyDown) onKeyDown(e); }}
  onFocus={() => { if(!locked && onFocus) onFocus(); }}
  onBlur={() => {
   setTimeout(()=>setOpen(false), 180);
   if (!locked && onCommit && value && value !== committedRef.current) {
    committedRef.current = value;
    onCommit(value);
   }
  }}
  placeholder="Supplier"
  data-cell={dataCellAttr}

 />
 {busy && <span style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',fontSize:10,color:'#94a3b8'}}>…</span>}
 {dropdown}
 </div>

function usePricingEngine({
tree, items, frt, proj, brazilTaxes, brazilStates,
isCIT, forceAllocToPricelist, forceAllocToZeroCost, distributeOutboundFreight
}) {

const topCOGS = useMemo(
 () => tree.reduce((s,n) => s + n.totalCOGS, 0),
 [tree]
);

const totalInbFrt = useMemo(
 () => frt.inbound.reduce((s,e) => s + conv(e.cost||0, e.ccy||"USD", proj.sellCcy, proj.rates), 0),
 [frt.inbound, proj.sellCcy, proj.rates]
);
const inboundEntries = useMemo(() => frt.inbound || [], [frt.inbound]);

const siscomex = useMemo(() => {
 if (!isCIT) return { numImported:0, totalBRL:0, totalSC:0 };
 const numImported = items.filter(i => i.type !== "heading" && i.imported).length;
 if (proj.siscomexOverride !== null && proj.siscomexOverride !== undefined && proj.siscomexOverride >= 0) {
 return { numImported, totalBRL: proj.siscomexOverride, totalSC: conv(proj.siscomexOverride, "BRL", proj.sellCcy, proj.rates) };
 }
 const totalBRL = calcSiscomex(numImported);
 return { numImported, totalBRL, totalSC: conv(totalBRL, "BRL", proj.sellCcy, proj.rates) };
}, [items, isCIT, proj.siscomexOverride, proj.sellCcy, proj.rates]);

const afrmm = useMemo(() => {
 if (!isCIT) return { applicableFreight:0, totalAFRMM:0, totalAFRMMSC:0 };
 const applicableFreightBRL = frt.inbound
 .filter(e => e.afrmm)
 .reduce((s,e) => s + conv(e.cost||0, e.ccy||"USD", "BRL", proj.rates), 0);
 const afrmmRate = proj.afrmmRate || 8;
 const totalAFRMMBRL = applicableFreightBRL * (afrmmRate / 100);
 return { applicableFreight: applicableFreightBRL, totalAFRMM: totalAFRMMBRL, totalAFRMMSC: conv(totalAFRMMBRL, "BRL", proj.sellCcy, proj.rates) };
}, [frt.inbound, proj.rates, proj.sellCcy, proj.afrmmRate, isCIT]);

const outEntries = useMemo(() =>
 frt.outbound.map(e => ({
 ...e,
 costSC: conv(e.cost||0, e.ccy||"USD", proj.sellCcy, proj.rates),
 sellSC: (e.margin||0) < 100
  ? conv(e.cost||0, e.ccy||"USD", proj.sellCcy, proj.rates) / (1 - (e.margin||0)/100)

 })),
 [frt.outbound, proj.sellCcy, proj.rates]
);
const totalOutSP     = useMemo(() => outEntries.reduce((s,e) => s + e.sellSC,  0), [outEntries]);
const totalOutCost   = useMemo(() => outEntries.reduce((s,e) => s + e.costSC,  0), [outEntries]);
const totalOutMargin = useMemo(() => totalOutSP - totalOutCost,                     [totalOutSP, totalOutCost]);

const eligibleCOGS = useMemo(() =>
 tree.reduce((s,n) => {
 if (n.source === "Pricelist" && !forceAllocToPricelist) return s;
 if (n.totalCOGS === 0 && !forceAllocToZeroCost.freight) return s;
 return s + n.totalCOGS;

);
const importedCOGS = useMemo(() =>

 if (n.totalCOGS === 0 && !forceAllocToZeroCost.siscomex) return s;
 return s + n.totalCOGS;
 }, 0),

);
const afrmmCOGS = useMemo(() =>
 tree.reduce((s,n) => {

 return s + n.totalCOGS;

);
const eligibleFreightCount = useMemo(() =>
 tree.reduce((c,n) => {

 if (n.totalCOGS === 0 && !forceAllocToZeroCost.freight) return c;
 return c + 1;

);
const eligibleSiscomexCount = useMemo(() =>
 tree.reduce((c,n) => {
 if (!(n.imported || (n.importedSubCount||0) > 0)) return c;
 if (n.source === "Pricelist" && !forceAllocToPricelist) return c;
 if (n.totalCOGS === 0 && !forceAllocToZeroCost.siscomex) return c;
 return c + 1;
 }, 0),
 [tree, forceAllocToPricelist, forceAllocToZeroCost.siscomex]
);
const eligibleAfrmmCount = useMemo(() =>
 tree.reduce((c,n) => {
 if (!(n.afrmm || (n.afrmmSubCount||0) > 0)) return c;
 if (n.source === "Pricelist" && !forceAllocToPricelist) return c;
 if (n.totalCOGS === 0 && !forceAllocToZeroCost.afrmm) return c;
 return c + 1;

const flattenChildren = useCallback((node) => {
 const result = [];
 const walk = (n) => { n._ch && n._ch.forEach(c => { result.push(c); walk(c); }); };
 walk(node);
 return result;
}, []);

const getAlloc = useCallback(n => {
 const isPL = n.source === "Pricelist";
 const isZeroCost = n.totalCOGS === 0;
 const skipAlloc = isPL && !forceAllocToPricelist;

 let fr = 0;
 if (!skipAlloc) {
 if (isZeroCost && !forceAllocToZeroCost.freight) {
  fr = 0;
 } else {
  // Supplier-aware freight allocation
  // Flatten all nodes including BOM sub-components once — tree only contains root items
  const itemSupplier = (n.supplier || '').trim().toLowerCase();
  const allFlatNodes = [];
  const walkAllNodes = (nodes) => { nodes.forEach(item => { allFlatNodes.push(item); if (item._ch) walkAllNodes(item._ch); }); };
  walkAllNodes(tree);
  inboundEntries.forEach(entry => {
   const tag = (entry.supplierTag || '').trim().toLowerCase();
   const entryCostSC = conv(entry.cost||0, entry.ccy||'USD', proj.sellCcy, proj.rates);
   if (!entryCostSC) return;
   if (tag) {
    // Tagged entry — only allocate to matching supplier items
    if (itemSupplier && itemSupplier === tag) {
     // Sum eligible COGS across all nodes (incl. sub-components) for this supplier tag
     const supplierEligibleCOGS = allFlatNodes.reduce((s, item) => {
      if (item.source === 'Pricelist' && !forceAllocToPricelist) return s;
      if (item.totalCOGS === 0 && !forceAllocToZeroCost.freight) return s;
      if ((item.supplier||'').trim().toLowerCase() !== tag) return s;
      return s + item.totalCOGS;
     }, 0);
     if (supplierEligibleCOGS > 0) {
      fr += (n.totalCOGS / supplierEligibleCOGS) * entryCostSC;
     }
    }
    // else: tagged to a different supplier — skip this item
   } else {
    // Untagged entry — allocate across all eligible items (original logic)
    if (eligibleCOGS > 0) {
     fr += (n.totalCOGS / eligibleCOGS) * entryCostSC;
    } else if (eligibleFreightCount > 0) {
     fr += entryCostSC / eligibleFreightCount;
    }
   }
  });
 }
 }

 let siscomexAlloc = 0;
 if (!skipAlloc && isCIT) {
 const hasImport = n.imported || (n.importedSubCount||0) > 0;
 if (hasImport) {
  if (isZeroCost && !forceAllocToZeroCost.siscomex) {
  siscomexAlloc = 0;
  } else if (eligibleSiscomexCount > 0) {
  // Siscomex allocated equally per unique imported item — not by value
  siscomexAlloc = (siscomex.totalSC || 0) / eligibleSiscomexCount;
  }
 }
 }

 let afrmAlloc = 0;
 if (!skipAlloc && isCIT) {
 const hasAfrmm = n.afrmm || (n.afrmmSubCount||0) > 0;
 if (hasAfrmm) {
  if (isZeroCost && !forceAllocToZeroCost.afrmm) {
  afrmAlloc = 0;
  } else if (afrmmCOGS > 0) {
  afrmAlloc = (n.totalCOGS / afrmmCOGS) * (afrmm.totalAFRMMSC || 0);
  } else if (eligibleAfrmmCount > 0) {
  afrmAlloc = (afrmm.totalAFRMMSC || 0) / eligibleAfrmmCount;
  }
 }
 }

 const cif = n.totalCOGS + fr;
 const tar = n.totalCOGS * ((n.tariff||0) / 100);

 const allDescendants = flattenChildren(n);
 const importedDescendants = allDescendants.filter(c => c.imported);
 const afrmmDescendants    = allDescendants.filter(c => c.afrmm);
 const totalImportedCOGSUnder = importedDescendants.reduce((s,c) => s + c.totalCOGS, 0);
 const totalAfrmmCOGSUnder    = afrmmDescendants.reduce((s,c) => s + c.totalCOGS, 0);

 const importedChildrenWithCIF = importedDescendants.map(c => {
 const childSiscomex = (siscomexAlloc > 0 && totalImportedCOGSUnder > 0)
  ? (c.totalCOGS / totalImportedCOGSUnder) * siscomexAlloc : 0;
 const childAFRMM = (c.afrmm && afrmAlloc > 0 && totalAfrmmCOGSUnder > 0)
  ? (c.totalCOGS / totalAfrmmCOGSUnder) * afrmAlloc : 0;
 return { ...c, childSiscomex, childAFRMM, cifForTax: c.totalCOGS + childSiscomex + childAFRMM };
 });

 let importTax = 0;
 if (!skipAlloc && isCIT) {
 if (n.imported) {
  const cifBRL = conv(cif, proj.sellCcy, "BRL", proj.rates);
  const tc = brazilTaxes[n.id] || {};
  const br = calcImportTax(cifBRL, n.customsCharges ?? proj.customsCharges ?? 9, tc.ii ?? 20);
  importTax += conv(br.total, "BRL", proj.sellCcy, proj.rates);
 }
 importedChildrenWithCIF.forEach(c => {
  const cifBRL = conv(c.cifForTax, proj.sellCcy, "BRL", proj.rates);
  const tc = brazilTaxes[c.id] || {};
  const br = calcImportTax(cifBRL, c.customsCharges ?? proj.customsCharges ?? 9, tc.ii ?? 20);
  importTax += conv(br.total, "BRL", proj.sellCcy, proj.rates);
 });
 }

 return {
 fr, siscomex: siscomexAlloc, afrmm: afrmAlloc, cif, tax: importTax, tar,
 landed: n.totalCOGS + fr + siscomexAlloc + afrmAlloc + importTax + tar,
 importedChildren: isCIT ? importedChildrenWithCIF : []
 };
}, [eligibleCOGS, importedCOGS, afrmmCOGS, eligibleFreightCount, eligibleSiscomexCount, eligibleAfrmmCount,
 totalInbFrt, isCIT, brazilTaxes, proj.sellCcy, proj.rates, proj.customsCharges, afrmm, siscomex,
 forceAllocToPricelist, forceAllocToZeroCost, flattenChildren, inboundEntries, tree, conv]);

// Pre-compute getAlloc for every root node once per tree/freight change.
// All downstream hooks do an O(1) map lookup instead of recalculating per render.
const allocMap = useMemo(() => {
 const map = new Map();
 const visit = n => {
  map.set(n.id, getAlloc(n));
  (n._ch || []).forEach(visit);
 };
 tree.forEach(visit);
 return map;
}, [tree, getAlloc]);

const outboundFreightAllocations = useMemo(() => {
 if (!distributeOutboundFreight || totalOutSP === 0 || tree.length === 0) return {};
 let totalBaseSP = 0;
 const baseSPs = {};
 tree.forEach(item => {
 let baseSP = 0;
 if (item.manualSellPrice !== null && item.manualSellPrice !== undefined) {
  baseSP = item.manualSellPrice * (item.qty || 1);
 } else {
  const a = getAlloc(item);
  baseSP = applyMargins(a.landed, {
  margin: item.margin || 0, contingency: item.contingency || 0,
  dealer: proj.defaultDealer || 0, discountMitigation: proj.discountMitigation || 0
  });
 }
 baseSPs[item.id] = baseSP;
 totalBaseSP += baseSP;
 });
 if (totalBaseSP === 0) return {};
 const allocations = {};
 tree.forEach(item => { allocations[item.id] = (baseSPs[item.id] / totalBaseSP) * totalOutSP; });
 return allocations;
}, [distributeOutboundFreight, totalOutSP, tree, getAlloc, proj.defaultDealer, proj.discountMitigation]);

// ── Packing & Crating ─────────────────────────────────────────────────────
const pc = frt.packingCrating || {};
const pcActive = !!(pc.enabled && proj.bu !== 'CIT');
// pcBaseSP: sum of item base sell prices (pre-outbound-freight, pre-discount) for % calc
const pcBaseSPs = useMemo(() => {
 const map = {};
 let total = 0;
 tree.forEach(item => {
  let baseSP = 0;
  if (item.manualSellPrice !== null && item.manualSellPrice !== undefined) {
   baseSP = item.manualSellPrice * (item.qty || 1);
  } else {
   const a = getAlloc(item);
   baseSP = applyMargins(a.landed, {
    margin: item.margin || 0, contingency: item.contingency || 0,
    dealer: proj.defaultDealer || 0, discountMitigation: proj.discountMitigation || 0
   });
  }
  map[item.id] = baseSP;
  total += baseSP;
 });
 return { map, total };
}, [tree, getAlloc, proj.defaultDealer, proj.discountMitigation, distributeOutboundFreight, outboundFreightAllocations]);

const pcTotal = useMemo(() => {
 if (!pcActive) return 0;
 if (pc.overrideAmt !== null && pc.overrideAmt !== undefined && pc.overrideAmt !== '') return parseFloat(pc.overrideAmt) || 0;
 // pct of total base sell price (pre-discount)
 return pcBaseSPs.total * ((pc.pct || 0) / 100);
}, [pcActive, pc.overrideAmt, pc.pct, pcBaseSPs.total]);

const packingCratingAllocations = useMemo(() => {
 if (!pcActive || !distributeOutboundFreight || pcTotal === 0 || pcBaseSPs.total === 0) return {};
 const allocs = {};
 tree.forEach(item => {
  allocs[item.id] = (pcBaseSPs.map[item.id] / pcBaseSPs.total) * pcTotal;
 });
 return allocs;
}, [pcActive, distributeOutboundFreight, pcTotal, pcBaseSPs, tree]);

const getItemSP = useCallback(n => {
 let baseSP;
 if (n.manualSellPrice !== null && n.manualSellPrice !== undefined) {
 baseSP = n.manualSellPrice;
 } else {
 const a = getAlloc(n);
 const totalSP = applyMargins(a.landed, {
  margin: n.margin||0, contingency: n.contingency||0,
  dealer: proj.defaultDealer||0, discountMitigation: proj.discountMitigation||0
 });
 baseSP = totalSP / (n.qty || 1);
 }
 if (distributeOutboundFreight && outboundFreightAllocations[n.id]) {
 baseSP += outboundFreightAllocations[n.id] / (n.qty || 1);
 }
 if (pcActive && distributeOutboundFreight && packingCratingAllocations[n.id]) {
 baseSP += packingCratingAllocations[n.id] / (n.qty || 1);
 }
 return baseSP;
}, [getAlloc, proj.defaultDealer, proj.discountMitigation, distributeOutboundFreight, outboundFreightAllocations, pcActive, packingCratingAllocations]);

const getItemNetPrice = useCallback(n => {
 return getItemSP(n) * (n.qty||1) * (1 - (n.discount||0)/100);
}, [getItemSP]);

const getItemSPWithSalesTax = useCallback(n => {
 const sp = getItemSP(n);
 if (!isCIT) return sp;
 const discountedSP = sp * (1 - (n.discount||0)/100);
 const spBRL = conv(discountedSP, proj.sellCcy, "BRL", proj.rates);
 const icmsRate = calcICMSRate(brazilStates.origin, brazilStates.destination);
 const tc = { ...BR_DEFAULTS, icms: icmsRate, ...(brazilTaxes[n.id]||{}) };
 const salesTax = calcSalesTax(spBRL, tc);
 return discountedSP + conv(salesTax.total, "BRL", proj.sellCcy, proj.rates);
}, [getItemSP, isCIT, proj.sellCcy, proj.rates, brazilTaxes, brazilStates]);

// Pre-computed sell price maps — O(1) per-row lookup instead of per-render function calls
const spMap = useMemo(() => {
 const map = new Map();
 const visit = n => {
  map.set(n.id, getItemSP(n));
  (n._ch||[]).forEach(visit);
 };
 tree.forEach(visit);
 return map;
}, [tree, getItemSP]);

const netPriceMap = useMemo(() => {
 const map = new Map();
 const visit = n => {
  const sp = spMap.get(n.id) ?? 0;
  map.set(n.id, sp * (n.qty||1) * (1 - (n.discount||0)/100));
  (n._ch||[]).forEach(visit);
 };
 tree.forEach(visit);
 return map;
}, [tree, spMap]);

const spTaxMap = useMemo(() => {
 if (!isCIT) return new Map();
 const map = new Map();
 const visit = n => {
  map.set(n.id, getItemSPWithSalesTax(n));
  (n._ch||[]).forEach(visit);
 };
 tree.forEach(visit);
 return map;
}, [tree, getItemSPWithSalesTax, isCIT]);

// Pre-computed isQuoteReady map — eliminates recursive childReady traversal per BOM parent row
const quoteReadyMap = useMemo(() => {
 const map = new Map();
 const nodeReady = n => {
  if (!n._ch || n._ch.length === 0)
   return !!(n.partNumber?.trim() && n.description?.trim() && n.supplier?.trim() && n.unitCost > 0);
  return !!(n.partNumber?.trim() && n.description?.trim()) && n._ch.every(c => nodeReady(c));
 };
 const visit = n => {
  const isParent = n._ch && n._ch.length > 0;
  const ready = isParent
   ? !!(n.partNumber?.trim() && n.description?.trim() && (n.margin > 0 || n.manualSellPrice > 0)) && n._ch.every(c => nodeReady(c))
   : !!(n.partNumber?.trim() && n.description?.trim() && n.supplier?.trim() && n.unitCost > 0 && (n.margin > 0 || n.manualSellPrice > 0));
  map.set(n.id, ready);
  (n._ch||[]).forEach(visit);
 };
 tree.forEach(visit);
 return map;
}, [tree]);

const calculateReverseMargin = useCallback((n, targetSellPrice) => {
 const a = getAlloc(n);
 const landed = a.landed / (n.qty || 1);
 if (landed === 0) return 0;
 const contingency = n.contingency || 0;
 const dealer = proj.defaultDealer || 0;
 const discountMitig = proj.discountMitigation || 0;
 const adjustedSP = targetSellPrice / (1 + discountMitig/100);
 if (adjustedSP === 0) return 0;
 return ((1 - (landed / adjustedSP)) * 100) - contingency - dealer;
}, [getAlloc, proj.defaultDealer, proj.discountMitigation]);

const landedCOGS = useMemo(
 () => tree.reduce((s,n) => s + (allocMap.get(n.id)?.landed ?? 0), 0),
 [tree, allocMap]
);
const itemsSP = useMemo(
 () => tree.reduce((s,n) => s + getItemNetPrice(n), 0),
 [tree, getItemNetPrice]
);
const grand = itemsSP + (distributeOutboundFreight ? 0 : totalOutSP) + (distributeOutboundFreight ? 0 : pcTotal);

const itemsSPWithTax = useMemo(() => {
 if (!isCIT) return itemsSP;
 return tree.reduce((s,n) => s + getItemSPWithSalesTax(n) * (n.qty||1), 0);
}, [tree, getItemSPWithSalesTax, isCIT, itemsSP]);

const freightTaxSC = useMemo(() => {
 if (!isCIT || totalOutSP === 0 || distributeOutboundFreight) return 0;
 const outFreightBRL = conv(totalOutSP, proj.sellCcy, "BRL", proj.rates);
 const freightSalesTax = calcSalesTax(outFreightBRL, BR_DEFAULTS);
 return conv(freightSalesTax.total, "BRL", proj.sellCcy, proj.rates);
}, [isCIT, totalOutSP, proj.sellCcy, proj.rates, distributeOutboundFreight]);

const totalOutSPWithTax = useMemo(() => {
 if (!isCIT || totalOutSP === 0 || distributeOutboundFreight) return 0;
 return totalOutSP + freightTaxSC;
}, [isCIT, totalOutSP, freightTaxSC, distributeOutboundFreight]);

const grandWithTax = isCIT ? itemsSPWithTax + totalOutSPWithTax : grand;

return {
 topCOGS, totalInbFrt, siscomex, afrmm,
 outEntries, totalOutSP, totalOutCost, totalOutMargin,
 getAlloc, allocMap, spMap, netPriceMap, spTaxMap, quoteReadyMap,
 getItemSP, getItemNetPrice, getItemSPWithSalesTax, calculateReverseMargin,
 landedCOGS, itemsSP, grand, itemsSPWithTax, totalOutSPWithTax, grandWithTax,
 freightTaxSC, outboundFreightAllocations,
 packingCratingAllocations, pcActive, pcTotal, pcBaseSPs
};
}

function useCurrencyEngine({ items, proj, grand, sched }) {

const ccyBreakdown = useMemo(() => {
 const map = {};
 items.filter(i => i.type !== "heading").forEach(i => {
 const ccy = i.ccy || "USD";
 const value = (parseFloat(i.unitCost)||0) * (parseFloat(i.qty)||1);
 if (!map[ccy]) map[ccy] = { value:0, valueSC:0, count:0 };
 map[ccy].value    += value;
 map[ccy].valueSC  += conv(value, ccy, proj.sellCcy, proj.rates);
 map[ccy].count++;
 });
 return map;
}, [items, proj.sellCcy, proj.rates]);

const { srcGroups, totalW } = useMemo(() => {
 const groups = {};
 items.filter(i => i.type !== "heading").forEach(i => {
 const w = conv(parseFloat(i.unitCost)||0, i.ccy||"USD", proj.sellCcy, proj.rates) * (parseFloat(i.qty)||1);
 if (!groups[i.source]) groups[i.source] = { count:0, w:0 };
 groups[i.source].count++;
 groups[i.source].w += w;
 });
 const tw = Object.values(groups).reduce((s,g) => s + g.w, 0);
 return { srcGroups: groups, totalW: tw };
}, [items, proj.sellCcy, proj.rates]);

const grandUSD = useMemo(() => conv(grand, proj.sellCcy, "USD", proj.rates), [grand, proj.sellCcy, proj.rates]);
const needsSalesforce = grandUSD >= SF_QUOTE_THRESHOLD;
const sfObject        = useMemo(() => parseSalesforceLink(sched?.salesforceLink || ''), [sched?.salesforceLink]);

return { ccyBreakdown, srcGroups, totalW, grandUSD, needsSalesforce, sfObject };
}

function useSalesTaxEngine({
tree, proj, brazilTaxes, brazilStates, isCIT,
grand, grandWithTax, landedCOGS, itemsSP,
getItemSP, getItemNetPrice, getAlloc,
totalOutSP, distributeOutboundFreight, freightTaxSC, items
}) {

const getBT = useCallback(id => {
 const item = items.find(i => i.id === id);
 const stateICMS = calcICMSRate(brazilStates.origin, brazilStates.destination);
 // Direct sale + imported item = 4% ICMS regardless of state configuration
 const defaultICMS = (proj.salesType === "Direct" && item?.imported === true) ? 4 : stateICMS;
 return { ...BR_DEFAULTS, icms: defaultICMS, ...(brazilTaxes[id]||{}) };
}, [brazilTaxes, brazilStates, items, proj.salesType]);

const getItemSalesTax = useCallback(item => {
 if (!isCIT) return { ipi:0, pis:0, cofins:0, icms:0, total:0 };
 const sp = getItemSP(item);
 const discountedSP = sp * (1 - (item.discount||0) / 100);
 const spBRL = conv(discountedSP, proj.sellCcy, "BRL", proj.rates);
 return calcSalesTax(spBRL, getBT(item.id));
}, [isCIT, getItemSP, proj.sellCcy, proj.rates, getBT]);

const getItemImportTaxDetail = useCallback(item => {
 if (!isCIT) return { customs:0, ii:0, total:0 };
 const alloc = getAlloc(item);
 let customs = 0, ii = 0;
 if (item.imported) {
 const cifBRL = conv(alloc.cif, proj.sellCcy, "BRL", proj.rates);
 const tc = getBT(item.id);
 const bt = calcImportTax(cifBRL, item.customsCharges ?? proj.customsCharges ?? 9, tc.ii ?? 20);
 customs += bt.customs; ii += bt.ii;
 }
 (alloc.importedChildren || []).forEach(c => {
 const cifBRL = conv(c.cifForTax ?? c.totalCOGS, proj.sellCcy, "BRL", proj.rates);
 const tc = getBT(c.id);
 const bt = calcImportTax(cifBRL, c.customsCharges ?? proj.customsCharges ?? 9, tc.ii ?? 20);
 customs += bt.customs; ii += bt.ii;
 });
 return { customs, ii, total: customs + ii };
}, [isCIT, getAlloc, proj.sellCcy, proj.rates, proj.customsCharges, getBT]);

const { totalImportTax, totalSalesTax, totalTax, salesTaxTotals } = useMemo(() => {
 let importTax = 0, salesTax = 0, tax = 0;
 const stTotals = { ipi:0, pis:0, cofins:0, icms:0, total:0 };
 if (isCIT) {
 tree.forEach(item => {
  const alloc = getAlloc(item);
  importTax += alloc.tax + alloc.siscomex + alloc.afrmm;
  const st = getItemSalesTax(item);
  const qty = item.qty || 1;
  // st values are in BRL — convert to sell currency for build-up total
  salesTax += conv(st.total * qty, "BRL", proj.sellCcy, proj.rates);
  // stTotals stays in BRL for the Brazil tax breakdown display
  stTotals.ipi    += st.ipi    * qty;
  stTotals.pis    += st.pis    * qty;
  stTotals.cofins += st.cofins * qty;
  stTotals.icms   += st.icms   * qty;
  stTotals.total  += st.total  * qty;
 });
 if (!distributeOutboundFreight && totalOutSP > 0 && freightTaxSC > 0) {
  salesTax += freightTaxSC;
  stTotals.total += conv(freightTaxSC, proj.sellCcy, "BRL", proj.rates);
 }
 tax = importTax;
 } else {
 tax = tree.reduce((s,n) => s + n.totalCOGS * ((n.tariff||0)/100), 0);
 }
 return { totalImportTax: importTax, totalSalesTax: salesTax, totalTax: tax, salesTaxTotals: stTotals };
}, [tree, isCIT, getAlloc, getItemSalesTax, totalOutSP, distributeOutboundFreight, proj.sellCcy, proj.rates, freightTaxSC]);

const totalDiscount = useMemo(() =>
 tree.reduce((sum, item) => {
 const unitSP = getItemSP(item);
 const discountPct = item.discount || 0;
 if (discountPct === 0) return sum;
 return sum + unitSP * (item.qty || 1) * (discountPct / 100);
 }, 0),
 [tree, getItemSP]
);

const effGM      = grand > 0 ? (1 - landedCOGS / grand) * 100 : 0;
const gmValue    = grand - landedCOGS;
const ebitda     = effGM - (proj.sAndAExpense || 0);
const ebitdaValue = grand * ebitda / 100;
const buildUpGrossMargin = Math.max(0, itemsSP - landedCOGS + totalDiscount);

const { marginByConfidence, marginBySupplier } = useMemo(() => {
 const byConf = { "Very High":[], "High":[], "Medium":[], "Low":[], "Very Low":[] };
 const bySupp = {};
 tree.forEach(n => {
 const a = getAlloc(n);
 const netPrice = getItemNetPrice(n);
 const margin = netPrice > 0 ? ((netPrice - a.landed) / netPrice * 100) : 0;
 const conf = getConfidence(n.source);
 if (byConf[conf]) byConf[conf].push({ item:n, margin, value:netPrice });
 if (n.supplier) {
  if (!bySupp[n.supplier]) bySupp[n.supplier] = { items:0, totalMargin:0, totalValue:0 };
  bySupp[n.supplier].items++;
  bySupp[n.supplier].totalMargin += margin;
  bySupp[n.supplier].totalValue  += netPrice;
 }
 });
 return { marginByConfidence: byConf, marginBySupplier: bySupp };
}, [tree, getAlloc, getItemNetPrice]);

return {
 totalImportTax, totalSalesTax, totalTax, salesTaxTotals,
 totalDiscount, buildUpGrossMargin,
 effGM, gmValue, ebitda, ebitdaValue,
 getBT, getItemSalesTax, getItemImportTaxDetail,
 marginByConfidence, marginBySupplier
};
}

class TabErrorBoundary extends React.Component {
constructor(props) { super(props); this.state = {error: null}; }
static getDerivedStateFromError(error) { return {error}; }
componentDidCatch(error, info) { console.error('[PCW] Tab error:', error, info); }
render() {
 if (this.state.error) {

 setOpen(false);
 const parseCSV = raw => {
 const rows=[]; let cur=[], field="", inQ=false;
 for(let i=0;i<raw.length;i++){
  const ch=raw[i], nx=raw[i+1];
  if(inQ){ if(ch==='"'&&nx==='"'){field+='"';i++;} else if(ch==='"'){inQ=false;} else{field+=ch;} }
  else if(ch==='"'){inQ=true;}
  else if(ch===','){cur.push(field.trim());field="";}
  else if(ch==='\r'||ch==='\n'){
  if(ch==='\r'&&nx==='\n')i++;
  cur.push(field.trim());field="";
  if(cur.some(c=>c!==""))rows.push(cur);
  cur=[];
  } else {field+=ch;}
 }
 cur.push(field.trim());
 if(cur.some(c=>c!==""))rows.push(cur);
 return rows;
 };

// Sorted item list — headings stay in place, only root items are reordered.
// Children always follow their parent regardless of sort.
// Declared here (after usePricingEngine) so spMap/netPriceMap/spTaxMap are in scope.
// virtualSlots (declared later) depends on this via the flattenedSlots builder.
const sortedItems = useMemo(() => {
 if (!sortConfig) return items;
 const { col, dir } = sortConfig;
 const mul = dir === 'asc' ? 1 : -1;
 const getValue = (node) => {
  const tn = treeById.get(node.id);
  switch (col) {
  case 'partNo':               return (node.partNumber||'').toLowerCase();
  case 'description':          return (node.description||'').toLowerCase();
  case 'supplier':             return (node.supplier||'').toLowerCase();
  case 'qty':                  return node.qty||0;
  case 'unitCost':             return node.unitCost||0;
  case 'cogs':                 return (tn?.totalCOGS) || 0;
  case 'leadTime':             return node.leadTime||0;
  case 'margins':              return node.margin||0;
  case 'source':               return SOURCE_SCORE[node.source] ?? 0;
  case 'unitSellPrice':        return spMap.get(node.id) || 0;
  case 'sellPrice':            return netPriceMap.get(node.id) || 0;
  case 'unitSellPriceWithTax': return spTaxMap.get(node.id) || 0;
  case 'sellPriceWithTax':     return (spTaxMap.get(node.id) || 0) * (node.qty||1) * (1 - (node.discount||0)/100);
  default:                     return 0;
  }
 };
 const childMap = new Map();
 items.forEach(item => {
  if (!item.parentId || item.type === 'heading') return;
  if (!childMap.has(item.parentId)) childMap.set(item.parentId, []);
  childMap.get(item.parentId).push(item);
 });
 const collectSubtree = (item, out) => {
  out.push(item);
  (childMap.get(item.id) || []).forEach(child => collectSubtree(child, out));
 };
 const groups = [];
 let pendingHeading = null;
 items.forEach(item => {
  if (item.type === 'heading') { pendingHeading = item; return; }
  if (item.parentId) return;
  const descendants = [];
  (childMap.get(item.id) || []).forEach(child => collectSubtree(child, descendants));
  groups.push({ heading: pendingHeading, root: item, descendants });
  pendingHeading = null;
 });
 groups.sort((a, b) => {
  const va = getValue(a.root), vb = getValue(b.root);
  if (typeof va === 'string') return mul * va.localeCompare(vb);
  return mul * (va - vb);
 });
 const result = [];
 groups.forEach(({ heading, root, descendants }) => {
  if (heading) result.push(heading);
  result.push(root);
  descendants.forEach(d => result.push(d));
 });
 return result;
}, [items, sortConfig, treeById, spMap, netPriceMap, spTaxMap]);

// Flatten items+tree into a slot-per-<tr> list used for virtual height calc.
// CRITICAL: each slot must correspond to exactly one <tr> in the DOM.
const virtualSlots = useMemo(() => {
 const activeList = searchQuery ? filteredTree : null;
 const slots = [];
 const pushNode = (n, depth, rootN) => {
  const root = rootN || n;
  slots.push({ id: n.id, type: depth === 0 ? 'item' : 'child', node: n, depth, rootId: root.id, rootNode: root });
  if (showNotes.has(n.id)) {
   slots.push({ id: n.id + '__note', type: 'note', node: n, depth, rootId: root.id, rootNode: root });
  }
  (n._ch || []).forEach(c => pushNode(c, depth + 1, root));
 };
 sortedItems.forEach(item => {
  if (item.type === 'heading') {
   if (!searchQuery) slots.push({ id: item.id, type: 'heading', item, rootId: item.id });
   return;
  }
  if (item.parentId) return;
  const node = activeList ? filteredTreeById.get(item.id) : treeById.get(item.id);
  if (node) pushNode(node, 0, null);
 });
 return slots;
}, [sortedItems, treeById, filteredTreeById, filteredTree, searchQuery, showNotes]);

// Cumulative pixel offsets
const virtualOffsets = useMemo(() => {
 const { row, heading, note } = rowHeights;
 const offsets = new Float32Array(virtualSlots.length + 1);
 for (let i = 0; i < virtualSlots.length; i++) {
  const s = virtualSlots[i];
  offsets[i + 1] = offsets[i] + (s.type === 'heading' ? heading : s.type === 'note' ? note : row);
 }
 return offsets;
}, [virtualSlots, rowHeights]);

const virtualTotalHeight = virtualOffsets[virtualSlots.length] || 0;

// Scroll the virtual table to bring an item into view, then flash-highlight it for ~2 seconds.
// Must use virtualOffsets + wrapRef because rows outside the viewport are not in the DOM.
const scrollAndFlashItem = React.useCallback((itemId) => {
 const slotIdx = virtualSlots.findIndex(s => s.id === itemId);
 if (slotIdx === -1 || !wrapRef.current) return;
 const targetTop = virtualOffsets[slotIdx] || 0;
 const wrapH = wrapRef.current.clientHeight || 600;
 const rowH = rowHeights.row;
 wrapRef.current.scrollTop = Math.max(0, targetTop - wrapH / 2 + rowH / 2);
 // Set flash state — the row reads flashItemId from UiCtx and applies the highlight inline,
 // bypassing the specificity problem with inline style overriding CSS class animations.
 setFlashItemId(itemId);
 setTimeout(() => setFlashItemId(null), 2000);
}, [virtualSlots, virtualOffsets, rowHeights, wrapRef, setFlashItemId]);

const findStartIndex = (offsets, len, scrollTop) => {
 if (len === 0) return 0;
 let lo = 0, hi = len - 1;
 while (lo < hi) {
  const mid = (lo + hi) >> 1;
  if (offsets[mid + 1] <= scrollTop) lo = mid + 1;
  else hi = mid;
 }
 return lo;
};

 }).length;
 return {ready, total: rootItems.length, pct: Math.round((ready / rootItems.length) * 100)};

const quoteQualityScore = useMemo(() => {
 const scores = [];
 const rootItems = tree;
 const allItems = items.filter(i => i.type !== 'heading');
 if (!rootItems.length) return {total:0, breakdown:[]};
 const nodeReady = (node) => {
 if (!node._ch || node._ch.length === 0) return !!(node.partNumber?.trim() && node.description?.trim() && node.supplier?.trim() && node.unitCost > 0);
 return !!(node.partNumber?.trim() && node.description?.trim()) && node._ch.every(c => nodeReady(c));
 };
 const readyCount = rootItems.filter(n => {
 const isParent = n._ch && n._ch.length > 0;
 if (isParent) return !!(n.partNumber?.trim() && n.description?.trim() && (n.margin > 0 || n.manualSellPrice > 0)) && n._ch.every(c => nodeReady(c));
 return !!(n.partNumber?.trim() && n.description?.trim() && n.supplier?.trim() && n.unitCost > 0 && (n.margin > 0 || n.manualSellPrice > 0));
 }).length;
 const readyPct = readyCount / rootItems.length;
 scores.push({label:'Items ready to quote', pts: Math.round(readyPct * 30), max:30, pct: readyPct * 100});
 const srcPct = allItems.length ? allItems.filter(i => (SOURCE_SCORE[i.source]||0) >= 4).length / allItems.length : 0;
 scores.push({label:'Source quality (Quotation/Pricelist)', pts: Math.round(srcPct * 20), max:20, pct: srcPct * 100});
 const leadPct = rootItems.length ? rootItems.filter(n => (n.leadTime||0) > 0).length / rootItems.length : 0;
 scores.push({label:'Lead times entered', pts: Math.round(leadPct * 15), max:15, pct: leadPct * 100});
 const projPts = [proj.name?.trim(), proj.ref?.trim(), proj.customer?.name?.trim(), proj.rfqDate?.trim(), proj.incoterm?.trim(), proj.paymentTerms?.trim()].filter(Boolean).length;
 scores.push({label:'Project information complete', pts: Math.round((projPts/6)*20), max:20, pct: (projPts/6)*100});
 const hasFrt = (frt.inbound.some(f=>f.cost>0)||frt.outbound.some(f=>f.cost>0));
 const schedPts = sched.phases.filter(p=>p.name?.trim()&&(parseInt(p.days)||0)>0).length;
 const opsPts = (hasFrt?1:0) + (schedPts>0?1:0);
 scores.push({label:'Freight & schedule configured', pts: Math.round((opsPts/2)*15), max:15, pct:(opsPts/2)*100});
 const total = scores.reduce((s,x)=>s+x.pts,0);
 return {total, breakdown: scores};
}, [itemCompletenessFingerprint, tree, // eslint-disable-line react-hooks/exhaustive-deps
 proj.name, proj.ref, proj.customer, proj.rfqDate, proj.incoterm, proj.paymentTerms,
 frt.inbound.length, frt.outbound.length, sched]);

const importSAPQuote = useCallback(() => {
 if (proj.locked) return;
 const inp = document.createElement('input');
 inp.type = 'file';
 inp.accept = '.xlsx,.xls';
 inp.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
   try {
    if (typeof XLSX === 'undefined') { alert('Excel library not loaded. Please refresh and try again.'); return; }
    const wb = XLSX.read(ev.target.result, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (rows.length < 2) { alert('File appears empty.'); return; }

    // Row 0 = headers — build column index map
    const hdrs = rows[0].map(h => (h||'').toString().trim().toLowerCase());
    const col = key => hdrs.indexOf(key);

    const iItemNo    = col('item no.');
    const iDesc      = col('item description');
    const iQty       = col('quantity');
    const iUnitPrice = col('unit price');
    const iDiscount  = col('discount %');
    const iDrawing   = col('drawing');
    const iLeadTime  = col('vendor lead time (days)');
    const iIncoterm  = col('incoterms');
    const iType      = col('type');
    const iFreeText  = col('free text');

    if (iItemNo < 0 && iDesc < 0) {
     alert('Could not recognise SAP quotation format. Expected columns: "Item No." and "Item Description".');
     return;
    }

    // Parse unit price "USD 57.1800" → { ccy, price }
    const parsePrice = (raw) => {
     const s = (raw||'').toString().trim();
     const m = s.match(/^([A-Z]{3})\s+([\d,\.]+)/);
     if (m) return { ccy: m[1], price: parseFloat(m[2].replace(/,/g,'')) || 0 };
     const num = parseFloat(s.replace(/,/g,''));
     return { ccy: proj.sellCcy || 'USD', price: isNaN(num) ? 0 : num };
    };

    // Extract incoterm from first item row that has one
    let sapIncoterm = null;

    // Filter rows into headings (Type=T) and items
    const allDataRows = rows.slice(1);
    const headingRows = allDataRows.filter(r => (r[iType]||'').toString().trim() === 'T');
    const itemRows = allDataRows.filter(r => {
     const type = (r[iType]||'').toString().trim();
     const itemNo = (r[iItemNo]||'').toString().trim();
     return type !== 'T' && itemNo && itemNo !== '0' && !isNaN(itemNo.replace(/[^\d]/g,''));
    });

    if (itemRows.length === 0) {
     alert('No line items found in the file. Make sure this is a SAP B1 Sales Quotation export.');
     return;
    }

    // Extract incoterm from any row that has it
    rows.slice(1).forEach(r => {
     const inc = (r[iIncoterm]||'').toString().trim();
     if (inc && !sapIncoterm) sapIncoterm = INCOTERMS.find(i => inc.toUpperCase().startsWith(i)) || null;
    });

    // Preview before applying
    const previewLines = [
     `Line items to import: ${itemRows.length}`,
     headingRows.length > 0 ? `Section headings: ${headingRows.length} (blank — SAP text content not exported, fill in labels after import)` : null,
     sapIncoterm ? `Incoterm: ${sapIncoterm}` : null,
    ].filter(Boolean);

    const sampleItems = itemRows.slice(0, 3).map(r => {
     const { ccy, price } = parsePrice(r[iUnitPrice]);
     return `  • ${r[iItemNo]} — ${(r[iDesc]||'').toString().slice(0,40)} × ${r[iQty]}${price > 0 ? ` (sell: ${ccy} ${price})` : ''}`;
    });
    if (itemRows.length > 3) sampleItems.push(`  … and ${itemRows.length - 3} more`);

    const msg = [
     `Import ${itemRows.length} line item${itemRows.length!==1?'s':''} from SAP quotation?`,
     '',
     ...previewLines,
     '',
     'Sample items:',
     ...sampleItems,
     '',
     'Items will be appended to the current costing sheet.',
     sapIncoterm ? `Incoterm "${sapIncoterm}" will be set on the project.` : null,
    ].filter(l => l !== null).join('\n');

    if (!window.confirm(msg)) return;

    saveToHistory();

    // Build new items and headings in original SAP row order
    const newRows = [];
    allDataRows.forEach(r => {
     const type   = (r[iType]||'').toString().trim();
     const desc   = (r[iDesc]||'').toString().trim();
     const itemNo = (r[iItemNo]||'').toString().trim();

     if (type === 'T') {
      // Text row — SAP never exports the text content (opens in separate window).
      // Insert a blank PCW heading to preserve the quote structure.
      // User can fill in the heading label after import.
      newRows.push({
       id: uid(), type: 'heading', parentId: null,
       description: '',
       partNumber:'', drawingNumber:'', supplier:'',
       qty:1, unitCost:0, ccy:'USD', source:'',
       margin:0, contingency:0, tariff:0, discount:0,
       leadTime:0, imported:false, afrmm:false,
       customsCharges:0, manualSellPrice:null, notes:'',
      });
     } else if (type !== 'T' && itemNo && itemNo !== '0' && !isNaN(itemNo.replace(/[^\d]/g,''))) {
      // Real item row
      const { ccy, price } = parsePrice(r[iUnitPrice]);
      const discount = parseFloat((r[iDiscount]||'0').toString().replace(/,/g,'')) || 0;
      const leadTime = parseInt((r[iLeadTime]||'0').toString()) || 0;
      const drawing  = (r[iDrawing]||'').toString().trim();
      const notes    = (r[iFreeText]||'').toString().trim();
      newRows.push({
       id: uid(), type: 'item', parentId: null,
       partNumber:    itemNo,
       description:   desc,
       drawingNumber: drawing,
       supplier:      '',
       qty:           parseFloat((r[iQty]||'1').toString().replace(/,/g,'')) || 1,
       unitCost:      0,     // SAP Sales Quotation contains sell prices, not costs
       ccy:           proj.sellCcy || 'USD',
       manualSellPrice: price > 0 ? price : null, // Unit Price is the sell price
       source:        proj.source || 'Quotation',
       margin:        proj.defaultMargin    || 0,
       contingency:   proj.defaultContingency || 0,
       tariff:        0,
       discount,
       leadTime,
       imported:      false,
       afrmm:         false,
       customsCharges: proj.customsCharges ?? 9,
       notes,
      });
     }
    });

    const newItems = newRows.filter(r => r.type === 'item');

    setItems(prev => [...prev, ...newRows]);

    // Apply incoterm if found and project field is empty
    if (sapIncoterm) {
     setProj(p => ({...p, ...((!p.incoterm || p.incoterm === 'EXW') ? {incoterm: sapIncoterm} : {})}));
    }

    // Trigger autofill lookups if feed is connected
    if (DataService.isConnected()) {
     const targets = newItems.filter(i => i.partNumber);
     const updateMap = new Map();
     const CHUNK = 50;
     (async () => {
      for (let ci = 0; ci < targets.length; ci += CHUNK) {
       await Promise.all(targets.slice(ci, ci + CHUNK).map(async item => {
        try {
         const [part, plEntry] = await Promise.all([
          DataService.lookupPart(item.partNumber, proj.bu),
          DataService.lookupPricelist(item.partNumber, proj.bu),
         ]);
         const updates = {};
         if (plEntry) {
          updates._autoPricelist = true; updates.source = 'Pricelist'; updates.manualSellPrice = null;
          if (plEntry.cost !== null) { updates.unitCost = parseFloat(parseFloat(plEntry.cost).toFixed(4)); updates.ccy = 'USD'; }
          if (plEntry.margin !== null) { updates.margin = parseFloat(plEntry.margin.toFixed(2)); }
         }
         if (part) {
          if (part.description && !item.description) { updates.description = part.description; updates._autoDescription = true; }
          if (part.supplier && !isQteItem(item)) { updates.supplier = part.supplier; updates._autoSupplier = true; }
          if (part.drawing && !item.drawingNumber) { updates.drawingNumber = part.drawing; updates._autoDrawing = true; }
         }
         if (Object.keys(updates).length) updateMap.set(item.id, updates);
        } catch(e) {}
       }));
       await new Promise(r => setTimeout(r, 0));
      }
      if (updateMap.size > 0) {
       setItems(prev => prev.map(r => updateMap.has(r.id) ? {...r, ...updateMap.get(r.id)} : r));
      }
     })();
    }

    const headingCount = newRows.filter(r => r.type === 'heading').length;
    alert(
     `✓ Imported ${newItems.length} item${newItems.length!==1?'s':''}${headingCount > 0 ? ` and ${headingCount} heading${headingCount!==1?'s':''}` : ''} from SAP quotation.` +
     (DataService.isConnected() ? ' Autofill lookups running in background.' : '')
    );
   } catch(err) {
    alert('Import failed: ' + err.message);
    console.error('[PCW SAP import]', err);
   }
  };
  reader.readAsArrayBuffer(file);
 };
 inp.click();
}, [proj, setItems, setProj, saveToHistory]);

const importSharePointPaste = useCallback(() => {
 if (proj.locked) return;

 const text = window.prompt(
  'Paste the SharePoint folder properties here.\n\n' +
  'In SharePoint, open the folder properties panel, select all text (Ctrl+A) and copy (Ctrl+C), then paste below:'
 );
 if (!text || !text.trim()) return;

 try {
  const lines = text.split(/\r?\n/).map(l => l.trim());

  // First two non-empty lines are the quote ref and project name (before any labels)
  const KNOWN_LABELS = [
   'customer name','customer number','customer location - city, state',
   'customer location - country','year','sales manager','inside sales (sa/pe)',
   'sales order no. (project #)','project manager','project engineer',
   'segment (required)','plant rate','feed material',"operation's folder",
   'salesforce link','sharepoint link','salesforce url','sharepoint url',
  ];
  const isLabel = l => KNOWN_LABELS.includes(l.toLowerCase());

  // Extract header lines (ref + project name) — lines before the first known label
  const firstLabelIdx = lines.findIndex(l => isLabel(l));
  const headerLines = lines.slice(0, firstLabelIdx < 0 ? 2 : firstLabelIdx).filter(Boolean);
  const quoteRef  = headerLines[0] || null;
  const projName  = headerLines[1] || null;

  // Parse label/value pairs — label on one line, value on the next non-empty line
  // If the next line is itself a label, the current field is empty
  const parsed = {};
  const bodyLines = firstLabelIdx >= 0 ? lines.slice(firstLabelIdx) : [];
  for (let i = 0; i < bodyLines.length; i++) {
   const line = bodyLines[i];
   if (!isLabel(line)) continue;
   // Look ahead for value — next non-empty line that isn't itself a label
   let value = null;
   for (let j = i + 1; j < bodyLines.length; j++) {
    if (!bodyLines[j]) continue; // skip blank lines
    if (isLabel(bodyLines[j])) break; // next label — this field is empty
    value = bodyLines[j];
    break;
   }
   parsed[line.toLowerCase()] = value || null;
  }

  const get = (...keys) => { for (const k of keys) { if (parsed[k]) return parsed[k]; } return null; };

  const custName    = get('customer name');
  const custCode    = get('customer number');
  const custCountry = get('customer location - country');
  const outsideSales = get('sales manager');
  const insideSales = get('inside sales (sa/pe)');
  const sfLink      = (() => { const v = get('salesforce link','salesforce url'); return v && v.startsWith('http') ? v : null; })();
  const spLink      = (() => { const v = get('sharepoint link','sharepoint url'); return v && v.startsWith('http') ? v : null; })();

  // Build field list for overwrite detection (same pattern as Salesforce import)
  const allFields = [
   { label: 'Quote Ref',        csvVal: quoteRef,     currentVal: proj.ref,                apply: () => setProj(p=>({...p,ref:quoteRef})) },
   { label: 'Project Name',     csvVal: projName,     currentVal: proj.name,               apply: () => setProj(p=>({...p,name:projName})) },
   { label: 'Customer Name',    csvVal: custName,     currentVal: proj.customer?.name,     apply: () => setProj(p=>({...p,customer:{...p.customer,name:custName}})) },
   { label: 'Customer Code',    csvVal: custCode,     currentVal: proj.customer?.code,     apply: () => setProj(p=>({...p,customer:{...p.customer,code:custCode}})) },
   { label: 'Customer Country', csvVal: custCountry,  currentVal: proj.customer?.country,  apply: () => setProj(p=>({...p,customer:{...p.customer,country:custCountry}})) },
   { label: 'Outside Sales',    csvVal: outsideSales, currentVal: proj.outsideSales,       apply: () => setProj(p=>({...p,outsideSales})) },
   { label: 'Inside Sales',     csvVal: insideSales,  currentVal: proj.insideSales,        apply: () => setProj(p=>({...p,insideSales})) },
   { label: 'Salesforce Link',  csvVal: sfLink,       currentVal: sched.salesforceLink,    apply: () => setSched(p=>({...p,salesforceLink:sfLink})) },
   { label: 'SharePoint Link',  csvVal: spLink,       currentVal: sched.sharepointLink,    apply: () => setSched(p=>({...p,sharepointLink:spLink})) },
  ].filter(f => f.csvVal);

  if (!allFields.length) {
   alert('No recognisable fields found. Make sure you copied the full SharePoint properties panel text.');
   return;
  }

  const newFields       = allFields.filter(f => !f.currentVal || f.currentVal === f.csvVal);
  const overwriteFields = allFields.filter(f =>  f.currentVal && f.currentVal !== f.csvVal);
  const toApply = [...newFields];

  if (overwriteFields.length > 0) {
   const overwriteMsg = overwriteFields
    .map(f => `  ${f.label}:\n    Current: "${f.currentVal}"\n    Import:  "${f.csvVal}"`)
    .join('\n\n');
   const proceed = window.confirm(
    `The following ${overwriteFields.length} field${overwriteFields.length!==1?'s':''} already have values that would be overwritten:\n\n${overwriteMsg}\n\nClick OK to overwrite all, or Cancel to keep existing values.`
   );
   if (proceed) toApply.push(...overwriteFields);
  } else {
   const preview = newFields.map(f => `  ${f.label}: ${f.csvVal}`).join('\n');
   if (!window.confirm(`Import the following fields from SharePoint?\n\n${preview}`)) return;
  }

  if (!toApply.length) { alert('No fields imported.'); return; }
  toApply.forEach(f => f.apply());

  const skipped = overwriteFields.length - toApply.filter(f => overwriteFields.includes(f)).length;
  alert(`✓ Imported ${toApply.length} field${toApply.length!==1?'s':''} from SharePoint properties.${skipped>0?`\n${skipped} existing value${skipped!==1?'s were':' was'} kept.`:''}`);

 } catch(err) {
  alert('Import failed: ' + err.message);
 }
}, [proj, sched, setProj, setSched]);

const importSalesforceCSV = useCallback(() => {
 if (proj.locked) return;
 const inp = document.createElement('input');
 inp.type = 'file';
 inp.accept = '.csv,.txt';
 inp.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
   try {
    const text = ev.target.result;
    // Parse CSV respecting quoted fields
    const parseCSVRow = row => {
     const fields = [];
     let cur = '', inQ = false;
     for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
      else cur += ch;
     }
     fields.push(cur.trim());
     return fields;
    };
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { alert('CSV appears empty — expected a header row and at least one data row.'); return; }
    const headers = parseCSVRow(lines[0]).map(h => h.replace(/^"|"$/g,'').trim().toLowerCase());
    const values  = parseCSVRow(lines[1]).map(v => v.replace(/^"|"$/g,'').trim());
    const get = (...keys) => {
     for (const k of keys) {
      const idx = headers.indexOf(k.toLowerCase());
      if (idx !== -1 && values[idx] && values[idx] !== '.' && values[idx] !== '-') return values[idx];
     }
     return null;
    };

    // Auto-detect report type by presence of case-specific headers
    const isCaseReport = headers.includes('case number') || headers.includes('case url') || headers.includes('date/time opened');
    const reportType = isCaseReport ? 'Case' : 'Opportunity';

    // ── Fields common to both report types ───────────────────────────────
    const custName = get('account name','customer name','account');
    const custCode = get('sap bp code','bp code','customer code','account code');
    const quoteRef = get('quote #','quote number','quote ref','quote');
    const rawSP    = get('sharepoint url','sharepoint');
    const spLink   = rawSP && rawSP.startsWith('http') ? rawSP : null;

    // ── Opportunity-specific fields ───────────────────────────────────────
    let projName = null, sfLink = null, incoterm = null, oppNum = null, outsideSales = null, revNum = null, bu = null;
    if (!isCaseReport) {
     projName     = get('opportunity name','project name','name');
     const rawInco = get('incoterms','incoterm');
     incoterm     = rawInco ? (INCOTERMS.find(i => rawInco.toUpperCase().startsWith(i)) || null) : null;
     sfLink       = get('opportunity url','salesforce url','sf url');
     oppNum       = get('opportunity number','opportunity no','opp number');
     outsideSales = get('opportunity owner name','opportunity owner','outside sales','owner name');
     revNum       = get('latest proposal revision','revision #','revision number','revision');
     const rawBU  = get('cpm office location','office location','business unit','bu');
     bu = rawBU ? (BUS.find(b => rawBU.toUpperCase() === b.toUpperCase()) || null) : null;
    }

    // ── Case-specific fields ──────────────────────────────────────────────
    let rfqDate = null, insideSales = null;
    if (isCaseReport) {
     projName    = get('subject','project name','name');
     sfLink      = get('case url','salesforce url','sf url');
     revNum      = get('revision #','revision number','revision');
     insideSales = get('case owner','owner','inside sales');

     // Parse "DD/MM/YYYY, HH:MM" → "YYYY-MM-DD"
     const rawDate = get('date/time opened','date opened','opened');
     if (rawDate) {
      const datePart = rawDate.split(',')[0].trim(); // strip time
      const [d, m, y] = datePart.split('/');
      if (d && m && y) rfqDate = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
     }
    }

    // ── Split into new fields vs overwrites ──────────────────────────────
    // Each entry: { label, csvVal, currentVal, applyFn }
    const allFields = [
     { label: 'Customer Name',    csvVal: custName,    currentVal: proj.customer?.name,    apply: () => setProj(p=>({...p,customer:{...p.customer,name:custName}})) },
     { label: 'SAP BP Code',      csvVal: custCode,    currentVal: proj.customer?.code,    apply: () => setProj(p=>({...p,customer:{...p.customer,code:custCode}})) },
     { label: 'Project Name',     csvVal: projName,    currentVal: proj.name,              apply: () => setProj(p=>({...p,name:projName})) },
     { label: 'Quote Ref',        csvVal: quoteRef,    currentVal: proj.ref,               apply: () => setProj(p=>({...p,ref:quoteRef})) },
     { label: 'Revision',         csvVal: revNum,      currentVal: proj.rev,               apply: () => setProj(p=>({...p,rev:revNum})) },
     { label: 'Business Unit',    csvVal: bu,          currentVal: proj.bu,                apply: () => setProj(p=>({...p,bu})) },
     { label: 'RFQ Date',         csvVal: rfqDate,     currentVal: proj.rfqDate,           apply: () => setProj(p=>({...p,rfqDate})) },
     { label: 'Inside Sales',     csvVal: insideSales, currentVal: proj.insideSales,       apply: () => setProj(p=>({...p,insideSales})) },
     { label: 'Outside Sales',    csvVal: outsideSales,currentVal: proj.outsideSales,      apply: () => setProj(p=>({...p,outsideSales})) },
     { label: 'Opportunity No',   csvVal: oppNum,      currentVal: null,                   apply: () => {} }, // display only
     { label: 'Incoterm',         csvVal: incoterm,    currentVal: proj.incoterm,          apply: () => setProj(p=>({...p,incoterm})) },
     { label: 'Salesforce Link',  csvVal: sfLink,      currentVal: sched.salesforceLink,   apply: () => setSched(p=>({...p,salesforceLink:sfLink})) },
     { label: 'SharePoint Link',  csvVal: spLink,      currentVal: sched.sharepointLink,   apply: () => setSched(p=>({...p,sharepointLink:spLink})) },
    ].filter(f => f.csvVal); // only fields present in the CSV

    if (!allFields.length) { alert('No recognisable fields found in the CSV. Check the column headers match the expected Salesforce report format.'); return; }

    // Separate into clean fills vs overwrites
    const newFields       = allFields.filter(f => !f.currentVal || f.currentVal === f.csvVal);
    const overwriteFields = allFields.filter(f =>  f.currentVal && f.currentVal !== f.csvVal);

    // If there are overwrites, ask field-by-field which to apply
    const toApply = [...newFields]; // always apply new fields

    if (overwriteFields.length > 0) {
     const overwriteMsg = overwriteFields
      .map(f => `  ${f.label}:\n    Current: "${f.currentVal}"\n    Import:  "${f.csvVal}"`)
      .join('\n\n');
     const proceed = window.confirm(
      `The following ${overwriteFields.length} field${overwriteFields.length!==1?'s':''} already have values that would be overwritten:\n\n${overwriteMsg}\n\nClick OK to overwrite all, or Cancel to skip these and only fill empty fields.`
     );
     if (proceed) toApply.push(...overwriteFields);
     // If cancelled, toApply already has only the new (blank) fields — skip overwrites
    } else {
     // No overwrites — single clean confirmation
     const preview = newFields.map(f => `  ${f.label}: ${f.csvVal}`).join('\n');
     if (!window.confirm(`Import the following fields from the Salesforce ${reportType} report?\n\n${preview}`)) return;
    }

    if (!toApply.length) { alert('No fields imported.'); return; }

    // Apply all approved fields
    toApply.forEach(f => f.apply());

    // ── Silent BP enrichment from feed ───────────────────────────────────
    // The BP code may have just been set (or was already set). Either way,
    // look it up in the Global BPs sheet and fill any blanks that the CSV
    // didn't cover. Done silently — BP sheet is authoritative reference data.
    const resolvedCode = custCode || proj.customer?.code;
    if (resolvedCode && DataService.isConnected()) {
     DataService.lookupCustomerBP(resolvedCode).then(bp => {
      if (!bp) return;
      setProj(p => {
       const patch = {};
       // Sell currency — only fill if blank and BP has a clean named currency
       if (!p.sellCcy || p.sellCcy === 'USD') {
        // Only override USD default if BP gives us something different and explicit
        if (bp.currency && bp.currency !== 'USD') patch.sellCcy = bp.currency;
       }
       if (!p.sellCcy && bp.currency) patch.sellCcy = bp.currency;
       // Payment terms — fill if blank
       if (!p.paymentTerms && bp.paymentTerms) patch.paymentTerms = bp.paymentTerms;
       // Country — fill if blank
       const currentCountry = p.customer?.country;
       const customerPatch = {};
       if (!currentCountry && bp.country) customerPatch.country = bp.country;
       // Inside sales — fill if blank (BP sales person as fallback)
       if (!p.insideSales && bp.salesPerson && bp.salesPerson !== '-No Sales Employee-') {
        patch.insideSales = bp.salesPerson;
       }
       if (Object.keys(customerPatch).length) {
        patch.customer = {...p.customer, ...customerPatch};
       }
       return Object.keys(patch).length ? {...p, ...patch} : p;
      });
