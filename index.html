const openCompare = useCallback(() => {
 const input = document.createElement('input');
 input.type = 'file';
 input.accept = '.pcw,.json';
 input.onchange = (e) => {
 const file = e.target.files[0];
 if (!file) return;
 setCompareModal({loading: true, data: null});
 const reader = new FileReader();
 reader.onload = (ev) => {
  try {
  const other = JSON.parse(ev.target.result);
  const otherItems = (other.items || []).filter(i => i.type !== 'heading');
  const thisItems  = items.filter(i => i.type !== 'heading');
  const otherProj  = other.project || {};

  function calcSP(item, projData) {
   if (item.manualSellPrice !== null && item.manualSellPrice !== undefined) return item.manualSellPrice;
   const cost = (item.unitCost || 0) * (item.qty || 1);
   const tariffed = cost * (1 + (item.tariff || 0) / 100);
   const landed = tariffed; // no freight in simple calc
   const sp = applyMargins(landed, {
   margin: item.margin || 0,
   contingency: item.contingency || 0,
   dealer: projData.defaultDealer || 0,
   discountMitigation: projData.discountMitigation || 0,
   });
   return sp / (item.qty || 1);
  }

  const otherByPN = {};
  const otherById = {};
  otherItems.forEach(i => {
   otherById[i.id] = i;
   if (i.partNumber && i.partNumber.trim()) {
   const k = i.partNumber.trim().toLowerCase();
   if (!otherByPN[k]) otherByPN[k] = i;
   }
  });

  const added = [];    // in current, not in other
  const removed = [];  // in other, not in current
  const changed = [];  // in both, fields differ
  const unchanged = [];

  const matchedOtherIds = new Set();

  thisItems.forEach(cur => {
   const pnKey = cur.partNumber ? cur.partNumber.trim().toLowerCase() : null;
   const prev = (pnKey && otherByPN[pnKey]) || otherById[cur.id];
   if (!prev) {
   added.push(cur);
   return;
   }
   matchedOtherIds.add(prev.id);

   const fields = [];
   const check = (label, a, b, format) => {
   const av = a ?? 0, bv = b ?? 0;
   if (Math.abs(Number(av) - Number(bv)) > 0.0001 || String(av) !== String(bv)) {
    fields.push({label, prev: b, curr: a, format});
   }
   };
   check('Unit Cost',   cur.unitCost,   prev.unitCost,   'money');
   check('Qty',         cur.qty,         prev.qty,        'qty');
   check('Margin %',    cur.margin,      prev.margin,     'pct');
   check('Contingency %', cur.contingency, prev.contingency, 'pct');
   check('Discount %',  cur.discount,    prev.discount,   'pct');
   check('Tariff %',    cur.tariff,      prev.tariff,     'pct');
   check('Currency',    cur.ccy,         prev.ccy,        'text');
   check('Supplier',    cur.supplier,    prev.supplier,   'text');
   check('Description', cur.description, prev.description,'text');
   check('Drawing No',  cur.drawingNumber, prev.drawingNumber, 'text');
   check('Lead Time',   cur.leadTime,    prev.leadTime,   'qty');

   const prevSP = calcSP(prev, otherProj) * (prev.qty || 1);
   const currSP = calcSP(cur, proj) * (cur.qty || 1);
   const spDelta = currSP - prevSP;

   const prevCost = (prev.unitCost || 0) * (prev.qty || 1);
   const currCost = (cur.unitCost || 0) * (cur.qty || 1);

   if (fields.length > 0) {
   changed.push({cur, prev, fields, spDelta, prevSP, currSP, prevCost, currCost});
   } else {
   unchanged.push(cur);
   }
  });

  otherItems.forEach(prev => {
   if (!matchedOtherIds.has(prev.id)) {
   const pnKey = prev.partNumber ? prev.partNumber.trim().toLowerCase() : null;
   const alreadyMatched = pnKey && thisItems.some(c => c.partNumber && c.partNumber.trim().toLowerCase() === pnKey);
   if (!alreadyMatched) removed.push(prev);
   }
  });

  const totalSpDeltaChanged = changed.reduce((s, c) => s + c.spDelta, 0);
  const addedSP  = added.reduce((s, i) => s + calcSP(i, proj) * (i.qty || 1), 0);
  const removedSP = removed.reduce((s, i) => s + calcSP(i, otherProj) * (i.qty || 1), 0);
  const netSpDelta = totalSpDeltaChanged + addedSP - removedSP;

  const thisTotal  = thisItems.reduce((s, i) => s + calcSP(i, proj) * (i.qty || 1), 0);
  const otherTotal = otherItems.reduce((s, i) => s + calcSP(i, otherProj) * (i.qty || 1), 0);

  setCompareModal({
   loading: false,
   data: {
   otherRef: otherProj.ref || other.project?.name || file.name,
   otherDate: other.exportDate ? other.exportDate.slice(0,10) : '—',
   thisRef: proj.ref || proj.name || 'Current',
   added, removed, changed, unchanged,
   netSpDelta, thisTotal, otherTotal,
   ccy: proj.sellCcy || 'USD',
   }
  });
  } catch(err) {
  setCompareModal({loading: false, data: null, error: err.message});
  }
 };
 reader.readAsText(file);
 };
 input.click();
}, [items, proj]);

const uploadJSON = useCallback(() => {
 const input = document.createElement('input');
 input.type = 'file';
 input.accept = '.pcw,.json';
 input.onchange = (e) => {
 const file = e.target.files[0];
 if (!file) return;
 if (file.size > 5 * 1024 * 1024) {
  alert(`File is too large (${(file.size / 1024 / 1024).toFixed(1)} MB). Maximum supported size is 5 MB.`);
  return;
 }
 const reader = new FileReader();
 reader.onload = async (event) => {
  try {
  const raw = JSON.parse(event.target.result);
  if (Array.isArray(raw.items) && raw.items.length > 2500) {
   const proceed = window.confirm(
    `This file contains ${raw.items.length.toLocaleString()} items, which exceeds the recommended limit of 2,500.\n\nLoading very large BOMs may affect performance. Continue?`
   );
   if (!proceed) return;
  }

  if (raw.integrity) {
   const { integrity, ...payload } = raw;
   const computedHash = await sha256(JSON.stringify(payload));
   if (computedHash !== integrity) {
   const proceed = window.confirm(
    '⚠ Integrity check failed\n\n' +
    'This file may have been modified outside the app. ' +
    'The stored hash does not match the file contents.\n\n' +
    'This could indicate accidental corruption or deliberate tampering.\n\n' +
    'Load anyway?'
   );
   if (!proceed) return;
   }
  }

  const data = migrateData(raw);

  const errors = validateLoadedData(data);
  if (errors.length > 0) {
   const proceed = window.confirm(
   '⚠ File validation warnings:\n\n' +
   errors.slice(0, 5).join('\n') +
   (errors.length > 5 ? `\n...and ${errors.length - 5} more` : '') +
   '\n\nLoad anyway?'
   );
   if (!proceed) return;
  }

  // Support both key conventions:
  // - Legacy upload format: project / freight / schedule
  // - Auto-save / localStorage format: proj / frt / sched
  const projData = data.project || data.proj;
  const frtData  = data.freight  || data.frt;
  const schedData = data.schedule || data.sched;
  if (projData) {
   const migratedProj = { ...projData, rates: projData.rates || {...DEF_RATES} };
   setProj(migratedProj);
  }
  if (data.items) {
   // Migrate _rowColor from old item format into separate rowColors map
   const migratedColors = {};
   const cleanItems = data.items.map(item => {
    if (item._rowColor) { migratedColors[item.id] = item._rowColor; }
    const {_rowColor, ...rest} = item;
    return rest;
   });
   setItems(cleanItems);
   if (Object.keys(migratedColors).length) setRowColors(prev => ({...prev, ...migratedColors}));
  }
  if (data.rowColors) setRowColors(data.rowColors);
  if (frtData)   setFrt(frtData);
  if (schedData) setSched(schedData);
  if (data.brazilTaxes)  setBrazilTaxes(data.brazilTaxes);
  if (data.brazilStates) setBrazilStates(data.brazilStates);
  if (data.forceAllocToPricelist !== undefined) setForceAllocToPricelist(data.forceAllocToPricelist);
  if (data.forceAllocToZeroCost !== undefined) setForceAllocToZeroCost(data.forceAllocToZeroCost);
  if (data.distributeOutboundFreight !== undefined) setDistributeOutboundFreight(data.distributeOutboundFreight);
  if (data.language)   setLanguage(data.language);
  if (data.dateFormat) setDateFormat(data.dateFormat);

  setHasUnsavedChanges(false);
  hasUnsavedChangesRef.current = false;
  setLastSavedAt(new Date());

  // Disconnect any connected auto-save file — the loaded project is a different
  // file and must not silently overwrite the previously connected location.
  const hadSaveFile = !!saveFileHandleRef.current;
  if (hadSaveFile) disconnectSaveFile();

  const savedWith = data.appVersion ? ` (saved with ${data.appVersion})` : '';
  const fileNote = hadSaveFile ? '\n\nAuto-save file disconnected — connect a new save location from Setup \u2192 Save & Restore.' : '';
  alert(`Project loaded successfully!${savedWith}${fileNote}`);
  } catch (err) {
  alert('Error loading file: ' + err.message);
  }
 };
 reader.readAsText(file);
 };
 input.click();
}, []);

const writeSaveFile = useCallback(async (dataStr) => {
 if (!saveFileHandleRef.current) return;
 try {
  const writable = await saveFileHandleRef.current.createWritable();
  await writable.write(dataStr);
  await writable.close();
  setSaveFileStatus('saved');
  setSaveFileStale(false);
  setTimeout(() => setSaveFileStatus(null), 2000);
 } catch(e) {
  // Handle invalidated (e.g. file moved/deleted) vs permission denied
  if (e.name === 'NotAllowedError' || e.name === 'SecurityError') {
   setSaveFileStale(true);
  } else {
   setSaveFileStatus('error');
   setTimeout(() => setSaveFileStatus(null), 3000);
  }
 }
}, []);

const connectSaveFile = useCallback(async (existingFile = false) => {
 if (!window.showSaveFilePicker && !window.showOpenFilePicker) {
  alert('File System Access API is not supported in this browser. Use Chrome or Edge.');

   [handle] = await window.showOpenFilePicker({
    types: [{description: 'PCW Save File', accept: {'application/json': ['.pcw', '.json']}}],
    multiple: false,

    suggestedName: getPackageName() + '.pcw',

   });
  }
  saveFileHandleRef.current = handle;
  setSaveFileConnected(true);
  setSaveFileStale(false);

  await writeSaveFile(data);
 } catch(e) {

}, [proj, items, frt, sched, brazilTaxes, brazilStates, forceAllocToPricelist, forceAllocToZeroCost, distributeOutboundFreight, language, dateFormat, rowColors, writeSaveFile]);

 {col:'partNo',     field:'partNumber',   parse: v=>v},
 {col:'description',field:'description',  parse: v=>v},
 {col:'drawingNo',  field:'drawingNumber',parse: v=>v},
 {col:'supplier',   field:'supplier',     parse: v=>v},
 {col:'qty',        field:'qty',          parse: v=>parseFloat(v)||1},

 {col:'margins',    field:'margin',       parse: v=>parseFloat(v)||0},
 {col:'leadTime',   field:'leadTime',     parse: v=>parseInt(v)||0},

const executePaste = useCallback((clipboardText, anchorItemId, anchorColKey) => {
 if (!clipboardText) return;
 const rows = clipboardText.split('\n').map(r=>r[r.length-1]==='\r'?r.slice(0,-1):r).filter(r=>r.trim());
 if (rows.length === 0) return;
 const parsedRows = rows.map(r => r.split('	').map(c => c.trim()));
 const numPasteCols = Math.max(...parsedRows.map(r => r.length));

 const visibleItems = items.filter(i => i.type !== 'heading');

 // Show spinner immediately, defer heavy work to next frame so browser can paint
 const LARGE_PASTE = rows.length > 20;
 if (LARGE_PASTE) setPasteProcessing(true);

 const doWork = async () => {
 if (anchorItemId) {
 const startRowIdx = visibleItems.findIndex(i => i.id === anchorItemId);
 if (startRowIdx !== -1) {
  const startColIdx = Math.max(0, PASTE_COL_MAP.findIndex(c => c.col === anchorColKey));
  const colSlice = PASTE_COL_MAP.slice(startColIdx, startColIdx + numPasteCols);
  const patchMap = {};
  const newRows = [];
  parsedRows.forEach((pasteRow, ri) => {
  const targetIdx = startRowIdx + ri;
  const patch = {};
  colSlice.forEach((colDef, ci) => {
   const raw = pasteRow[ci] ?? '';
   if (raw !== '') patch[colDef.field] = colDef.parse(raw);
  });
  if (!Object.keys(patch).length) return;
  if (targetIdx < visibleItems.length) {
   patchMap[visibleItems[targetIdx].id] = patch;
  } else {
   newRows.push({
   id:uid(), type:'item', parentId:null,
   partNumber:'', description:'', drawingNumber:'', supplier:'',
   qty:1, unitCost:0, ccy:'USD', source:'',
   margin:proj.defaultMargin||0, contingency:proj.defaultContingency||0,
   tariff:0, discount:0, leadTime:0, imported:false, afrmm:false, manualSellPrice:null, notes:'',
   ...patch
   });
  }
  });
  Object.values(patchMap).forEach(patch => {
  if (patch.description  !== undefined) patch._autoDescription = false;
  if (patch.drawingNumber !== undefined) patch._autoDrawing     = false;
  if (patch.supplier     !== undefined) patch._autoSupplier    = false;
  });
  setItems(prev => {
  const next = prev.map(item => patchMap[item.id] ? {...item, ...patchMap[item.id]} : item);
  return newRows.length ? [...next, ...newRows] : next;
  });
  if (LARGE_PASTE) setPasteProcessing(false);
  const filled = Object.keys(patchMap).length;
  const added = newRows.length;
  alert(added > 0
  ? `✅ Filled ${filled} row${filled!==1?'s':''}, added ${added} new`
  : `✅ Filled ${filled} row${filled!==1?'s':''}`);

  const lookupTargets = [];
  Object.entries(patchMap).forEach(([id, patch]) => {
  if (patch.partNumber) lookupTargets.push({id, partNumber: patch.partNumber, patch});
  });
  newRows.forEach(r => {
  if (r.partNumber) lookupTargets.push({id: r.id, partNumber: r.partNumber, patch: r});
  });

  // Supplier-only currency lookup for rows without a part number
  if (DataService.isConnected()) {
  const supplierOnlyTargets = [];
  Object.entries(patchMap).forEach(([id, patch]) => {
   if (!patch.partNumber && patch.supplier) supplierOnlyTargets.push({id, supplier: patch.supplier});
  });
  newRows.forEach(r => {
   if (!r.partNumber && r.supplier) supplierOnlyTargets.push({id: r.id, supplier: r.supplier});
  });
  if (supplierOnlyTargets.length) {
   const supCcyMap = new Map();
   await Promise.all(supplierOnlyTargets.map(async ({id, supplier}) => {
   const ccy = await DataService.lookupSupplierBPCurrency(supplier).catch(()=>null);
   if (ccy) supCcyMap.set(id, ccy);
   }));
   if (supCcyMap.size > 0) {
   setItems(prev => prev.map(item => supCcyMap.has(item.id) ? {...item, ccy: supCcyMap.get(item.id)} : item));
   }
  }
  }
  if (lookupTargets.length && DataService.isConnected()) {
  // Collect all lookup results then apply in one setItems call
  const lookupUpdateMap = new Map();
  const lookupBrazilUpdates = {};
  const CHUNK = 50;
  for (let ci = 0; ci < lookupTargets.length; ci += CHUNK) {
   await Promise.all(lookupTargets.slice(ci, ci + CHUNK).map(async ({id, partNumber, patch}) => {
   try {
    const [part, plEntry] = await Promise.all([
    DataService.lookupPart(partNumber, proj.bu),
    DataService.lookupPricelist(partNumber, proj.bu),
    ]);
    const currentItem = itemsRef.current.find(i => i.id === id);
    if (!currentItem) return;
    const updates = {};
    if (plEntry && (!currentItem.unitCost || currentItem._autoPricelist === true)) {
    updates._autoPricelist = true; updates.source = 'Pricelist'; updates.manualSellPrice = null;
    if (plEntry.cost !== null) { updates.unitCost = parseFloat(parseFloat(plEntry.cost).toFixed(4)); updates.ccy = 'USD'; }
    if (plEntry.margin !== null) { updates.margin = parseFloat(plEntry.margin.toFixed(2)); }
    }
    if (part) {
    if (part.description && (!currentItem.description   || currentItem._autoDescription === true)) { updates.description   = part.description; updates._autoDescription = true; }
    if (part.supplier    && (!currentItem.supplier      || currentItem._autoSupplier    === true)) { updates.supplier      = part.supplier;    updates._autoSupplier    = true; }
    if (part.drawing     && (!currentItem.drawingNumber || currentItem._autoDrawing     === true)) { updates.drawingNumber = part.drawing;     updates._autoDrawing     = true; }
    }
    // Supplier currency lookup — use the supplier that will end up on this item
    const supplierName = updates.supplier || patch.supplier || currentItem.supplier;
    if (supplierName && !updates.ccy) {
    const supCcy = await DataService.lookupSupplierBPCurrency(supplierName).catch(()=>null);
    if (supCcy) updates.ccy = supCcy;
    }
    if (Object.keys(updates).length) lookupUpdateMap.set(id, updates);
    if (isCIT) {
    const ncmEntry = await DataService.lookupNCM(partNumber);
    if (ncmEntry) {
     const ex = {}; const nu = {};
     if (ncmEntry.ncm  && !ex.ncm)  nu.ncm = ncmEntry.ncm;
     if (ncmEntry.ipi !== null && !ex.ipi) nu.ipi = ncmEntry.ipi;
     if (Object.keys(nu).length) lookupBrazilUpdates[id] = {...ex, ...nu};
    }
    }
   } catch(e) {}
   }));
   await new Promise(r => setTimeout(r, 0));
  }
  if (lookupUpdateMap.size > 0)
   setItems(prev => prev.map(item => lookupUpdateMap.has(item.id) ? {...item, ...lookupUpdateMap.get(item.id)} : item));
  if (Object.keys(lookupBrazilUpdates).length > 0)
   setBrazilTaxes(prev => ({...prev, ...lookupBrazilUpdates}));
  }
  return;
 }
 }

 const newItems = [];
 parsedRows.forEach(cols => {
 const partNo = cols[0]||'', desc = cols[1]||'';
 if (!partNo && !desc) return;
 newItems.push({
  id:uid(), type:'item', parentId:null,
  partNumber:partNo, description:desc, drawingNumber:cols[2]||'',
  supplier:cols[3]||'', qty:parseFloat(cols[4])||1, unitCost:parseFloat(cols[5])||0,
  ccy:(cols[6]||'USD').toUpperCase(), tariff:parseFloat(cols[7])||0,
  margin:parseFloat(cols[8])||proj.defaultMargin||0,

  discount:parseFloat(cols[10])||0, source:cols[11]||'',
  leadTime:0, imported:false, afrmm:false, manualSellPrice:null, notes:cols[12]||''
 });
 });
 if (newItems.length) {
 setItems(prev => [...prev, ...newItems]);
 if (LARGE_PASTE) setPasteProcessing(false);
 if (DataService.isConnected()) {
  const pasteUpdateMap = new Map();
  const pasteBrazilUpdates = {};
  const CHUNK = 50;
  for (let ci = 0; ci < newItems.length; ci += CHUNK) {
  await Promise.all(newItems.slice(ci, ci + CHUNK).map(async item => {
   try {
   const updates = {};
   if (item.partNumber) {
    const [part, plEntry] = await Promise.all([
    DataService.lookupPart(item.partNumber, proj.bu),
    DataService.lookupPricelist(item.partNumber, proj.bu),
    ]);
    if (plEntry && (!item.unitCost || item._autoPricelist === true)) {
    updates._autoPricelist = true; updates.source = 'Pricelist'; updates.manualSellPrice = null;
    if (plEntry.cost !== null) { updates.unitCost = parseFloat(parseFloat(plEntry.cost).toFixed(4)); updates.ccy = 'USD'; }
    if (plEntry.margin !== null) { updates.margin = parseFloat(plEntry.margin.toFixed(2)); }
    }
    if (part) {
    if (part.description && (!item.description   || item._autoDescription === true)) { updates.description   = part.description; updates._autoDescription = true; }
    if (part.supplier    && (!item.supplier      || item._autoSupplier    === true)) { updates.supplier      = part.supplier;    updates._autoSupplier    = true; }
    if (part.drawing     && (!item.drawingNumber || item._autoDrawing     === true)) { updates.drawingNumber = part.drawing;     updates._autoDrawing     = true; }
    }
    if (isCIT) {
    const ncmEntry = await DataService.lookupNCM(item.partNumber);
    if (ncmEntry) {
     const ex = {}; const nu = {};
     if (ncmEntry.ncm  && !ex.ncm)  nu.ncm = ncmEntry.ncm;
     if (ncmEntry.ipi !== null && !ex.ipi) nu.ipi = ncmEntry.ipi;
     if (Object.keys(nu).length) pasteBrazilUpdates[item.id] = {...ex, ...nu};
    }
    }
   }
   // Supplier currency — use supplier from part lookup or from pasted data
   const supplierName = updates.supplier || item.supplier;
   if (supplierName && !updates.ccy) {
    const supCcy = await DataService.lookupSupplierBPCurrency(supplierName).catch(()=>null);
    if (supCcy) updates.ccy = supCcy;
   }
   if (Object.keys(updates).length) pasteUpdateMap.set(item.id, updates);
   } catch(e) {}
  }));
  await new Promise(r => setTimeout(r, 0));
  }
  if (pasteUpdateMap.size > 0)
  setItems(prev => prev.map(r => pasteUpdateMap.has(r.id) ? {...r, ...pasteUpdateMap.get(r.id)} : r));
  if (Object.keys(pasteBrazilUpdates).length > 0)
  setBrazilTaxes(prev => ({...prev, ...pasteBrazilUpdates}));
 }
 alert(`✅ Pasted ${newItems.length} item${newItems.length!==1?'s':''} from Excel`);
 }
 }; // end doWork

 if (LARGE_PASTE) {
 // Yield to browser so spinner renders before the synchronous heavy work
 setTimeout(doWork, 50);
 } else {
 doWork();
 }
}, [items, proj.defaultMargin, proj.defaultContingency, proj.bu, proj.sellCcy, proj.rates, setPasteProcessing]);

const handlePaste = useCallback((e) => {
 const clipboardData = e.clipboardData.getData('text');
 if (!clipboardData) return;

 const isMultiCell = clipboardData.includes('\t') || clipboardData.split('\n').filter(r=>r.trim()).length > 1;

 if ((e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') && !isMultiCell) return;

 e.preventDefault();
 e.stopPropagation();

 let anchorItemId = null, anchorColKey = null;
 const dataCell = e.target.dataset?.cell;
 if (dataCell) {
 const firstDash = dataCell.indexOf('-');
 if (firstDash !== -1) {
  anchorItemId = dataCell.substring(0, firstDash);
  anchorColKey = dataCell.substring(firstDash + 1);
 }
 }
 if (!anchorItemId && focusedCell) {
 anchorItemId = focusedCell.itemId;
 anchorColKey = focusedCell.column;
 }

 executePaste(clipboardData, anchorItemId, anchorColKey);
}, [focusedCell, executePaste]);

const handleCellPaste = useCallback((e, colKey, itemId) => {
 const clipboardData = e.clipboardData.getData('text');
 if (!clipboardData) return;
 const isMultiCell = clipboardData.includes('\t') || clipboardData.split('\n').filter(r=>r.trim()).length > 1;
 if (!isMultiCell) return; // single value — let browser paste normally
 e.preventDefault();
 e.stopPropagation();
 executePaste(clipboardData, itemId, colKey);
}, [executePaste]);

const getBT = useCallback(id => {
 const item = items.find(i => i.id === id);
 const stateICMS = calcICMSRate(brazilStates.origin, brazilStates.destination);
 // Direct sale + imported item = 4% ICMS regardless of state configuration
 const defaultICMS = (proj.salesType === 'Direct' && item?.imported === true) ? 4 : stateICMS;
 return { ...BR_DEFAULTS, icms: defaultICMS, ...(brazilTaxes[id]||{}) };
}, [brazilTaxes, brazilStates, items, proj.salesType]);
const updBT    = (id,k,v)=>{ if(proj.locked) return; setBrazilTaxes(p=>({...p,[id]:{...getBT(id),[k]:parseFloat(v)||0}})); };
useEffect(() => {
 if (!isCIT || !DataService.isConnected()) return;
 const actualItems = items.filter(i => i.type !== 'heading' && !isQteItem(i));
 if (!actualItems.length) return;
 const timer = setTimeout(async () => {
 // Collect all SAP tax code updates, apply in one setBrazilTaxes call
 const updates = {};
 for (const item of actualItems) {
  const tc = getBT(item.id);
  const result = await DataService.lookupTaxCode(
  tc.icms ?? 12, tc.icmsBase ?? 100, tc.ipi ?? 0, tc.pis ?? 1.65, tc.cofins ?? 7.6
  ).catch(() => null);
  const newCode = result ? result.code : '';
  const existing = brazilTaxes[item.id] || {};
  if ((existing.sapTaxCode || '') !== newCode) {
  updates[item.id] = {...existing, sapTaxCode: newCode};
  }
 }
 if (Object.keys(updates).length > 0) {
  setBrazilTaxes(prev => ({...prev, ...updates}));
 }
 }, 600);
 return () => clearTimeout(timer);
}, [brazilTaxes, isCIT, items]);

const updBTStr = (id,k,v) => {
 if(proj.locked) return;
 setBrazilTaxes(p=>({...p,[id]:{...getBT(id),[k]:v}}));
 if (k === 'ncm' && v && v.trim() && isCIT && DataService.isConnected()) {
 DataService.lookupIPIForNCM(v.trim()).then(ipiRate => {
  if (ipiRate !== null) {
  setBrazilTaxes(p => {
   const existing = {...getBT(id), ...p[id]};
   if (!existing.ipi || existing.ipi === 0) {
   return {...p, [id]: {...existing, ncm: v, ipi: ipiRate}};
   }
   return p;
  });
  }
 }).catch(() => {});
 }
};

const refreshBrazilTaxes = useCallback(async () => {
 if (proj.locked) return;
 const stateICMS = calcICMSRate(brazilStates.origin, brazilStates.destination);

 // Step 1: Reset ICMS rates respecting salesType + imported rules
 setBrazilTaxes(prev => {
  const updated = {...prev};
  items.forEach(item => {
   if (item.type === 'heading') return;
   const currentTaxes = getBT(item.id);
   const shouldStayAt4 = proj.salesType === 'Direct' && item.imported === true;
   const icms = shouldStayAt4 ? 4 : stateICMS;
   updated[item.id] = {...currentTaxes, icms};
  });
  return updated;
 });

 // Step 2: Re-run NCM code lookup if feed is connected
 if (isCIT && DataService.isConnected()) {
  const actualItems = items.filter(i => i.type !== 'heading' && i.partNumber);
  await Promise.all(actualItems.map(async item => {
   try {
    const ncmEntry = await DataService.lookupNCM(item.partNumber);
    if (ncmEntry) {
     setBrazilTaxes(prev => {
      const existing = prev[item.id] || {};
      const updates = {};
      if (ncmEntry.ncm)        updates.ncm = ncmEntry.ncm;
      if (ncmEntry.ipi !== null) updates.ipi = ncmEntry.ipi;
      return Object.keys(updates).length ? {...prev, [item.id]: {...existing, ...updates}} : prev;
     });
    }
   } catch(e) {}
  }));

  // Step 3: Re-run SAP tax code lookup (the useEffect will fire reactively,
  // but we also trigger it explicitly here for items that may not have changed)
  const actualItems2 = items.filter(i => i.type !== 'heading');
  for (const item of actualItems2) {
   try {
    const tc = getBT(item.id);
    const result = await DataService.lookupTaxCode(
     tc.icms ?? 12, tc.icmsBase ?? 100,
     tc.ipi ?? 0, tc.pis ?? 1.65, tc.cofins ?? 7.6
    ).catch(() => null);
    const newCode = result ? result.code : '';
    setBrazilTaxes(prev => {
     const existing = prev[item.id] || {};
     if ((existing.sapTaxCode || '') === newCode) return prev;
     return {...prev, [item.id]: {...existing, sapTaxCode: newCode}};
    });
   } catch(e) {}
  }
 }
}, [items, proj.locked, proj.salesType, brazilStates, getBT, setBrazilTaxes, isCIT]);

const updateBrazilStates = useCallback((newStates) => {
 if (proj.locked) return;
 setBrazilStates(newStates);
 
 const newICMS = calcICMSRate(newStates.origin, newStates.destination);
 
 setBrazilTaxes(prev => {
 const updated = {...prev};
 items.forEach(item => {
  if(item.type !== "heading") {
  // Do not overwrite ICMS for Direct sale imported items — they stay at 4%
  const shouldStayAt4 = proj.salesType === "Direct" && item.imported === true;
  if (!shouldStayAt4) {
   // Only update icms — preserve all other per-item tax fields (II, IPI, etc.)
   // Use prev[item.id] directly to avoid stale getBT closure merging BR_DEFAULTS
   // over values the user has manually set.
   updated[item.id] = {...(prev[item.id] || {}), icms: newICMS};
  }
  }
 });
 return updated;
 });
}, [items, proj.salesType]);

const lookupPartNumber = useCallback(async (itemId, partNumber) => {
 if(!partNumber.trim()) return;
 try {
 const plEntry = await DataService.lookupPricelist(partNumber, proj.bu);
 if (plEntry) {
  setItems(prev => prev.map(r => {
  if (r.id !== itemId) return r;
  if (r.unitCost && r._autoPricelist !== true) return r;
  const updates = { _autoPricelist: true, source: 'Pricelist', manualSellPrice: null };
  if (plEntry.cost !== null) { updates.unitCost = parseFloat(parseFloat(plEntry.cost).toFixed(4)); updates.ccy = 'USD'; }
  if (plEntry.margin !== null) { updates.margin = parseFloat(plEntry.margin.toFixed(2)); }
  return {...r, ...updates};
  }));
 }
 const part = await DataService.lookupPart(partNumber, proj.bu);
 if(part) {
  setItems(prev => prev.map(r => {
  if (r.id !== itemId) return r;
  const updates = {};
  if (part.description && (!r.description || r._autoDescription === true)) { updates.description   = part.description;  updates._autoDescription = true; }
  if (part.supplier    && (!r.supplier    || r._autoSupplier    === true) && !isQteItem(r)) { updates.supplier = part.supplier; updates._autoSupplier = true; }
  if (part.drawing     && (!r.drawingNumber || r._autoDrawing   === true)) { updates.drawingNumber = part.drawing;      updates._autoDrawing     = true; }
  return Object.keys(updates).length ? {...r, ...updates} : r;

const [autofillRefreshing, setAutofillRefreshing] = useState(false);
const [autofillProgress,  setAutofillProgress]  = useState(null); // {done,total} | null
const refreshAllAutofills = useCallback(async (skipManual=true, sellCcyOverride=null) => {
 if (!DataService.isConnected()) return;
 const targets = items.filter(i => i.type !== 'heading' && i.partNumber && i.partNumber.trim());
 if (!targets.length) return;
 const effectiveSellCcy = sellCcyOverride || proj.sellCcy;
 saveToHistory(); // snapshot before bulk change so it's undoable
 setAutofillRefreshing(true);
 setAutofillProgress({ done: 0, total: targets.length });

 // Collect all updates into a Map first — one setItems call at the end instead of N
 const updateMap = new Map(); // id → patch object
 const brazilUpdates = {}; // id → brazil tax patch

 let doneCount = 0;

 const CHUNK = 50;
 for (let ci = 0; ci < targets.length; ci += CHUNK) {
 await Promise.all(targets.slice(ci, ci + CHUNK).map(async item => {
  try {
  const updates = {};
  const canWrite = (fieldVal, autoFlag) => !fieldVal || !skipManual || autoFlag === true;

  const plEntry = await DataService.lookupPricelist(item.partNumber, proj.bu);
  if (canWrite(item.unitCost, item._autoPricelist)) {
   if (plEntry) {
   updates._autoPricelist = true;
   updates.source = 'Pricelist';
   updates.manualSellPrice = null;
   if (plEntry.cost !== null) { updates.unitCost = parseFloat(parseFloat(plEntry.cost).toFixed(4)); updates.ccy = 'USD'; }
   if (plEntry.margin !== null) { updates.margin = parseFloat(plEntry.margin.toFixed(2)); }
   } else if (item._autoPricelist === true) {
   updates._autoPricelist = false;
   updates.unitCost = 0;
   updates.manualSellPrice = null;
   updates.source = proj.source || '';
   }
  }

  const part = await DataService.lookupPart(item.partNumber, proj.bu);
  if (canWrite(item.description,   item._autoDescription)) {
   if (part && part.description) { updates.description   = part.description;  updates._autoDescription = true; }
   else if (item._autoDescription === true) { updates.description = ''; updates._autoDescription = false; }
  }
  if (canWrite(item.supplier, item._autoSupplier)) {
   if (part && part.supplier)    { updates.supplier      = part.supplier;     updates._autoSupplier    = true; }
   else if (item._autoSupplier === true) { updates.supplier = ''; updates._autoSupplier = false; }
  }
  if (canWrite(item.drawingNumber, item._autoDrawing)) {
   if (part && part.drawing)     { updates.drawingNumber = part.drawing;      updates._autoDrawing     = true; }
   else if (item._autoDrawing === true) { updates.drawingNumber = ''; updates._autoDrawing = false; }
  }

  if (Object.keys(updates).length) updateMap.set(item.id, updates);

  if (isCIT && canWrite(null, null)) {
   const ncmEntry = await DataService.lookupNCM(item.partNumber);
   if (ncmEntry) {
   const existing = brazilTaxes[item.id] || {};
   const ncmUpdates = {};
   if (ncmEntry.ncm  && (!existing.ncm  || !skipManual)) ncmUpdates.ncm = ncmEntry.ncm;
   if (ncmEntry.ipi !== null && (!existing.ipi || !skipManual)) ncmUpdates.ipi = ncmEntry.ipi;
   if (Object.keys(ncmUpdates).length) brazilUpdates[item.id] = {...existing, ...ncmUpdates};
   }
  }
  } catch(e) {}
  doneCount++;
  setAutofillProgress({ done: doneCount, total: targets.length });
 }));
 // Yield between chunks
 await new Promise(r => setTimeout(r, 0));
 }

 // Single setItems — one tree rebuild instead of potentially thousands
 if (updateMap.size > 0) {
 setItems(prev => prev.map(r => updateMap.has(r.id) ? {...r, ...updateMap.get(r.id)} : r));
 }
 if (Object.keys(brazilUpdates).length > 0) {
 setBrazilTaxes(prev => ({...prev, ...brazilUpdates}));
 }
 setAutofillRefreshing(false);
 setAutofillProgress(null);
}, [items, proj.bu, proj.sellCcy, proj.rates, proj.source, isCIT, brazilTaxes, saveToHistory]);

const startResize = useCallback((e, colKey) => {
 e.preventDefault();
 const startState = { colKey, startX: e.clientX, startWidth: colWidths[colKey] };
 resizingRef.current = startState;
 setResizing(startState); // still needed to trigger the effect that attaches listeners
}, [colWidths]);

useEffect(() => {
 if (!resizing) return;

 const handleMouseMove = (e) => {
  const r = resizingRef.current;
  if (!r) return;
  const newWidth = Math.max(50, r.startWidth + (e.clientX - r.startX));
  // Update CSS variable directly — zero React renders during drag
  if (tableRef.current) {
  tableRef.current.style.setProperty(`--col-${r.colKey}`, `${newWidth}px`);
  }
  resizingRef.current = { ...r, liveWidth: newWidth };
 };

 const handleMouseUp = () => {
  const r = resizingRef.current;
  if (r && r.liveWidth !== undefined) {
  // Commit final width to state once — one re-render total
  setColWidths(prev => ({ ...prev, [r.colKey]: r.liveWidth }));
  }
  resizingRef.current = null;
  setResizing(null);
 };

 document.addEventListener('mousemove', handleMouseMove);
 document.addEventListener('mouseup', handleMouseUp);
 return () => {
  document.removeEventListener('mousemove', handleMouseMove);
  document.removeEventListener('mouseup', handleMouseUp);
 };
}, [resizing]);

  ``,
  `Generated by Parts Costing Worksheet`,
 ].join('\r\n');

 // Base64-encode the HTML attachment (btoa requires latin1 — encode UTF-8 first)
 const b64 = btoa(unescape(encodeURIComponent(htmlContent)));
 // Wrap base64 at 76 chars per RFC 2045
 const b64Wrapped = b64.match(/.{1,76}/g).join('\r\n');

 const boundary = `----=_Part_PCW_${Date.now()}`;

 // Build RFC 2822 MIME — MUST preserve blank lines between sections
 // Join with CRLF; blank lines are literal empty strings (not filtered)
 const parts = [];
 parts.push(`MIME-Version: 1.0`);
 parts.push(`X-Unsent: 1`);
 parts.push(`Date: ${now}`);
 parts.push(`Subject: ${subject}`);
 if (toAddr) parts.push(`To: ${toAddr}`);
 if (ccAddr) parts.push(`CC: ${ccAddr}`);
 parts.push(`Content-Type: multipart/mixed; boundary="${boundary}"`);
 parts.push(``); // blank line — end of headers
 parts.push(`--${boundary}`);
 parts.push(`Content-Type: text/plain; charset="utf-8"`);
 parts.push(`Content-Transfer-Encoding: quoted-printable`);
 parts.push(``); // blank line — end of part headers
 parts.push(bodyLines);
 parts.push(``); // blank line — end of part body
 parts.push(`--${boundary}`);
 parts.push(`Content-Type: text/html; charset="utf-8"; name="${attachFilename}"`);
 parts.push(`Content-Transfer-Encoding: base64`);
 parts.push(`Content-Disposition: attachment; filename="${attachFilename}"`);
 parts.push(``); // blank line — end of part headers
 parts.push(b64Wrapped);
 parts.push(``); // blank line — end of part body
 parts.push(`--${boundary}--`);

 const eml = parts.join('\r\n');

const ApprovalHistoryCard = ({ approvals, proj, items, grand, fc, integrityCache, setIntegrityCache, approveAndLock, setShowUnlockConfirm }) => {
 const [expanded, setExpanded] = useState(true);

 // Kick off async integrity checks for any approval that hasn't been checked yet
 useEffect(() => {
  const pending = approvals.filter(a => a.type === 'approved' && a.stateHash && integrityCache[a.stateHash] === undefined);
  if (pending.length === 0) return;
  pending.forEach(async (a) => {
   const result = await checkApprovalIntegrity(a, proj, items, grand);
   setIntegrityCache(c => ({ ...c, [a.stateHash]: result }));
  });
 }, [approvals, proj, items, grand]);

 const fmtDt = iso => {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' })
   + ' ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
 };

 const approvedCount  = approvals.filter(a => a.type === 'approved').length;
 const lastApproval   = [...approvals].reverse().find(a => a.type === 'approved');

 return (
  <Card className="col-span-2">
   <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: expanded ? 12 : 0}}>
    <div style={{display:'flex', alignItems:'center', gap:10}}>
     <H3>✅ Approval &amp; Audit Log</H3>
     {approvedCount > 0 && (
      <span style={{fontSize:11, fontWeight:600, padding:'1px 8px', borderRadius:10, background:'#dcfce7', color:'#166534', border:'1px solid #86efac'}}>
       {approvedCount} approval{approvedCount > 1 ? 's' : ''}
      </span>
     )}
    </div>
    <button onClick={() => setExpanded(e => !e)} style={{background:'none', border:'none', color:'#94a3b8', cursor:'pointer', fontSize:18, lineHeight:1}}>
     {expanded ? '▴' : '▾'}
    </button>
   </div>

   {expanded && (
    <>
     {/* Current status banner */}
     <div style={{
      display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:8,
      padding:'10px 14px', borderRadius:8, marginBottom:14,
      background: proj.locked ? '#f0fdf4' : '#fafafa',
      border: '1px solid ' + (proj.locked ? '#86efac' : '#e2e8f0'),
     }}>
      <div style={{display:'flex', alignItems:'center', gap:10}}>
       <span style={{fontSize:20}}>{proj.locked ? '🔒' : '🔓'}</span>
       <div>
        <div style={{fontWeight:700, fontSize:13, color: proj.locked ? '#166534' : '#374151'}}>
         {proj.locked ? 'Quote locked — read-only' : 'Quote unlocked — editing enabled'}
        </div>
        {lastApproval && (
         <div style={{fontSize:11, color:'#6b7280', marginTop:2}}>
          Last approved {fmtDt(lastApproval.at)} · {lastApproval.sellCcy} {fc(lastApproval.grandTotal)} · Rev {lastApproval.revision}
         </div>
        )}
       </div>
      </div>
      {proj.locked ? (
       <button
        onMouseDown={e => { e.preventDefault(); setShowUnlockConfirm(true); }}
        style={{fontSize:12, padding:'5px 14px', borderRadius:6, border:'1px solid #fca5a5', background:'#fef2f2', color:'#dc2626', cursor:'pointer', fontWeight:600}}
       >Unlock for editing…</button>
      ) : (
       <button
        onMouseDown={e => { e.preventDefault(); approveAndLock(); }}
        disabled={items.filter(i => i.type !== 'heading').length === 0}
        style={{fontSize:12, padding:'5px 14px', borderRadius:6, border:'1px solid #86efac', background:'#f0fdf4', color:'#166534', cursor:'pointer', fontWeight:700, opacity: items.filter(i => i.type !== 'heading').length === 0 ? 0.4 : 1}}
       >✓ Approve &amp; Lock</button>
      )}
     </div>

     {/* Approval log */}
     {approvals.length === 0 ? (
      <div style={{fontSize:12, color:'#94a3b8', textAlign:'center', padding:'20px 0', borderTop:'1px solid #f1f5f9'}}>
       No approvals recorded yet. Click <strong>Approve &amp; Lock</strong> to create the first entry.
      </div>
     ) : (
      <div style={{borderTop:'1px solid #f1f5f9', paddingTop:10}}>
       <div style={{fontSize:11, fontWeight:600, color:'#94a3b8', marginBottom:8, letterSpacing:'.04em', textTransform:'uppercase'}}>History</div>
       <div style={{display:'flex', flexDirection:'column', gap:6}}>
        {[...approvals].reverse().map((entry, idx) => {
         const isApproval = entry.type === 'approved';
         const integ = isApproval && entry.stateHash ? integrityCache[entry.stateHash] : null;
         const integBadge = integ === 'match'
          ? { bg:'#f0fdf4', border:'#86efac', color:'#166534', icon:'✓', label:'Intact' }
          : integ === 'mismatch'
          ? { bg:'#fef2f2', border:'#fca5a5', color:'#dc2626', icon:'⚠', label:'Modified since approval' }
          : integ === undefined && isApproval && entry.stateHash
          ? { bg:'#f8fafc', border:'#e2e8f0', color:'#94a3b8', icon:'…', label:'Checking…' }
          : null;

         return (
          <div key={idx} style={{
           display:'flex', alignItems:'flex-start', gap:12, padding:'8px 12px', borderRadius:8,
           background: isApproval ? '#f0fdf4' : '#fff7ed',
           border: '1px solid ' + (isApproval ? '#bbf7d0' : '#fed7aa'),
          }}>
           <span style={{fontSize:16, flexShrink:0, marginTop:1}}>{isApproval ? '✅' : '🔓'}</span>
           <div style={{flex:1, minWidth:0}}>
            <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
             <span style={{fontSize:12, fontWeight:700, color: isApproval ? '#166534' : '#9a3412'}}>
              {isApproval ? 'Approved & locked' : 'Unlocked for editing'}
             </span>
             <span style={{fontSize:11, color:'#6b7280'}}>{fmtDt(entry.at)}</span>
             {integBadge && (
              <span style={{fontSize:10, fontWeight:600, padding:'1px 6px', borderRadius:4, background:integBadge.bg, border:'1px solid '+integBadge.border, color:integBadge.color}}>
               {integBadge.icon} {integBadge.label}
              </span>
             )}
            </div>
            {(isApproval || isPackaged) && (
             <div style={{fontSize:11, color:'#6b7280', marginTop:2}}>
              {entry.sellCcy} {fc(entry.grandTotal)} · Rev {entry.revision}
              {entry.filename && <span style={{marginLeft:6, color:'#94a3b8'}}>· {entry.filename}</span>}
              {entry.stateHash && <span style={{marginLeft:8, fontFamily:'monospace', opacity:0.5, fontSize:10}}>{entry.stateHash.slice(0,12)}…</span>}
             </div>
            )}
           </div>
          </div>
         );
        })}
       </div>
      </div>
     )}
    </>
   )}
  </Card>
 );
};

   </tr>

  <tbody>
   {items.length===0&&(

   {items.length>0&&filteredTree.length===0&&searchQuery&&(
   <tr><td colSpan={14} className="pcw-empty">

   </td></tr>
   )}
   <Ctx.Provider value={ctxVal}><UiCtx.Provider value={uiCtxVal}>
   {items.filter(i=>i.type!=='heading').length < VIRTUAL_THRESHOLD
    /* ── NORMAL render (< threshold) ── */
    ? sortedItems.map(item=>{
     if(item.type==="heading") {
      if(searchQuery) return null;
      return <HeadingRow key={item.id} item={item}/>;
     }
     if(item.parentId) return null;
     const treeNode = (searchQuery ? filteredTreeById : treeById).get(item.id);
     return treeNode ? <ItemRow key={item.id} n={treeNode} depth={0}/> : null;
    })
    /* ── VIRTUAL render (>= threshold) ── */
    : (() => {
     void scrollTick;
     const wrapH = wrapRef.current?.clientHeight || 600;
     const scrollTop = wrapRef.current?.scrollTop || 0;
     const len = virtualSlots.length;
     if (len === 0) return [];
     const focusedId = focusedCell?.itemId;

     // Extra buffer beyond OVERSCAN to absorb row-height variance
     const EXTRA = 10;
     let startIdx = Math.max(0, findStartIndex(virtualOffsets, len, Math.max(0, scrollTop - EXTRA * rowHeights.row)) - OVERSCAN);
     let endIdx   = Math.min(len - 1, findStartIndex(virtualOffsets, len, scrollTop + wrapH + EXTRA * rowHeights.row) + OVERSCAN);

     // Always include focused row
     if (focusedId) {
      const focusedIdx = virtualSlots.findIndex(s => s.id === focusedId || s.node?.id === focusedId);
      if (focusedIdx !== -1) {
       startIdx = Math.min(startIdx, Math.max(0, focusedIdx - OVERSCAN));
       endIdx   = Math.max(endIdx,   Math.min(len - 1, focusedIdx + OVERSCAN));
      }
     }

     // Clamp spacers — never negative
     const topSpacerH    = Math.max(0, virtualOffsets[startIdx] || 0);
     const bottomSpacerH = Math.max(0, virtualTotalHeight - (virtualOffsets[endIdx + 1] || virtualTotalHeight));

     const visibleSlots = virtualSlots.slice(startIdx, endIdx + 1);
     const rows = [];

     if (topSpacerH > 0) rows.push(
      <tr key="__top_spacer" style={{height: topSpacerH}}><td colSpan={20}/></tr>
     );

     // Render one element per slot — headings, individual item rows, individual
     // BOM child rows, and note rows — each maps to exactly one <tr> in the DOM.
     // For BOM children, we pass the child node directly at its depth.
     visibleSlots.forEach(slot => {
      if (slot.type === 'heading') {
       rows.push(<HeadingRow key={slot.id} item={slot.item}/>);
      } else if (slot.type === 'note') {
       // Render just the note <tr> for this item
       rows.push(<ItemRow key={slot.id} n={slot.node} depth={slot.depth} virtualNoteOnly={true}/>);
      } else {
       // 'item' (depth 0) or 'child' (depth > 0) — render the node at its depth,
       // suppressing recursive child rendering (virtualChild=true)
       rows.push(<ItemRow key={slot.id} n={slot.node} depth={slot.depth} virtualChild={true}/>);
      }
     });

     if (bottomSpacerH > 0) rows.push(
      <tr key="__bottom_spacer" style={{height: bottomSpacerH}}><td colSpan={20}/></tr>
     );

     return rows;
    })()
   }
   </UiCtx.Provider></Ctx.Provider>
   {/* Sentinel row — always in DOM, used to calibrate row height. Must participate
       in normal table layout (no position:absolute) so getBoundingClientRect is accurate.
       Placed after virtual rows so it doesn't affect slot index mapping. */}
   <tr data-sentinel="1" aria-hidden="true" style={{visibility:'hidden',pointerEvents:'none',userSelect:'none'}}>

   ))}
   <tr style={{background:"#0f172a",borderTop:"2px solid #f59e0b"}}>

 const totals = salesTaxTotals;

 return(
 <div className="space-y-4">
  <Card>
  <div className="flex items-center justify-between">
   <H3><Tooltip text="Brazilian sales taxes calculated on the net sell price using the simultaneous gross-up formula. These are charged to the customer and included in the gross sell price.">{t('salesTaxesCIT')}</Tooltip></H3>
   {!proj.locked && (
    <button
    className="pcw-btn-secondary text-xs"
    onClick={refreshBrazilTaxes}
    title="Reset ICMS rates to current configuration defaults (respecting Direct+imported 4% rule), re-run NCM code lookup, and refresh SAP tax codes — requires feed connection for NCM and SAP lookups"
    >{t('refreshTaxRates')}</button>
   )}
  </div>
  <div className="pcw-info-box" style={{background:"#f0fdf4",borderColor:"#bbf7d0",color:"#166534",marginBottom:8}}>
   <strong>Sales taxes are charged to customers and are CREDITABLE.</strong> These are NOT included in Landed COGS.
   Tax base is the SELL PRICE after discount (without taxes), not COGS. These taxes: IPI, PIS, COFINS, ICMS.
   BOM sub-components are excluded — taxes apply at the top-level item level only.
  </div>
  <div className="text-xs" style={{color:"#64748b"}}>USD/BRL: <span className="pcw-mono font-bold">{fc(proj.rates.BRL,4)}</span></div>
  </Card>

  <Card>
  <H3><Tooltip text="RECAP and Sales Type affect which tax rates apply. Changes here update all items — individual overrides can be set per item below.">{t('taxConfiguration')}</Tooltip></H3>
  <div className="pcw-grid-2 gap-3">
   <div>
   <L>
    <Tooltip text="RECAP (Special Customs Regime): Determines eligibility for tariff benefits">
    {t('tariffBenefits')}
    </Tooltip>
   </L>
   <Sel 
    value={proj.recapBenefit || "N"} 
    onChange={e=>{
    if(proj.locked) return;
    const recap = e.target.value;
    setProj(p=>({...p, recapBenefit: recap}));
    setBrazilTaxes(prev => {
     const next = {...prev};
     items.filter(i => i.type !== "heading").forEach(item => {
     next[item.id] = {
      ...getBT(item.id),
      ...(next[item.id] || {}),
      pis:    recap === "Y" ? 0 : 1.65,
      cofins: recap === "Y" ? 0 : 7.6,
     };
     });
     return next;
    });
    }}
   >
    <option value="Y">Yes</option>
    <option value="N">No</option>
   </Sel>
   </div>
   <div>
   <L>
    <Tooltip text="Direct Sale of imported items uses 4% ICMS. Non-imported items always use state rules.">
    {t('salesType')}
    </Tooltip>
   </L>
   <Sel 
    value={proj.salesType || "Industrialized"} 
    onChange={e=>{
    if(proj.locked) return;
    const salesType = e.target.value;
    setProj(p=>({...p, salesType}));
    const stateICMS = calcICMSRate(brazilStates.origin, brazilStates.destination);
    setBrazilTaxes(prev => {
     const next = {...prev};
     items.filter(i => i.type !== "heading").forEach(item => {
     const icms = salesType === "Direct" && item.imported ? 4 : stateICMS;
     next[item.id] = {
      ...getBT(item.id),
      ...(next[item.id] || {}),
      icms,
     };
     });
     return next;
    });
    }}
   >
    <option value="Industrialized">Industrialized</option>
    <option value="Direct">Direct</option>
   </Sel>
   </div>
  </div>
  </Card>

  <Card>
  <H3><Tooltip text="Inter-state ICMS rate is determined by origin and destination state. Intra-state rates vary by state (typically 17–20%). Select the state where goods are imported and delivered.">{t('icmsConfiguration')}</Tooltip></H3>
  <div className="pcw-info-box mb-3" style={{background:"#eff6ff",borderColor:"#bfdbfe",color:"#1e40af"}}>
   <strong>ICMS (State VAT)</strong> rates vary by origin and destination state. Interstate rates: 7% or 12% depending on regions. Intrastate rates: typically 17-20%.
  </div>
  <div className="pcw-grid-2 gap-3">
   <div>
   <L><Tooltip text="The Brazilian state where goods enter customs / are imported. Determines the inter-state ICMS rate.">{t('originState')}</Tooltip></L>
   <Sel 
    value={brazilStates.origin} 
    onChange={e=>{ if(!proj.locked) updateBrazilStates({...brazilStates, origin:e.target.value}); }}
   >
    {Object.entries(BR_STATES).map(([code,state])=>(
    <option key={code} value={code}>{code} - {state.name}</option>
    ))}
   </Sel>
   </div>
   <div>
   <L><Tooltip text="The Brazilian state where the final customer receives the goods. Determines the inter-state ICMS rate.">{t('destinationState')}</Tooltip></L>
   <Sel 
    value={brazilStates.destination} 
    onChange={e=>{ if(!proj.locked) updateBrazilStates({...brazilStates, destination:e.target.value}); }}
   >
    {Object.entries(BR_STATES).map(([code,state])=>(
    <option key={code} value={code}>{code} - {state.name}</option>
    ))}
   </Sel>
   </div>
  </div>
  <div className="mt-3 text-xs" style={{color:"#64748b"}}>
   <strong>Calculated ICMS Rate:</strong> <span className="pcw-mono font-bold" style={{color:"#2563eb"}}>{calcICMSRate(brazilStates.origin,brazilStates.destination)}%</span>
   {brazilStates.origin === brazilStates.destination 
   ? <span> (Intrastate - {BR_STATES[brazilStates.origin]?.name})</span>
   : <span> (Interstate - {BR_STATES[brazilStates.origin]?.name} → {BR_STATES[brazilStates.destination]?.name})</span>
   }
  </div>
  </Card>

  {tree.length===0&&<Card><div className="pcw-empty">Add items in the Costing tab first.</div></Card>}
  {tree.length > 0 && tree.filter(i => i.imported).length === 0 && (
  <Card>
   <div className="pcw-info-box" style={{background:"#fffbeb",borderColor:"#fde68a",color:"#92400e"}}>
   <strong>No imported items found.</strong> Mark items as "Imported?" in the Costing tab to track import taxes.
   </div>
  </Card>
  )}

  {tree.length > 0 && (
  <div className="flex items-center gap-3 mb-3">
   <label className="flex items-center gap-2 text-xs cursor-pointer" style={{color:"#64748b"}}>
   <input 
    type="checkbox"
    checked={tree.filter(i => i.imported).length > 0 && tree.filter(i => i.imported).every(i => selectedBrazilItems.has(i.id))}
    onChange={e => {
    if (e.target.checked) {
     setSelectedBrazilItems(new Set(tree.filter(i => i.imported).map(i => i.id)));
    } else {
     setSelectedBrazilItems(new Set());
    }
    }}
    className="cursor-pointer"
   />
   Select All
   </label>
   {selectedBrazilItems.size > 0 && (
   <>
    <span className="text-xs" style={{color:"#64748b"}}>
    {selectedBrazilItems.size} selected
    </span>
    <button 
    className="pcw-btn-secondary text-xs" 
    onClick={openBrazilBulkEdit}
    disabled={proj.locked}
    >
    ✏️ {t('bulkEdit')}
    </button>
   </>
   )}
  </div>
  )}

  {(() => {
  const flatTree = [];
  const flatten = (nodes, depth = 0) => {
   nodes.forEach(n => {
   flatTree.push({ ...n, depth });
   if (n._ch && n._ch.length > 0) {
    flatten(n._ch, depth + 1);
   }
   });
  };
  flatten(tree);
  
  return flatTree.filter(item => item.type !== "heading" && item.depth === 0).map(item => {
   const tc = getTaxConfig(item.id);
   const sp = getItemSP(item);
   const discountedSP = sp * (1 - (item.discount||0)/100);
   const spBRL = conv(discountedSP, proj.sellCcy, "BRL", proj.rates);
   const salesTax = getItemSalesTax(item);
   const totSC = conv(salesTax.total, "BRL", proj.sellCcy, proj.rates);
   const spWithTax = discountedSP + totSC;
   
   const isChild=item.depth>0;
   const FIELDS=[
   {k:"ipi",lbl:"IPI %",def:0,amt:salesTax.ipi,tip:"Tax on Industrialized Products (Imposto sobre Produtos Industrializados)"},
   {k:"pis",lbl:"PIS %",def:1.65,amt:salesTax.pis,tip:"Social Integration Program tax (default 1.65%)"},
   {k:"cofins",lbl:"COFINS %",def:7.6,amt:salesTax.cofins,tip:"Social Security Financing tax (default 7.6%)"},
   {k:"icmsBase",lbl:"ICMS Base %",def:100,amt:null,tip:"ICMS tax base modifier (default 100%). If 50%, effective ICMS rate = rate × 50%"},
   {k:"icms",lbl:"ICMS %",def:getTaxConfig(item.id).icms,amt:salesTax.icms,tip:"State VAT (auto-calculated from origin/destination states, modified by ICMS Base %)"}
   ];
   const COLORS=["#ea580c","#ca8a04","#16a34a","#9333ea","#2563eb"];
   return(
   <Card key={item.id} style={{
    borderLeft: isChild ? "4px solid #e2e8f0" : "4px solid #16a34a",
    marginLeft: item.depth * 20,
    padding: "6px 10px"
   }}>
    <div className="flex items-start justify-between mb-1">
    <div className="flex-1">
     <div className="flex gap-2 items-center">
     <input 
      type="checkbox"
      checked={selectedBrazilItems.has(item.id)}
      onChange={e => {
      const newSet = new Set(selectedBrazilItems);
      if (e.target.checked) {
       newSet.add(item.id);
      } else {
       newSet.delete(item.id);
      }
      setSelectedBrazilItems(newSet);
      }}
      className="cursor-pointer"
      onClick={e => e.stopPropagation()}
     />
     {isChild&&<span style={{fontSize:9,padding:"1px 4px",borderRadius:3,background:"#f1f5f9",color:"#64748b"}}>sub</span>}
     <span className="font-semibold" style={{fontSize:11}}>{item.partNumber||"—"} — {item.description||"(no description)"}</span>
     </div>
     <div style={{fontSize:10,color:"#64748b",marginTop:2}}>
     Qty: {item.qty} × Unit SP: {fc(sp)} {proj.sellCcy}{(item.discount||0)>0 ? ` (−${item.discount}% disc → ${fc(discountedSP)} ${proj.sellCcy}/unit)` : ''}
     </div>
     <div style={{fontSize:10,marginTop:2}}>
     <span style={{color:"#16a34a",fontWeight:600}}>Tax base (unit, after disc): {fc(discountedSP)} {proj.sellCcy}</span>
     <span style={{color:"#64748b"}}> = {fc(spBRL)} BRL</span>
     </div>
    </div>
    <div className="text-right ml-3 flex-shrink-0">
     <div style={{fontSize:9,color:"#64748b"}}>Sales Tax</div>
     <div className="pcw-mono font-bold" style={{fontSize:11,color:"#7c3aed"}}>{fc(salesTax.total)} BRL</div>
     <div className="pcw-mono" style={{fontSize:9,color:"#64748b",marginTop:1}}>{fc(totSC)} {proj.sellCcy}</div>
     <div style={{fontSize:9,color:"#7c3aed",fontWeight:600,marginTop:2}}>Unit SP w/ tax: {fc(spWithTax)} {proj.sellCcy}</div>
    </div>
    </div>
    <div className="flex gap-3 mb-1">
    <div style={{width:140}}>
     <L style={{fontSize:10,marginBottom:2}}>
     <Tooltip text="Brazilian product classification code (Nomenclatura Comum do Mercosul)">NCM Code</Tooltip>
     </L>
     <input className="pcw-input pcw-mono" style={{fontSize:10,padding:"2px 6px"}} value={tc.ncm||""} onChange={e=>{ if(!proj.locked) setBrazilTaxes(p=>({...p,[item.id]:{...getBT(item.id),ncm:e.target.value}})); }} onBlur={e=>updBTStr(item.id,"ncm",e.target.value)} placeholder="0000.00.00"/>
    </div>
    <div style={{flex:1}}>
     <L style={{fontSize:10,marginBottom:2}}>
     <Tooltip text="SAP Business One tax code derived from the current ICMS, ICMS Base, IPI, PIS and COFINS rates. Auto-populated when the feed is connected.">SAP Tax Code</Tooltip>
     </L>
     {(()=>{
     const sapCode = tc.sapTaxCode || null;
     if (!fsConnected || fsStale) {
      return <div className="pcw-input" style={{fontSize:10,padding:"2px 6px",color:'#94a3b8',background:'#f8fafc'}}>Feed required</div>;
     }
     if (!sapCode) {
      return <div className="pcw-input" style={{fontSize:10,padding:"2px 6px",color:'#94a3b8',background:'#f8fafc'}}>No match found</div>;
     }
     return (
      <div style={{display:'flex',alignItems:'center',gap:4}}>
      <div className="pcw-input pcw-mono" style={{fontSize:10,padding:"2px 6px",background:'#f0fdf4',borderColor:'#86efac',color:'#166534',fontWeight:600}}>{sapCode}</div>
      <button
       onClick={()=>{navigator.clipboard.writeText(sapCode).catch(()=>{});}}
       style={{fontSize:9,padding:'2px 5px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:4,cursor:'pointer',color:'#166534',flexShrink:0}}
       title="Copy tax code"
      >📋</button>
      </div>
     );
     })()}
    </div>
    </div>
    <div className="grid grid-cols-5 gap-1 mb-1">
    {FIELDS.map(({k,lbl,def,amt,tip},i)=>(
     <div key={k}>
     <L style={{fontSize:10,marginBottom:2}}>
      <Tooltip text={tip}>
      {lbl}
      </Tooltip>
     </L>
     <div className="relative">
      <NumInput className="pcw-input pr-3 pcw-mono" style={{fontSize:10,padding:"2px 4px"}} value={tc[k]??def} onChange={v=>updBT(item.id,k,v)}/>
      <span className="pcw-pct" style={{fontSize:9}}>%</span>
     </div>
     {amt !== null && <div className="pcw-mono text-right" style={{fontSize:9,color:COLORS[i],marginTop:1}}>{fc(amt)} BRL</div>}
     {amt === null && <div style={{fontSize:9,marginTop:1,height:14}}>&nbsp;</div>}
     {k === 'ipi' && item.imported && (
      <div style={{fontSize:8,color:'#0369a1',marginTop:2,lineHeight:1.3}} title="Imported items default to 0% IPI on resale (NT). Override above if IPI applies to this product.">↳ Imported — defaults 0% (NT)</div>
     )}
     </div>
    ))}
    </div>
    <div style={{fontSize:9,color:"#94a3b8",marginTop:4,marginBottom:3}}>
    Tax base: Sell Price after discount. ICMS Base % modifies ICMS rate. ICMS base (BRL): SP + IPI + PIS + COFINS. ICMS auto-calculated from states.
    </div>
    <div className="rounded-full overflow-hidden flex" style={{height:6,background:"#f1f5f9"}}>
    {FIELDS.map(({k,amt},i)=>amt>0&&<div key={k} style={{flex:amt,background:COLORS[i]}}/>)}
    </div>
   </Card>
   );
  });
  })()}

  {items.filter(i=>i.type!=="heading").length>0&&(
  <Card style={{background:"#f0fdf4",borderColor:"#bbf7d0"}}>
   <H3>{t('totalSalesTaxes')}</H3>
   <div className="grid grid-cols-5 gap-2">
   {[["IPI",totals.ipi],["PIS",totals.pis],["COFINS",totals.cofins],["ICMS",totals.icms],["TOTAL",totals.total]].map(([k,v],i)=>(
    <div key={k} className="rounded-lg p-2 text-center border" style={{background:i===4?"#dcfce7":"#fff",borderColor:i===4?"#16a34a":"#e2e8f0"}}>
    <div className="text-xs font-bold pcw-mono" style={{color:i===4?"#166534":"#475569"}}>{k}</div>
    <div className="pcw-mono font-semibold text-xs mt-0.5">{fc(v)} BRL</div>
    <div className="text-xs" style={{color:"#94a3b8"}}>{fc(conv(v,"BRL",proj.sellCcy,proj.rates))} {proj.sellCcy}</div>
    </div>
   ))}
   </div>
   <div style={{fontSize:10,color:"#166534",marginTop:8}}>
   💡 These taxes are charged to customers and are creditable. They are NOT included in your Landed COGS.
   </div>
  </Card>
  )}
 </div>
 );
};

const ScheduleTab=()=>{
 const isWeeks = scheduleUnit === 'weeks';
 const isMonths = scheduleUnit === 'months';
 const DAYS_PER_MONTH = 30.44;
 const displayWeeks = (totalDays / 7).toFixed(1).replace(/\.0$/,'');
 const displayMonths = (totalDays / DAYS_PER_MONTH).toFixed(1).replace(/\.0$/,'');
 return (
 <div className="space-y-4">
 <Card>
  <div className="flex items-center justify-between mb-3">
  <H3><Tooltip text="Define project phases and their durations. The total lead time and incoterm fulfilment date are calculated automatically from the project start date.">{t('projectSchedule')}</Tooltip></H3>
  <div className="flex items-center gap-3">
   {/* Sync from data button */}
   {!proj.locked && (() => {
    // Include items with leadTime=0 so syncing to 0 works on re-sync
    const eligibleItems = items.filter(i=>i.type!=='heading');
    const longestItem = eligibleItems.length > 0 ? eligibleItems.reduce((a,b)=>(b.leadTime||0)>(a.leadTime||0)?b:a) : null;
    // For freight: include all inbound/outbound entries so 0-day entries can be synced
    const getEffectiveDays = (e) => {
     if (e.activeQuoteId) {
      const aq = (e.freightQuotes||[]).find(q=>q.id===e.activeQuoteId);
      if (aq?.leadTimeDays >= 0) return aq.leadTimeDays;
     }
     return e.leadTimeDays||0;
    };
    const inbEntries = frt.inbound;
    const outEntries = frt.outbound;
    const longestInb = inbEntries.length > 0 ? inbEntries.reduce((a,b)=>getEffectiveDays(b)>getEffectiveDays(a)?b:a) : null;
    const longestOut = outEntries.length > 0 ? outEntries.reduce((a,b)=>getEffectiveDays(b)>getEffectiveDays(a)?b:a) : null;
    if (!longestItem && !longestInb && !longestOut) return null;
    return (
    <button
     className="pcw-btn-secondary text-xs"
     title="Sync Inbound Freight, Outbound Freight and longest item lead time phases from costing data"
     onClick={()=>{
      setSched(p => ({
      ...p,
      phases: p.phases.map(ph => {
       const n = (ph.name||'').toLowerCase();
       if ((n.includes('inbound') && n.includes('freight')) && longestInb !== null) {
        return {...ph, days: getEffectiveDays(longestInb)};
       }
       if ((n.includes('outbound') && n.includes('freight')) && longestOut !== null) {
        return {...ph, days: getEffectiveDays(longestOut)};
       }
       if ((n === 'fabrication' || n.includes('lead time') || n.includes('manufacture') || n.includes('production')) && longestItem !== null) {
        return {...ph, days: longestItem.leadTime || 0};
       }
       return ph;
      })
      }));
     }}
    >{t('syncFromData')}</button>
    );
   })()}
   {/* Days / Weeks / Months toggle */}
   <div className="flex items-center gap-2">
    <span className="text-xs" style={{color:'#64748b'}}>Unit:</span>
    <div className="flex rounded-lg overflow-hidden border" style={{borderColor:'#e2e8f0'}}>
    {[['days','Days'],['weeks','Weeks'],['months','Months']].map(([val,lbl])=>(
     <button key={val}
     onClick={()=>setScheduleUnit(val)}
     style={{padding:'3px 10px',fontSize:11,fontWeight:600,border:'none',cursor:'pointer',
     background:scheduleUnit===val?'#1e40af':'#f8fafc',
     color:scheduleUnit===val?'#fff':'#64748b',transition:'all .15s'}}
     >{lbl}</button>
    ))}
    </div>
   </div>
  </div>
  </div>

  <div className="grid grid-cols-4 gap-3 mb-5">
  <div><L><Tooltip text="Planned project start date, used as the baseline for calculating all phase durations and the final fulfilment date">{t('projectStart')}</Tooltip></L><input type="date" className="pcw-input" value={sched.start} onChange={e=>{ if(!proj.locked) setSched(p=>({...p,start:e.target.value})); }}/></div>

  {/* Total Lead Time — days primary, weeks+months secondary */}
  <div className="rounded-lg border p-2 text-center" style={{background:"#eff6ff",borderColor:"#bfdbfe"}}>
   <div className="text-xs mb-0.5" style={{color:"#64748b"}}>Total Lead Time</div>
   <div className="pcw-mono font-bold text-2xl" style={{color:"#1e40af"}}>{totalDays}<span className="text-sm font-normal ml-1">d</span></div>
   <div className="text-xs" style={{color:"#94a3b8"}}>{displayWeeks}w · {displayMonths}mo</div>
  </div>

  <div className="rounded-lg border p-2 text-center" style={{background:"#f0fdf4",borderColor:"#86efac"}}>
   <div className="text-xs mb-0.5" style={{color:"#64748b"}}>{proj.incoterm||"EXW"} Fulfilment</div>
   <div className="pcw-mono font-semibold text-sm" style={{color:"#166534"}}>{formatDate(fulfil)}</div>
  </div>

  {(() => {
   const effDays = (e) => {
    if (e.activeQuoteId) {
     const aq = (e.freightQuotes||[]).find(q=>q.id===e.activeQuoteId);
     if (aq?.leadTimeDays > 0) return aq.leadTimeDays;
    }
    return e.leadTimeDays||0;
   };
   const eligibleItems = items.filter(i => i.type !== 'heading' && (i.leadTime||0) > 0);
   const longestItem = eligibleItems.length ? eligibleItems.reduce((a,b) => (b.leadTime||0) > (a.leadTime||0) ? b : a) : null;
   const inbAll = frt.inbound.filter(e=>effDays(e)>0);
   const outAll = frt.outbound.filter(e=>effDays(e)>0);
   const longestInb = inbAll.length ? inbAll.reduce((a,b)=>effDays(b)>effDays(a)?b:a) : null;
   const longestOut = outAll.length ? outAll.reduce((a,b)=>effDays(b)>effDays(a)?b:a) : null;
   if (!longestItem && !longestInb && !longestOut) return null;
   const Row = ({label, days, sub, color, fromQuote}) => (
   <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid #fef3c7'}}>
    <div style={{fontSize:10,color:'#92400e',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:8}} title={sub||label}>
    {label}{sub ? <span style={{fontSize:9,color:'#b45309',marginLeft:4,fontWeight:400}}>{sub}</span> : null}
    {fromQuote && <span style={{fontSize:8,color:'#0369a1',marginLeft:4,fontWeight:600}}>★ quote</span>}
    </div>
    <div className="pcw-mono font-bold" style={{fontSize:14,color:color||'#92400e',flexShrink:0}}>{days}<span style={{fontSize:10,fontWeight:400,marginLeft:2}}>d</span></div>
   </div>
   );
   const inbDays = longestInb ? effDays(longestInb) : 0;
   const outDays = longestOut ? effDays(longestOut) : 0;
   const inbFromQuote = longestInb?.activeQuoteId && (longestInb.freightQuotes||[]).find(q=>q.id===longestInb.activeQuoteId)?.leadTimeDays > 0;
   const outFromQuote = longestOut?.activeQuoteId && (longestOut.freightQuotes||[]).find(q=>q.id===longestOut.activeQuoteId)?.leadTimeDays > 0;
   return (
   <div className="rounded-lg border p-2" style={{background:"#fffbeb",borderColor:"#fde68a"}}>
    <div className="text-xs mb-2 text-center font-semibold" style={{color:"#64748b"}}>Longest Lead Times</div>
    {longestItem && <Row label="Item" sub={[longestItem.partNumber,longestItem.description].filter(Boolean).join(' ')||longestItem.supplier} days={longestItem.leadTime} color="#92400e"/>}
    {longestInb  && <Row label="Inbound freight" sub={longestInb.desc||undefined} days={inbDays} color="#0369a1" fromQuote={inbFromQuote}/>}
    {longestOut  && <Row label="Outbound freight" sub={longestOut.desc||undefined} days={outDays} color="#166534" fromQuote={outFromQuote}/>}

 setHistory(prev => {

 newHistory.push(snapshot);
 if (newHistory.length > maxSnaps) {

 } else {

 return newHistory;
 });

// Native column drag — document-level to bypass all container event issues
useEffect(() => {
  if (tab !== 'costing' || proj.locked) return;

  const onDragStart = e => {
    const th = e.target.closest('th[data-col-key]');
    if (!th) return;
    if (e.target.classList.contains('pcw-resize-handle')) { e.preventDefault(); return; }
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', th.dataset.colKey);
    colDraggingRef.current = th.dataset.colKey;
    setTimeout(() => { if (th.isConnected) th.style.opacity = '0.5'; }, 0);
  };

  const onDragOver = e => {
    if (!colDraggingRef.current) return; // not a col drag
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const th = e.target.closest('th[data-col-key]');
    if (th && colDragOverRef.current !== th) {
      if (colDragOverRef.current) colDragOverRef.current.classList.remove('pcw-col-drag-over');
      colDragOverRef.current = th;
      th.classList.add('pcw-col-drag-over');
    }
  };

  const onDrop = e => {
    if (!colDraggingRef.current) return;
    e.preventDefault();
    const th = e.target.closest('th[data-col-key]');
    if (colDragOverRef.current) { colDragOverRef.current.classList.remove('pcw-col-drag-over'); colDragOverRef.current = null; }
    const dragged = colDraggingRef.current;
    const target = th?.dataset.colKey;
    if (dragged && target && dragged !== target) {
      setColOrder(o => { const a=[...o]; const fi=a.indexOf(dragged); const ti=a.indexOf(target); if(fi>-1&&ti>-1){a.splice(fi,1);a.splice(ti,0,dragged);} return a; });
    }
    document.querySelectorAll('th[data-col-key]').forEach(t => { t.style.opacity = ''; });
    colDraggingRef.current = null;
  };

  const onDragEnd = e => {
    if (colDragOverRef.current) { colDragOverRef.current.classList.remove('pcw-col-drag-over'); colDragOverRef.current = null; }
    document.querySelectorAll('th[data-col-key]').forEach(t => { t.style.opacity = ''; });
    colDraggingRef.current = null;
  };

  // Attach to document so overflow:auto containers can't swallow events
  document.addEventListener('dragstart', onDragStart);
  document.addEventListener('dragover', onDragOver);
  document.addEventListener('drop', onDrop);
  document.addEventListener('dragend', onDragEnd);
  return () => {
    document.removeEventListener('dragstart', onDragStart);
    document.removeEventListener('dragover', onDragOver);
    document.removeEventListener('drop', onDrop);
    document.removeEventListener('dragend', onDragEnd);
  };
}, [tab, proj.locked]);

);

const validateProject = useCallback(() => {
 // Read items from ref — always current regardless of closure age.

 // MAINTENANCE NOTE: If you add a check that reads a new item field,

 const errors = [];
 const warnings = [];

 if (!proj.customer.name || proj.customer.name.trim() === '') {

 });

 if (!proj.bu) {

  tab: 'setup',
  message: 'Business unit is required'
 });
 }
 
 items.forEach((item, idx) => {
 if (item.type === 'heading') return;
 if (isQteItem(item)) return;
 
 if (item.unitCost < 0) {
  errors.push({
  id: `item-${item.id}-cost-negative`,
  type: 'range',
  field: `items[${idx}].unitCost`,
  tab: 'costing',
  itemId: item.id,

  });
 }
 
 if (item.qty <= 0) {

  id: `item-${item.id}-qty-invalid`,

  field: `items[${idx}].qty`,
  tab: 'costing',
  itemId: item.id,
  message: `Item "${item.partNumber || 'Unnamed'}" quantity must be greater than 0`

 }
 
 if (item.margin < -100 || item.margin > 500) {

  id: `item-${item.id}-margin-range`,
  type: 'range',
  field: `items[${idx}].margin`,
  tab: 'costing',
  itemId: item.id,
  message: `Item "${item.partNumber || 'Unnamed'}" margin must be between -100% and 500%`
  });
 }
 
 if (item.discount < 0 || item.discount > 100) {
  errors.push({
  id: `item-${item.id}-discount-range`,
  type: 'range',
  field: `items[${idx}].discount`,
  tab: 'costing',
  itemId: item.id,
  message: `Item "${item.partNumber || 'Unnamed'}" discount must be between 0% and 100%`
  });
 }
 });
 
 if (isCIT) {
 if (!proj.rates.BRL) {

  id: 'cit-no-brl-rate',

 }
 
 const itemsWithAFRMM = items.filter(item => item.type !== 'heading' && !isQteItem(item) && item.afrmm === true);
 const freightWithAFRMM = frt.inbound.some(f => f.afrmm === true);
 
 if (itemsWithAFRMM.length > 0 && !freightWithAFRMM) {
  warnings.push({
  id: 'cit-afrmm-mismatch-no-freight',

 }
 
 if (freightWithAFRMM && itemsWithAFRMM.length === 0) {
  errors.push({
  id: 'cit-afrmm-mismatch-no-items',
  type: 'consistency',
  field: 'afrmm',
  tab: 'costing',

  });
 }
 

 }
 
 items.forEach((item, idx) => {
 if (item.type === 'heading') return;
 if (isQteItem(item)) return;
 
 if (item.ccy && !proj.rates[item.ccy]) {

 items.forEach(item => {

 items.forEach(item => {

 items.forEach(item => {

 if (!item.supplier || item.supplier.trim() === '') {

 if (!item.source || item.source.trim() === '') {

 });

 if (ebitdaValue < 0 && actualItems.length > 0) {

 actualItems

    });
   }
   // Opportunity linked but quote value < threshold → informational, not a hard error
   if (sfParsed.type === 'Opportunity' && grandUSDVal < SF_QUOTE_THRESHOLD) {
    warnings.push({
     id: 'sf-opportunity-below-threshold',
     type: 'salesforce',
     severity: 'info',
     tab: 'setup',
     message: `Quote value (${new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(grandUSDVal)} USD equivalent) is below the $${SF_QUOTE_THRESHOLD.toLocaleString()} USD threshold — typically a Case would be used at this value. Verify this is intentional.`

   }

   if (sfParsed.type === null) {

     id: 'sf-link-unrecognised',

     tab: 'setup',
     message: 'Salesforce link format not recognised — could not determine if this is a Case or Opportunity. Ensure the full Salesforce URL is pasted.'
    });
   }
  }
 }

 // ── SharePoint link missing ──────────────────────────────────────────────────
 if (actualItems2.length > 0 && !sched?.sharepointLink?.trim()) {
  warnings.push({
   id: 'sp-no-link',

   severity: 'info',

 // ── Supplier-tagged freight with no matching items ──────────────────────────
 frt.inbound.forEach(entry => {

  if (!hasMatch) {
   warnings.push({
    id: `freight-supplier-tag-unmatched-${entry.id}`,
    type: 'financial',

   });
  }
 });

 // ── Currency feed not refreshed ─────────────────────────────────────────
 if (actualItems2.length > 0) {
  const refreshed = proj.ratesRefreshedAt ? new Date(proj.ratesRefreshedAt) : null;
  const daysSince = refreshed ? (Date.now() - refreshed.getTime()) / (1000 * 60 * 60 * 24) : null;
  if (!refreshed) {
   warnings.push({
    id: 'rates-never-refreshed',

    tab: 'setup',

   });
  } else if (daysSince > 7) {

 }

 // ── Zero-cost items with Quotation source ────────────────────────────────
 // A unit cost of 0 with source "Quotation" is almost always an omission.

  (i.unitCost === 0 || !i.unitCost) &&
  (i.source === 'Quotation') &&
  i.type !== 'heading'
 );
 if (zeroCostQuotation.length > 0) {

   message: `"${i.partNumber || i.description || 'Item'}" has a unit cost of 0 with source "Quotation" — if cost is not yet known, consider changing the source to "Estimate"`
  });
  });
 }

 return { errors, warnings };
}, [proj.name, proj.customer, proj.bu, proj.sellCcy, proj.rates, proj.incoterm,

  if (cancelled) break;

   if (prices.length >= 2) {

    });

   }
   }

   if (uc > 0 && costHistory && costHistory.length >= 2) {

    const avg = costs.reduce((a,b)=>a+b,0)/costs.length;
    const variance = ((uc - avg) / avg) * 100;
    if (Math.abs(variance) > VARIANCE_THRESHOLD) {
    warnings.push({
     id: `hist-cost-${n.id}`, type: 'history-variance', severity: 'warning',
     tab: 'costing', itemId: n.id, partNumber: n.partNumber,
     message: `${n.partNumber}${n.description ? ' ('+n.description+')' : ''}: unit cost ${variance>0?'is '+variance.toFixed(1)+'% above':'is '+Math.abs(variance).toFixed(1)+'% below'} historical average (current ${uc.toFixed(2)} vs avg ${avg.toFixed(2)} ${n.ccy||'USD'})`

  } catch(e) { }

 if (!cancelled) {

  const sixMonthsAgo = new Date();
  sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);

  for (let i = 0; i < itemsWithParts.length; i += CHUNK) {
  if (cancelled) break;
  await Promise.all(itemsWithParts.slice(i, i + CHUNK).map(async (n) => {

    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Enter</kbd><span>Cell Below ↓</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Shift+Enter</kbd><span>Cell Above ↑</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>↑↓←→</kbd><span>Arrow Navigate</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Delete</kbd><span>Clear Cell</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Right-click</kbd><span>Fill Down column (context menu)</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Esc</kbd><span>Exit Cell</span>
    <div style={{gridColumn:"1/-1",height:1,background:"#334155",margin:"4px 0"}}></div>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Right-click</kbd><span>Insert / Delete Row</span>
    <div style={{gridColumn:"1/-1",height:1,background:"#334155",margin:"4px 0"}}></div>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+S</kbd><span>Save</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+F</kbd><span>Search</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+H</kbd><span>Find &amp; Replace</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>V</kbd><span>Toggle Validation Panel</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>?</kbd><span>Toggle this panel</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+Z</kbd><span>Undo</span>
    <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+Y</kbd><span>Redo</span>
    </div>
    {historyIndex >= 0 && (
    <div className="mt-2 text-xs" style={{color:"#64748b"}}>
     📜 History: {historyIndex + 1}/{history.length}
    </div>
    )}
   </div>
   ) : (
   <button
    onClick={()=>setShowShortcuts(true)}
    style={{
    background:"#1e293b",
    color:"#cbd5e1",
    border:"none",
    borderRadius:8,
    padding:"8px 12px",
    fontSize:11,
    cursor:"pointer",
    boxShadow:"0 4px 12px rgba(0,0,0,.3)",
    fontWeight:600,
    display:"flex",
    alignItems:"center",
    gap:6
    }}
    title="Show keyboard shortcuts"
   >
    {t('shortcuts')}
   </button>
   )}
  </div>
  )}
 </div>
 </>
);
}
