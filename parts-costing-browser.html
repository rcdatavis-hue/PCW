const calcICMSRate = (originState, destState) => {
  if (!originState || !destState) return 18; // default
  if (originState === destState) {
    return BR_STATES[destState]?.intrastate || 18;
  }
  
  const origin = BR_STATES[originState];
  const dest = BR_STATES[destState];
  if (!origin || !dest) return 18;
  
  const southSoutheast = ["South", "Southeast"];
  const others = ["North", "Northeast", "Center-West"];
  
  // Interstate rules
  if (southSoutheast.includes(origin.region) && others.includes(dest.region)) {
    return 7; // South/Southeast → North/Northeast/Center-West
  }
  return 12; // All other interstate operations
};

/* ─── Helpers ───────────────────────────────────────────────────────────────── */
const conv = (amt,from,to,rates) => from===to ? amt : (amt/(rates[from]||1))*(rates[to]||1);

const applyMargins = (base,{margin=0,contingency=0,dealer=0,discountMitigation=0}) => {
  let p=base;
  if(margin>0&&margin<100)           p/=(1-margin/100);
  if(contingency>0&&contingency<100) p/=(1-contingency/100);
  if(dealer>0&&dealer<100)           p/=(1-dealer/100);
  if(discountMitigation>0&&discountMitigation<100) p/=(1-discountMitigation/100);
  return p;
};

const fc  = (n,dp=2) => Number(n||0).toLocaleString("en-US",{minimumFractionDigits:dp,maximumFractionDigits:dp});
const fp  = n => Number(n||0).toFixed(2)+"%";

const addDays = (dateStr,n) => {
  const d=new Date(dateStr||Date.now());
  d.setDate(d.getDate()+(parseInt(n)||0));
  return d.toISOString().slice(0,10);
};

/* ─── NumInput — local draft, commits on blur ───────────────────────────────── */
const NumInput = ({value, onChange, className="", min, max, isPercent=false, ...rest}) => {
  const [draft, setDraft]   = useState("");
  const [editing, setEditing] = useState(false);
  const [isInvalid, setIsInvalid] = useState(false);
  const display = editing ? draft : fc(Number(value||0));

  const validate = (num) => {
    if (isNaN(num)) return false;
    if (min !== undefined && num < min) return false;
    if (max !== undefined && num > max) return false;
    if (isPercent && (num < 0 || num > 100)) return false;
    return true;
  };

  return (
    <input
      inputMode="decimal"
      {...rest}
      type="text"
      className={`${className} ${isInvalid ? 'pcw-input-invalid' : ''}`}
      value={display}
      onChange={e => {
        setDraft(e.target.value);
        const n = parseFloat(e.target.value.replace(/,/g,""));
        setIsInvalid(!validate(n));
      }}
      onFocus={e => {
        setEditing(true);
        setDraft(String(value??0));
        setIsInvalid(false);
        setTimeout(()=>e.target.select(),0);
      }}
      onBlur={() => {
        setEditing(false);
        const n = parseFloat(draft.replace(/,/g,""));
        if (!validate(n)) {
          // Clamp to valid range
          let validNum = isNaN(n) ? 0 : n;
          if (min !== undefined && validNum < min) validNum = min;
          if (max !== undefined && validNum > max) validNum = max;
          if (isPercent) {
            if (validNum < 0) validNum = 0;
            if (validNum > 100) validNum = 100;
          }
          onChange(validNum);
          setIsInvalid(false);
        } else {
          onChange(n);
          setIsInvalid(false);
        }
      }}
    />
  );
};

/* ─── Siscomex Charges ──────────────────────────────────────────────────────── */
// Calculate Siscomex charges based on number of imported items
// Source: FORMA DE CALCULO DA TAXA SISCOMEX
const calcSiscomex = (numImportedItems) => {
  if (numImportedItems === 0) return 0;
  
  const BASE_DI = 185.00; // Base declaration fee
  let total = BASE_DI;
  
  // Tiered pricing per addition (item)
  for (let i = 1; i <= numImportedItems; i++) {
    if (i === 1) {
      total += 29.50;
    } else if (i >= 2 && i <= 3) {
      total += 23.60;
    } else if (i >= 4 && i <= 10) {
      total += 17.70;
    } else if (i >= 11 && i <= 20) {
      total += 11.80;
    } else if (i >= 21 && i <= 50) {
      total += 5.90;
    } else { // 51+
      total += 2.95;
    }
  }
  
  return total;
};

/* ─── Brazilian Tax ─────────────────────────────────────────────────────────── */
// Import taxes - these are added to Landed COGS (true costs)
const calcImportTax = (cogsBRL, customsCharges=9, ii=0) => {
  // Customs clearance charges (% of COGS)
  const customs = cogsBRL * (customsCharges / 100);
  // Import Tax (II)
  const iiAmt = cogsBRL * (ii / 100);
  // AFRMM and Siscomex are calculated separately and added to freight
  return {
    customs,
    ii: iiAmt,
    total: customs + iiAmt
  };
};

// Sales taxes - these are charged to customers and are creditable (NOT added to Landed COGS)
const calcSalesTax = (sellPriceBRL, tc={}) => {
  const cfg = {...BR_DEFAULTS, ...tc};
  
  // Tax base for IPI, PIS, COFINS is the sell price (without taxes)
  const ipi = sellPriceBRL * (cfg.ipi / 100);
  const pis = sellPriceBRL * (cfg.pis / 100);
  const cofins = sellPriceBRL * (cfg.cofins / 100);
  
  // ICMS tax base is: Sell Price + IPI + PIS + COFINS
  const icmsBase = sellPriceBRL + ipi + pis + cofins;
  const icmsR = cfg.icms / 100;
  // ICMS gross-up calculation: base / (1 - rate) × rate
  const icms = icmsR < 1 ? (icmsBase / (1 - icmsR)) * icmsR : 0;
  
  return {
    ipi,
    pis,
    cofins,
    icms,
    total: ipi + pis + cofins + icms
  };
};

// Legacy function for backward compatibility during migration
const calcBrazilTax = (cogsBRL, tc={}) => {
  const cfg  = {...BR_DEFAULTS,...tc};
  const ii   = cogsBRL*(cfg.ii/100);
  const ipi  = (cogsBRL+ii)*(cfg.ipi/100);
  const pis  = cogsBRL*(cfg.pis/100);
  const cf   = cogsBRL*(cfg.cofins/100);
  const icmsR= cfg.icms/100;
  const icms = icmsR<1 ? ((cogsBRL+ii+ipi+pis+cf)/(1-icmsR))*icmsR : 0;
  return {ii,ipi,pis,cofins:cf,icms,total:ii+ipi+pis+cf+icms};
};

/* ─── BOM ───────────────────────────────────────────────────────────────────── */
const buildTree = flat => {
  const map={};
  flat.filter(i=>i.type!=="heading").forEach(i=>(map[i.id]={...i,_ch:[]}));
  const roots=[];
  flat.filter(i=>i.type!=="heading").forEach(i=>{
    if(i.parentId&&map[i.parentId]) map[i.parentId]._ch.push(map[i.id]);
    else roots.push(map[i.id]);
  });
  return roots;
};

const calcNode = (n,rates,sellCcy) => {
  const cv=(a,c)=>conv(a,c||"USD",sellCcy,rates);
  if(!n._ch.length){
    const unitC=cv(n.unitCost||0,n.ccy);
    return{...n,_ch:[],unitC,totalCOGS:unitC*(n.qty||1)};
  }
  const children=n._ch.map(c=>calcNode(c,rates,sellCcy));
  const ownC=cv(n.unitCost||0,n.ccy);
  const childSum=children.reduce((s,c)=>s+c.totalCOGS,0);
  const totalCOGS=(childSum+ownC)*(n.qty||1);
  return{...n,_ch:children,unitC:totalCOGS/(n.qty||1),totalCOGS};
};

/* ─── Context ────────────────────────────────────────────────────────────────── */
const Ctx = createContext(null);

/* ─── HeadingRow ─────────────────────────────────────────────────────────────── */
const HeadingRow = memo(function HeadingRow({item}) {
  const {updItem, removeItem, reorderItem, draggedItem, setDraggedItem, dropTarget, setDropTarget, colVisibility} = useContext(Ctx);
  const isDragging = draggedItem === item.id;
  const isDropTarget = dropTarget?.id === item.id;
  
  // Calculate number of visible columns (checkbox + visible cols)
  const visibleColCount = 1 + Object.values(colVisibility).filter(Boolean).length;
  
  return (
    <tr 
      className="pcw-heading-row group"
      draggable="true"
      onDragStart={(e) => {
        setDraggedItem(item.id);
        e.dataTransfer.effectAllowed = 'move';
      }}
      onDragEnd={() => {
        setDraggedItem(null);
        setDropTarget(null);
      }}
      onDragOver={(e) => {
        e.preventDefault();
        if (draggedItem && draggedItem !== item.id) {
          const rect = e.currentTarget.getBoundingClientRect();
          const midpoint = rect.top + rect.height / 2;
          const position = e.clientY < midpoint ? 'before' : 'after';
          setDropTarget({ id: item.id, position });
        }
      }}
      onDragLeave={() => {
        setDropTarget(null);
      }}
      onDrop={(e) => {
        e.preventDefault();
        if (draggedItem && draggedItem !== item.id && dropTarget) {
          reorderItem(draggedItem, item.id, dropTarget.position);
        }
        setDraggedItem(null);
        setDropTarget(null);
      }}
      style={{
        opacity: isDragging ? 0.5 : 1,
        borderTop: isDropTarget && dropTarget.position === 'before' ? '3px solid #3b82f6' : undefined,
        borderBottom: isDropTarget && dropTarget.position === 'after' ? '3px solid #3b82f6' : undefined,
        cursor: 'grab'
      }}
    >
      <td colSpan={visibleColCount} className="px-3 py-1.5">
        <div className="flex items-center gap-2">
          <span className="pcw-drag-handle">⋮⋮</span>
          <span className="pcw-heading-tag">§</span>
          <input
            className="pcw-heading-input flex-1"
            value={item.text||""}
            onChange={e=>updItem(item.id,"text",e.target.value)}
            placeholder="Section heading…"
            onDragStart={e => e.stopPropagation()}
            draggable="false"
          />
          <button className="pcw-btn-rm opacity-0 group-hover:opacity-100 transition-opacity" onClick={()=>removeItem(item.id)}>✕</button>
        </div>
      </td>
    </tr>
  );
});

/* ─── ItemRow ────────────────────────────────────────────────────────────────── */
const ItemRow = memo(function ItemRow({n, depth=0}) {
  const {updItem, removeItem, addItem, getAlloc, getItemSP, getItemSPWithSalesTax, getItemNetPrice, calculateReverseMargin, showNotes, toggleNotes, lookupPartNumber, showHistory, showCostHistory, reorderItem, draggedItem, setDraggedItem, dropTarget, setDropTarget, colWidths, discountMitigation, duplicateIds, colVisibility, selectedItems, setSelectedItems, focusedCell, setFocusedCell, items, isCIT, sellCcy} = useContext(Ctx);
  const isRoot   = depth===0;
  const isParent = n._ch&&n._ch.length>0;
  const isPricelist = n.source==="Pricelist";
  const isDuplicate = duplicateIds && duplicateIds.has(n.id);
  const a        = isRoot ? getAlloc(n) : null;
  const sp       = isRoot ? getItemSP(n) : null;
  const netPrice = isRoot ? getItemNetPrice(n) : null;
  const spWithTax = isRoot && isCIT ? getItemSPWithSalesTax(n) : null;
  const netPriceWithTax = isRoot && isCIT && spWithTax ? spWithTax * (n.qty || 1) * (1 - (n.discount||0)/100) : null;
  const unitSellPrice = isRoot && netPrice ? netPrice / (n.qty || 1) : null;
  const unitSellPriceWithTax = isRoot && isCIT && netPriceWithTax ? netPriceWithTax / (n.qty || 1) : null;
  const hasDiscount = isRoot && n.discount > 0;
  const pl       = 6+depth*16;
  const score    = SOURCE_SCORE[n.source]||3;
  const rowBg    = depth===0?"#fff":depth===1?"#f8fafc":depth===2?"#f0f4ff":"#f5f0ff";
  const hasNote  = !!(n.notes&&n.notes.trim());
  const noteOpen = showNotes.has(n.id);
  const isDragging = draggedItem === n.id;
  const isDropTarget = dropTarget?.id === n.id;

  // Get editable columns
  const getEditableColumns = () => {
    return ['partNo', 'description', 'drawingNo', 'supplier', 'qty', 'unitCost', 'tariff', 'margins', 'discount', 'source']
      .filter(col => colVisibility[col]);
  };

  // Keyboard navigation handler
  const handleKeyDown = (e, column) => {
    // Tab - move right (or left with Shift)
    if (e.key === 'Tab') {
      e.preventDefault();
      
      const editableColumns = getEditableColumns();
      const currentColIndex = editableColumns.indexOf(column);
      const visibleItems = items.filter(i => i.type !== 'heading');
      const currentItemIndex = visibleItems.findIndex(i => i.id === n.id);
      
      let newColIndex = currentColIndex + (e.shiftKey ? -1 : 1);
      let newItemIndex = currentItemIndex;
      
      // Wrap to next/previous row
      if (newColIndex >= editableColumns.length) {
        newColIndex = 0;
        newItemIndex++;
      } else if (newColIndex < 0) {
        newColIndex = editableColumns.length - 1;
        newItemIndex--;
      }
      
      // Stay within bounds
      if (newItemIndex < 0 || newItemIndex >= visibleItems.length) return;
      
      const newItem = visibleItems[newItemIndex];
      const newColumn = editableColumns[newColIndex];
      
      setTimeout(() => {
        const input = document.querySelector(`[data-cell="${newItem.id}-${newColumn}"]`);
        if (input) {
          input.focus();
          if (input.select) input.select();
        }
      }, 10);
    }
    
    // Enter - move down
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      
      const visibleItems = items.filter(i => i.type !== 'heading');
      const currentIndex = visibleItems.findIndex(i => i.id === n.id);
      
      if (currentIndex >= 0 && currentIndex < visibleItems.length - 1) {
        const nextItem = visibleItems[currentIndex + 1];
        setTimeout(() => {
          const input = document.querySelector(`[data-cell="${nextItem.id}-${column}"]`);
          if (input) {
            input.focus();
            if (input.select) input.select();
          }
        }, 10);
      }
    }
    
    // Shift+Enter - move up
    if (e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      
      const visibleItems = items.filter(i => i.type !== 'heading');
      const currentIndex = visibleItems.findIndex(i => i.id === n.id);
      
      if (currentIndex > 0) {
        const prevItem = visibleItems[currentIndex - 1];
        setTimeout(() => {
          const input = document.querySelector(`[data-cell="${prevItem.id}-${column}"]`);
          if (input) {
            input.focus();
            if (input.select) input.select();
          }
        }, 10);
      }
    }
    
    // Escape - blur current cell
    if (e.key === 'Escape') {
      e.target.blur();
    }
  };

  return (
    <>
      <tr 
        style={{
          background:rowBg,
          borderBottom: noteOpen?"none":"1px solid #e2e8f0",
          opacity: isDragging ? 0.5 : 1,
          borderTop: isRoot && isDropTarget && dropTarget.position === 'before' ? '3px solid #3b82f6' : undefined,
          borderBottom: isRoot && isDropTarget && dropTarget.position === 'after' ? '3px solid #3b82f6' : noteOpen?"none":"1px solid #e2e8f0",
          cursor: isRoot ? 'grab' : undefined
        }} 
        className="pcw-row group"
        draggable={isRoot}
        onDragStart={(e) => {
          if (isRoot) {
            setDraggedItem(n.id);
            e.dataTransfer.effectAllowed = 'move';
          }
        }}
        onDragEnd={() => {
          if (isRoot) {
            setDraggedItem(null);
            setDropTarget(null);
          }
        }}
        onDragOver={(e) => {
          if (isRoot && draggedItem && draggedItem !== n.id) {
            e.preventDefault();
            const rect = e.currentTarget.getBoundingClientRect();
            const midpoint = rect.top + rect.height / 2;
            const position = e.clientY < midpoint ? 'before' : 'after';
            setDropTarget({ id: n.id, position });
          }
        }}
        onDragLeave={() => {
          if (isRoot) {
            setDropTarget(null);
          }
        }}
        onDrop={(e) => {
          if (isRoot && draggedItem && draggedItem !== n.id && dropTarget) {
            e.preventDefault();
            reorderItem(draggedItem, n.id, dropTarget.position);
            setDraggedItem(null);
            setDropTarget(null);
          }
        }}
      >
        {/* Select checkbox */}
        <td className="py-1 px-1 text-center" style={{width:40}}>
          {isRoot && (
            <input 
              type="checkbox" 
              checked={selectedItems.has(n.id)}
              onChange={e=>{
                const newSet = new Set(selectedItems);
                if(e.target.checked){
                  newSet.add(n.id);
                }else{
                  newSet.delete(n.id);
                }
                setSelectedItems(newSet);
              }}
              onClick={e=>e.stopPropagation()}
            />
          )}
        </td>
        {/* Part No - with lookup on blur */}
        {colVisibility.partNo && (
          <td style={{paddingLeft:pl,minWidth:colWidths.partNo}} className="py-1 pr-1">
            <div className="flex items-center gap-1">
              {isRoot && <span className="pcw-drag-handle">⋮⋮</span>}
              {isParent && <span className="pcw-badge-bom">BOM</span>}
              {!isRoot  && <span style={{color:"#d1d5db",fontSize:10}} className="mr-0.5">└</span>}
              <input
                className="pcw-ci w-20"
                value={n.partNumber||""}
                onChange={e=>updItem(n.id,"partNumber",e.target.value)}
                onBlur={e=>{ if(e.target.value.trim()) lookupPartNumber(n.id, e.target.value.trim()); }}
                onKeyDown={e=>handleKeyDown(e,'partNo')}
                data-cell={`${n.id}-partNo`}
                placeholder="Part No."
                title="Type part number and press Tab to auto-fill"
                onDragStart={e => e.stopPropagation()}
                draggable="false"
                style={isDuplicate ? {borderColor:"#fbbf24", background:"#fffbeb"} : {}}
              />
              {isDuplicate && (
                <span 
                  style={{color:"#f59e0b", fontSize:14, cursor:"help"}} 
                  title={`⚠️ Duplicate: "${n.partNumber}" appears multiple times in this quote`}
                >⚠️</span>
              )}
              {hasNote && !noteOpen && (
                <span 
                  style={{color:"#3b82f6", fontSize:11, cursor:"pointer"}} 
                  title="This item has notes (click Actions → 📝 to view)"

                >📌</span>
              )}
              {n.partNumber&&(
                <>
                  <button
                    className="pcw-btn-history"
                    title="View pricing history (sales)"
                    onClick={()=>showHistory(n.id, n.partNumber)}
                  >📈</button>
                  <button

                    onClick={()=>showCostHistory(n.id, n.partNumber)}
                  >💰</button>
                </>
              )}
            </div>
          </td>
        )}
        {/* Description */}
        {colVisibility.description && (
          <td className="py-1 px-1" style={{minWidth:colWidths.description,width:'auto'}}>
            <div className="flex items-center gap-1">
              <input 
                className="pcw-ci min-w-32 w-full"

              />

              placeholder="Drawing No."

        {/* Supplier */}
        {colVisibility.supplier && (

  return (
    <span title={text} style={{cursor: 'help', borderBottom: '1px dotted currentColor'}}>
      {children}

};

/* ─── CustomerSearch component (module scope to avoid hooks issues) ──────────── */
const CustomerSearch = ({proj, setProj, language}) => {
  const [query,    setQuery]    = useState(proj.customer.name||"");
  const [results,  setResults]  = useState([]);
  const [searching,setSearching]= useState(false);
  const [searched, setSearched] = useState(false);
  
  const t = (key) => TRANSLATIONS[language]?.[key] || key;
  
  const search = async q => {
    if(!q.trim()){setResults([]);setSearched(false);return;}
    setSearching(true);setSearched(false);
    try{ const r=await DataService.searchCustomers(q); setResults(r); setSearched(true); }
    catch(e){ setResults([]); setSearched(true); }
    setSearching(false);
  };
  
  const pick = c => {
    setProj(p=>({...p,customer:{...p.customer,name:c.name,ref:c.ref,country:c.country}}));
    setQuery(c.name); setResults([]); setSearched(false);
  };
  
  return (
    <div className="space-y-3">
      <div>
        <L>Search SharePoint Customer Database</L>
        <div className="flex gap-2">
          <input className="pcw-input flex-1" value={query} onChange={e=>setQuery(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&search(query)}
            placeholder="Type customer name or ref…"/>
          <button className="pcw-btn-sp" onClick={()=>search(query)} disabled={searching}>
            {searching?"…":"🔍 Search"}
          </button>
        </div>
        {results.length>0&&(
          <div className="pcw-sp-results">
            {results.map(c=>(
              <div key={c.id} className="pcw-sp-result-row" onClick={()=>pick(c)}>
                <div className="font-semibold text-xs pcw-sp-result-name">{c.name}</div>
                <div className="text-xs pcw-sp-result-details">{c.ref} · {c.country} · {c.contact}</div>
              </div>
            ))}
          </div>
        )}
        {searched&&results.length===0&&(
          <div className="text-xs mt-1" style={{color:"#94a3b8"}}>No customers found — enter details manually below.</div>
        )}
      </div>
      <div className="pcw-grid-2 gap-3">
        <div className="col-span-2">
          <L>{t('customerName')}</L>
          <I value={proj.customer.name} onChange={e=>setProj(p=>({...p,customer:{...p.customer,name:e.target.value}}))} placeholder="Customer name"/>
        </div>
        <div><L>{t('customerCode')}</L><I value={proj.customer.code||""} onChange={e=>setProj(p=>({...p,customer:{...p.customer,code:e.target.value}}))} placeholder="Customer code"/></div>
        <div><L>{t('customerRef')}</L><I value={proj.customer.ref} onChange={e=>setProj(p=>({...p,customer:{...p.customer,ref:e.target.value}}))} placeholder="PO or reference"/></div>
        <div className="col-span-2"><L>{t('country')}</L><I value={proj.customer.country} onChange={e=>setProj(p=>({...p,customer:{...p.customer,country:e.target.value}}))} placeholder="e.g. Brazil"/></div>
      </div>
    </div>
  );
};

function PartsWorksheet() {
  const [tab,         setTab]         = useState("setup");

      discount: 60,
      source: 100,
      actions: 90
    };
  });
  const [colVisibility, setColVisibility] = useState({
    partNo: true,
    description: true,
    drawingNo: true,
    supplier: true,
    qty: true,
    unitCost: true,
    cogs: true,
    landed: true,
    tariff: false,
    imported: true, // CIT only - shows for imported items
    afrmm: true, // CIT only - shows for items subject to AFRMM
    leadTime: true,
    margins: true,
    unitSellPrice: true,
    sellPrice: true,

    sellPriceWithTax: true, // CIT only - total sell price including sales taxes
    discount: true,
    source: true,
    actions: true
  });
  const [showColMenu, setShowColMenu] = useState(false);
  const [darkMode, setDarkMode] = useState(false);
  const [focusedCell, setFocusedCell] = useState(null); // {itemId, column}
  const [resizing,    setResizing]    = useState(null);
  const isFirstLoad = useRef(true);
  const [saveStatus, setSaveStatus] = useState("idle");
  
  // Undo/Redo system
  const [history, setHistory] = useState([]);
  const [historyIndex, setHistoryIndex] = useState(-1);
  const [searchQuery, setSearchQuery] = useState("");
  const [selectedItems, setSelectedItems] = useState(new Set());
  const [showBulkEdit, setShowBulkEdit] = useState(false);
  const [selectedBrazilItems, setSelectedBrazilItems] = useState(new Set());
  const [showBrazilBulkEdit, setShowBrazilBulkEdit] = useState(false);
  const [forceAllocToPricelist, setForceAllocToPricelist] = useState(false);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [hideShortcutsWidget, setHideShortcutsWidget] = useState(()=>{
    try {
      return localStorage.getItem('pcw-hide-shortcuts') === 'true';
    } catch {
      return false;
    }
  });
  const [showCurrencyBreakdown, setShowCurrencyBreakdown] = useState(false);
  const [showMarginAnalysis, setShowMarginAnalysis] = useState(false);
  const [hideDuplicateWarning, setHideDuplicateWarning] = useState(false);
  const [language, setLanguage] = useState("en");
  const [dateFormat, setDateFormat] = useState("us");
  
  // Helper to get translations
  const t = useCallback((key) => TRANSLATIONS[language]?.[key] || key, [language]);
  
  // Helper to format dates based on preference
  const formatDate = useCallback((dateString) => {
    if (!dateString) return "";
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return dateString;
    
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    
    return dateFormat === "us" 
      ? `${month}/${day}/${year}`  // MM/DD/YYYY
      : `${day}/${month}/${year}`; // DD/MM/YYYY
  }, [dateFormat]);
  
  // Set date format based on BU
  useEffect(() => {
    if (proj.bu === "CIW") {
      setDateFormat("us");
    } else {
      setDateFormat("uk");
    }
  }, [proj.bu]);

  /* ── Persistent storage (window.storage API) ── */
  useEffect(()=>{
    setSaveStatus("loading");
    (async()=>{
      try{
        const res = await window.storage.get("pcw-state-v1");
        if(res?.value){
          const d=JSON.parse(res.value);
          // Apply migrations for new fields
          if(d.proj) {
            const migratedProj = {
              ...d.proj,
              // Ensure S&A Expense defaults to 10% if missing
              sAndAExpense: d.proj.sAndAExpense !== undefined ? d.proj.sAndAExpense : 10
            };
            setProj(migratedProj);
          }
          if(d.items)       setItems(d.items);
          if(d.frt)         setFrt(d.frt);
          if(d.sched)       setSched(d.sched);
          if(d.brazilTaxes) setBrazilTaxes(d.brazilTaxes);
          if(d.brazilStates) setBrazilStates(d.brazilStates);
          setSaveStatus("idle");
        } else {
          setSaveStatus("idle");
        }
      }catch(e){
        setSaveStatus("idle");
      }
      isFirstLoad.current=false;
    })();
  },[]);

  const manualSave=async()=>{
    setSaveStatus("saving");
    try{
      await window.storage.set("pcw-state-v1",JSON.stringify({proj,items,frt,sched,brazilTaxes,brazilStates}));
      setSaveStatus("saved");
      setTimeout(()=>setSaveStatus("idle"),2500);
    }catch(e){
      setSaveStatus("error");
      setTimeout(()=>setSaveStatus("idle"),3000);
    }
  };

  const clearSave=async()=>{
    if(!window.confirm("Reset all data and clear saved state?")) return;
    
    console.log("Clear & Reset initiated");
    
    // Delete from storage (don't fail if this errors)
    try { 
      await window.storage.delete("pcw-state-v1");
      console.log("Storage cleared");
    } catch(e) {
      console.warn("Storage delete failed:", e);
    }
    
    // Reset all state
    setProj(initProj);
    setItems([]);
    setFrt(initFrt);
    setSched({start:new Date().toISOString().slice(0,10),phases:makePhases(),salesforceLink:"",sharepointLink:""});
    setBrazilTaxes({});
    setBrazilStates({origin:"SP",destination:"SP"});
    setSaveStatus("idle");
    
    console.log("All state reset complete");
  };

  const saveStatusLabel = {idle:"",saving:"Saving…",saved:"Saved ✓",error:"Save failed ✗",loading:"Loading…"}[saveStatus];
  const saveStatusColor = {idle:"",saving:"#94a3b8",saved:"#16a34a",error:"#dc2626",loading:"#94a3b8"}[saveStatus];

  // Update browser tab title with project name
  useEffect(() => {
    const title = proj.name 
      ? `${proj.name} - Parts Costing Worksheet`
      : "Parts Costing Worksheet";
    document.title = title;
  }, [proj.name]);

  /* ── Derived ── */
  const isCIT    = proj.bu==="CIT";
  const tree     = useMemo(()=>buildTree(items).map(n=>calcNode(n,proj.rates,proj.sellCcy)),[items,proj.rates,proj.sellCcy]);
  
  // Filtered tree for search
  const filteredTree = useMemo(() => {
    if (!searchQuery.trim()) return tree;
    const query = searchQuery.toLowerCase();
    return tree.filter(n => 
      n.type !== "heading" && ( // Exclude headings from search
        n.partNumber?.toLowerCase().includes(query) ||
        n.description?.toLowerCase().includes(query) ||
        n.supplier?.toLowerCase().includes(query) ||
        n.drawingNumber?.toLowerCase().includes(query)
      )
    );
  }, [tree, searchQuery]);

  // Duplicate part number detection
  const duplicates = useMemo(() => {
    const partCounts = {};
    const dupes = new Set();
    
    items.filter(i => i.type !== "heading" && i.partNumber?.trim()).forEach(item => {
      const pn = item.partNumber.trim().toUpperCase();
      if (!partCounts[pn]) {
        partCounts[pn] = [];
      }
      partCounts[pn].push(item.id);
    });
    
    Object.entries(partCounts).forEach(([pn, ids]) => {
      if (ids.length > 1) {
        ids.forEach(id => dupes.add(id));
      }
    });
    
    return {
      duplicateIds: dupes,
      duplicatePartNumbers: Object.entries(partCounts)
        .filter(([pn, ids]) => ids.length > 1)
        .map(([pn, ids]) => ({ partNumber: pn, count: ids.length }))
    };
  }, [items]);
  const topCOGS  = useMemo(()=>tree.reduce((s,n)=>s+n.totalCOGS,0),[tree]);

  const totalInbFrt = useMemo(()=>
    frt.inbound.reduce((s,e)=>s+conv(e.cost||0,e.ccy||"USD",proj.sellCcy,proj.rates),0),
    [frt.inbound,proj]
  );

  // Siscomex calculation (CIT only) - based on number of imported items
  const siscomex = useMemo(() => {
    if (!isCIT) return { numImported: 0, totalBRL: 0, totalSC: 0 };
    
    const numImported = items.filter(i => i.type !== "heading" && i.imported).length;
    const totalBRL = calcSiscomex(numImported);
    const totalSC = conv(totalBRL, "BRL", proj.sellCcy, proj.rates);
    
    return { numImported, totalBRL, totalSC };
  }, [items, isCIT, proj]);

  // AFRMM calculation (CIT only) - use editable rate from project
  const afrmm = useMemo(() => {
    if (!isCIT) return { applicableFreight: 0, totalAFRMM: 0, totalAFRMMSC: 0 };
    
    const applicableFreightBRL = frt.inbound
      .filter(e => e.afrmm)
      .reduce((s, e) => s + conv(e.cost||0, e.ccy||"USD", "BRL", proj.rates), 0);
    
    const afrmmRate = proj.afrmmRate || 8; // Default 8% if not set
    const totalAFRMMBRL = applicableFreightBRL * (afrmmRate / 100);
    const totalAFRMMSC = conv(totalAFRMMBRL, "BRL", proj.sellCcy, proj.rates);
    
    return {
      applicableFreight: applicableFreightBRL,
      totalAFRMM: totalAFRMMBRL,
      totalAFRMMSC: totalAFRMMSC
    };
  }, [frt.inbound, proj, isCIT]);

  const outEntries = useMemo(()=>
    frt.outbound.map(e=>({
      ...e,
      costSC: conv(e.cost||0,e.ccy||"USD",proj.sellCcy,proj.rates),
      sellSC: (e.margin||0)<100 ? conv(e.cost||0,e.ccy||"USD",proj.sellCcy,proj.rates)/(1-(e.margin||0)/100) : conv(e.cost||0,e.ccy||"USD",proj.sellCcy,proj.rates)
    })),
    [frt.outbound,proj]
  );
  const totalOutSP = useMemo(()=>outEntries.reduce((s,e)=>s+e.sellSC,0),[outEntries]);

  const eligibleCOGS = useMemo(()=>
    tree.reduce((s,n)=>s+(forceAllocToPricelist || n.source!=="Pricelist" ? n.totalCOGS : 0), 0),
    [tree, forceAllocToPricelist]
  );
  
  // Eligible COGS for imported items (for Siscomex allocation)
  const importedCOGS = useMemo(()=>
    tree.reduce((s,n)=>((forceAllocToPricelist || n.source!=="Pricelist") && n.imported) ? s+n.totalCOGS : s, 0),
    [tree, forceAllocToPricelist]
  );
  
  // Eligible COGS for AFRMM items (for AFRMM allocation)
  const afrmmCOGS = useMemo(()=>
    tree.reduce((s,n)=>((forceAllocToPricelist || n.source!=="Pricelist") && n.afrmm) ? s+n.totalCOGS : s, 0),
    [tree, forceAllocToPricelist]
  );

  /* ── Per-item allocation ── */
  const getAlloc = useCallback(n=>{
    const isPL = n.source==="Pricelist";
    const skipAlloc = isPL && !forceAllocToPricelist; // Only skip if pricelist AND override is off
    
    // Freight allocation
    const fr = skipAlloc ? 0 : (eligibleCOGS>0 ? (n.totalCOGS/eligibleCOGS)*totalInbFrt : 0);
    
    // Siscomex allocation (only for imported items, proportional to COGS)
    const siscomexAlloc = (!skipAlloc && isCIT && n.imported && importedCOGS>0)
      ? (n.totalCOGS / importedCOGS) * (siscomex.totalSC || 0)
      : 0;
    
    // AFRMM allocation (only for items with afrmm=true, proportional to COGS)
    const afrmAlloc = (!skipAlloc && isCIT && n.afrmm && afrmmCOGS>0) 
      ? (n.totalCOGS/afrmmCOGS) * (afrmm.totalAFRMMSC || 0)
      : 0;
    
    // CIF = Cost + Freight + Siscomex + AFRMM
    const cif = n.totalCOGS + fr + siscomexAlloc + afrmAlloc;
    
    // Tariff on CIF (for non-CIT business units)
    const tar = skipAlloc ? 0 : (isCIT ? 0 : cif * ((n.tariff||0)/100));
    
    // Import taxes on CIF (CIT only - these are TRUE COSTS added to Landed)
    // Import taxes: II (Import Tax) + Customs Charges
    // Sales taxes (IPI, PIS, COFINS, ICMS) are NOT included in Landed COGS
    let importTax = 0;
    if(!skipAlloc && isCIT){
      const cifBRL = conv(cif, proj.sellCcy, "BRL", proj.rates);
      const tc = brazilTaxes[n.id] || {};
      const br = calcImportTax(cifBRL, n.customsCharges||proj.customsCharges||9, tc.ii||0);
      importTax = conv(br.total, "BRL", proj.sellCcy, proj.rates);
    }
    
    return{
      fr,
      siscomex: siscomexAlloc,
      afrmm: afrmAlloc,
      cif,
      tax: importTax, // Only import taxes now (II + Customs)
      tar,
      landed: n.totalCOGS + fr + siscomexAlloc + afrmAlloc + importTax + tar
    };
  },[eligibleCOGS,importedCOGS,afrmmCOGS,totalInbFrt,isCIT,brazilTaxes,proj,afrmm,siscomex,forceAllocToPricelist]);

  const getItemSP = useCallback(n=>{
    // If manual sell price is set, use it
    if (n.manualSellPrice !== null && n.manualSellPrice !== undefined) {
      return n.manualSellPrice;
    }
    // Otherwise calculate from margins
    const a=getAlloc(n);
    return applyMargins(a.landed,{margin:n.margin||0,contingency:n.contingency||0,dealer:proj.defaultDealer||0,discountMitigation:proj.discountMitigation||0});
  },[getAlloc,proj.defaultDealer,proj.discountMitigation]);

  // Calculate what margin would be needed to achieve a given sell price
  const calculateReverseMargin = useCallback((n, targetSellPrice) => {
    const a = getAlloc(n);
    const landed = a.landed;
    if (landed === 0) return 0;
    
    // Work backwards from sell price to find margin
    // SP = Landed / (1 - (margin + contingency + dealer) / 100) * (1 + discountMitig/100)
    // Solving for margin:
    const contingency = n.contingency || 0;
    const dealer = proj.defaultDealer || 0;
    const discountMitig = proj.discountMitigation || 0;
    
    // SP / (1 + discountMitig/100) = Landed / (1 - (margin + contingency + dealer)/100)
    const adjustedSP = targetSellPrice / (1 + discountMitig/100);
    
    // (1 - (margin + contingency + dealer)/100) = Landed / adjustedSP
    // (margin + contingency + dealer)/100 = 1 - (Landed / adjustedSP)
    // margin = ((1 - Landed/adjustedSP) * 100) - contingency - dealer
    
    const totalMarginNeeded = (1 - (landed / adjustedSP)) * 100;
    const margin = totalMarginNeeded - contingency - dealer;
    
    return margin;
  }, [getAlloc, proj.defaultDealer, proj.discountMitigation]);

  // Calculate sell price WITH sales taxes (for CIT only)
  const getItemSPWithSalesTax = useCallback(n=>{
    const sp = getItemSP(n); // Sell price without sales taxes
    if (!isCIT) return sp; // Only applies to CIT
    
    // Convert to BRL for tax calculation
    const spBRL = conv(sp, proj.sellCcy, "BRL", proj.rates);
    
    // Calculate sales taxes
    const tc = brazilTaxes[n.id] || {};
    const salesTax = calcSalesTax(spBRL, tc);
    
    // Convert total tax back to sell currency and add to sell price
    const salesTaxSC = conv(salesTax.total, "BRL", proj.sellCcy, proj.rates);
    
    return sp + salesTaxSC;
  }, [getItemSP, isCIT, proj, brazilTaxes]);

  const getItemNetPrice = useCallback(n=>{
    const sp = getItemSP(n);
    return sp * (1 - (n.discount||0)/100);
  },[getItemSP]);

  const landedCOGS = useMemo(()=>tree.reduce((s,n)=>s+getAlloc(n).landed,0),[tree,getAlloc]);
  const itemsSP    = useMemo(()=>tree.reduce((s,n)=>s+getItemNetPrice(n),0),[tree,getItemNetPrice]);
  const grand      = itemsSP+totalOutSP;
  
  // For CIT: Calculate sell prices WITH sales taxes
  const itemsSPWithTax = useMemo(()=>{
    if (!isCIT) return itemsSP;
    return tree.reduce((s,n)=>{
      const spWithTax = getItemSPWithSalesTax(n);
      const disc = 1 - (n.discount||0)/100;
      return s + spWithTax * (n.qty||1) * disc;
    }, 0);
  }, [tree, getItemSPWithSalesTax, isCIT, itemsSP]);
  const grandWithTax = isCIT ? itemsSPWithTax + totalOutSP : grand;

  /* ── Auto confidence ── */
  const autoConf = useMemo(()=>{
    let tw=0,ts=0;
    items.filter(i=>i.type!=="heading").forEach(i=>{

      ts+=(SOURCE_SCORE[i.source]||3)*w; tw+=w;
    });
    return tw===0?3:Math.min(5,Math.max(1,Math.round(ts/tw)));
  },[items,proj.rates,proj.sellCcy]);

      if (draggedIdx === -1 || targetIdx === -1 || draggedIdx === targetIdx) return prev;
      
      const newItems = [...prev];
      const [draggedItem] = newItems.splice(draggedIdx, 1);
      const newTargetIdx = newItems.findIndex(i => i.id === targetId);

      newItems.splice(insertIdx, 0, draggedItem);

  const handlePaste = useCallback((e) => {
    // Only handle paste if not in an input field

      return; // Let normal paste work in inputs
    }
    
    e.preventDefault();
    
    try {
      const clipboardData = e.clipboardData.getData('text');
      if (!clipboardData) return;
      
      // Split into rows (Excel uses \r\n or \n)
      const rows = clipboardData.split(/\r?\n/).filter(row => row.trim());
      if (rows.length === 0) return;
      
      const newItems = [];
      
      rows.forEach(row => {
        // Split by tabs (Excel columns)
        const cols = row.split('\t');
        
        // Map columns to item fields
        // Expected order: Part No, Description, Drawing No, Supplier, Qty, Unit Cost, Currency, Tariff%, Margin%, Contingency%, Discount%, Source, Notes

        newItems.push({
          id: uid(),
          type: 'item',
          parentId: null,
          partNumber: partNo,
          description: desc,
          drawingNumber: drawingNo,
          supplier: supplier,
          qty: qty,

          ccy: ccy,
          source: source,

          imported: false,
          afrmm: false,
          manualSellPrice: null,
          notes: notes
        });
      });
      
      if (newItems.length > 0) {
        setItems(prev => [...prev, ...newItems]);
        alert(`✅ Pasted ${newItems.length} item${newItems.length !== 1 ? 's' : ''} from Excel`);

  const navigateCell = (direction) => {
    if (!focusedCell) return;
    
    const editableColumns = getEditableColumns();
    const visibleItems = getVisibleItems();
    
    const currentItemIndex = visibleItems.findIndex(i => i.id === focusedCell.itemId);
    const currentColIndex = editableColumns.indexOf(focusedCell.column);
    
    if (currentItemIndex === -1 || currentColIndex === -1) return;
    
    let newItemIndex = currentItemIndex;
    let newColIndex = currentColIndex;
    
    switch (direction) {
      case 'right':
        newColIndex++;
        if (newColIndex >= editableColumns.length) {
          newColIndex = 0;
          newItemIndex++;
        }
        break;
      case 'left':
        newColIndex--;
        if (newColIndex < 0) {
          newColIndex = editableColumns.length - 1;
          newItemIndex--;
        }
        break;
      case 'down':
        newItemIndex++;
        break;
      case 'up':
        newItemIndex--;
        break;
    }
    
    // Bounds check
    if (newItemIndex < 0 || newItemIndex >= visibleItems.length) return;
    
    const newItem = visibleItems[newItemIndex];
    const newColumn = editableColumns[newColIndex];
    
    // Set focused cell state
    setFocusedCell({ itemId: newItem.id, column: newColumn });
    
    // Focus the input on next tick
    setTimeout(() => {
      const input = document.querySelector(`[data-cell="${newItem.id}-${newColumn}"]`);
      if (input) {
        input.focus();
        if (input.select) input.select();
      }
    }, 10);
  };

  /* ═══ Brazil Import Taxes Tab ════════════════════════════════════════════════ */
  const BrazilImportTaxTab=()=>{
    if(!isCIT) return null;
    
    // Calculate totals for import taxes only - use tree to match displayed items
    const totals = tree.reduce((acc,item)=>{
      const alloc = getAlloc(item);
      const cifSC = alloc.cif;
      const cifBRL = conv(cifSC, proj.sellCcy, "BRL", proj.rates);
      const tc = getBT(item.id);
      const importTax = calcImportTax(cifBRL, item.customsCharges||proj.customsCharges||9, tc.ii||0);
      return{
        customs: acc.customs + importTax.customs,
        ii: acc.ii + importTax.ii,
        total: acc.total + importTax.total
      };
    },{customs:0, ii:0, total:0});

    return(
      <div className="space-y-4">
        <Card>
          <H3>🇧🇷 Import Taxes — CIT</H3>
          <div className="pcw-info-box" style={{background:"#fef2f2",borderColor:"#fecaca",color:"#991b1b",marginBottom:8}}>
            <strong>Import taxes are TRUE COSTS added to Landed COGS.</strong> These include Customs Charges, Import Tax (II), AFRMM, and Siscomex.
            Sales taxes (IPI, PIS, COFINS, ICMS) are in the Sales Taxes tab - they are charged to customers and are creditable.
          </div>
          <div className="text-xs" style={{color:"#64748b"}}>USD/BRL: <span className="pcw-mono font-bold">{fc(proj.rates.BRL,4)}</span></div>
        </Card>

        <Card>

          </div>
          
          <div className="mb-3">
            <L>AFRMM Rate (%)</L>
            <div className="flex items-center gap-2">
              <NumInput 
                className="pcw-input w-24 pcw-mono text-right" 
                value={proj.afrmmRate || 8} 
                onChange={v=>setProj(p=>({...p,afrmmRate:Math.max(0,Math.min(100,v))}))}
                min={0}
                max={100}
                isPercent
                title="AFRMM rate (typically 8% or 25%)"
              />
              <span className="text-xs" style={{color:"#64748b"}}>% (commonly 8% for renewal, 25% for additional services)</span>
            </div>
          </div>
          
          <div className="grid grid-cols-3 gap-3 mb-3">
            <div className="p-3 rounded-lg" style={{background:"#f8fafc",border:"1px solid #e2e8f0"}}>
              <div style={{fontSize:10,color:"#64748b",marginBottom:4}}>Applicable Freight (BRL)</div>
              <div className="pcw-mono font-bold" style={{fontSize:13,color:"#475569"}}>
                {fc(afrmm.applicableFreight)} BRL
              </div>

          <div className="rounded-lg border p-2 text-center" style={{background:"#eff6ff",borderColor:"#bfdbfe"}}>
            <div className="text-xs mb-0.5" style={{color:"#64748b"}}>Total Lead Time</div>
            <div className="pcw-mono font-bold text-2xl" style={{color:"#1e40af"}}>{totalDays}</div>
            <div className="text-xs" style={{color:"#94a3b8"}}>calendar days</div>
          </div>
          <div className="rounded-lg border p-2 text-center" style={{background:"#f0fdf4",borderColor:"#86efac"}}>
            <div className="text-xs mb-0.5" style={{color:"#64748b"}}>{proj.incoterm||"EXW"} Fulfilment</div>
            <div className="pcw-mono font-semibold text-sm" style={{color:"#166534"}}>{formatDate(fulfil)}</div>
          </div>
        </div>
        <table className="w-full text-sm mb-3">
        <thead><tr style={{background:"#f1f5f9",borderBottom:"1px solid #e2e8f0"}}>
          {["#","Phase","Days","Start","End","Timeline",""].map((h,i)=>(
            <th key={i} className={`px-3 py-2 text-left text-xs font-semibold ${i===5?"min-w-48":""}`} style={{color:"#475569"}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {schedCalc.map((ph,i)=>{
            const preDays=schedCalc.slice(0,i).reduce((s,p)=>s+(parseInt(p.days)||0),0);
            const off=totalDays>0?preDays/totalDays*100:0;
            const wid=totalDays>0?(parseInt(ph.days)||0)/totalDays*100:0;
            return(
              <tr key={ph.id} style={{borderBottom:"1px solid #f1f5f9"}}>
                <td className="px-3 py-2 text-xs pcw-mono" style={{color:"#94a3b8"}}>{i+1}</td>
                <td className="px-3 py-2"><input className="pcw-ci w-full" value={ph.name} onChange={e=>setSched(p=>({...p,phases:p.phases.map(x=>x.id===ph.id?{...x,name:e.target.value}:x)}))}/></td>
                <td className="px-3 py-2">
                  <NumInput className="pcw-ci pcw-mono w-16 text-right" value={ph.days} onChange={v=>setSched(p=>({...p,phases:p.phases.map(x=>x.id===ph.id?{...x,days:Math.round(v)}:x)}))}/>
                </td>
                <td className="px-3 py-2 text-xs pcw-mono" style={{color:"#475569"}}>{formatDate(ph.sDate)}</td>
                <td className="px-3 py-2 text-xs pcw-mono" style={{color:"#475569"}}>{formatDate(ph.eDate)}</td>
                <td className="px-3 py-2 min-w-48">
                  <div className="h-5 rounded-full overflow-hidden relative" style={{background:"#e2e8f0"}}>
                    {wid>0&&<div className="absolute h-full rounded-full" style={{left:`${off}%`,width:`${wid}%`,background:`hsl(${200+i*22},60%,52%)`}}/>}
                  </div>
                </td>
                <td className="px-3 py-2"><button onClick={()=>setSched(p=>({...p,phases:p.phases.filter(x=>x.id!==ph.id)}))} className="text-gray-300 hover:text-red-500 text-sm transition-colors">✕</button></td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <button onClick={()=>setSched(p=>({...p,phases:[...p.phases,{id:uid(),name:"New Phase",days:0}]}))} className="pcw-btn-secondary text-sm">+ Add Phase</button>
    </Card>
  </div>
  );

  /* ═══ Summary ════════════════════════════════════════════════════════════════ */
  const SummaryTab=()=>{
    // Calculate taxes separately for CIT
    let totalImportTax = 0;
    let totalSalesTax = 0;
    let totalTax = 0;
    
    if(isCIT) {
      // Calculate import taxes (Customs + II + AFRMM + Siscomex) and sales taxes separately using tree
      tree.forEach(item=>{
        const alloc = getAlloc(item);
        const cifSC = alloc.cif;
        const cifBRL = conv(cifSC, proj.sellCcy, "BRL", proj.rates);
        const tc = getBT(item.id);
        
        // Import taxes: Customs + II + AFRMM + Siscomex (all import-related costs in Landed COGS)
        const importTax = calcImportTax(cifBRL, item.customsCharges||proj.customsCharges||9, tc.ii||0);
        totalImportTax += conv(importTax.total, "BRL", proj.sellCcy, proj.rates) + alloc.siscomex + alloc.afrmm;
        
        // Sales taxes
        const sp = getItemSP(item);
        const spBRL = conv(sp, proj.sellCcy, "BRL", proj.rates);
        const salesTax = calcSalesTax(spBRL, tc);
        totalSalesTax += conv(salesTax.total, "BRL", proj.sellCcy, proj.rates);
      });
      totalTax = totalImportTax; // Only import taxes are costs
    } else {
      // Non-CIT: calculate tariffs normally
      totalTax = tree.reduce((s,n)=>s+n.totalCOGS*(n.tariff||0)/100,0);
    }
    
    const effGM=grand>0?(1-landedCOGS/grand)*100:0;
    const ebitda=effGM-(proj.sAndAExpense||0); // EBITDA % = Gross Margin % - S&A Expense %
    
    // Calculate grand total in USD equivalent for warning
    const grandUSD = conv(grand, proj.sellCcy, "USD", proj.rates);
    const needsSalesforce = grandUSD > 75000;

    const srcGroups={};
    items.filter(i=>i.type!=="heading").forEach(i=>{
      const w=conv(parseFloat(i.unitCost)||0,i.ccy||"USD",proj.sellCcy,proj.rates)*(parseFloat(i.qty)||1);
      if(!srcGroups[i.source]){srcGroups[i.source]={count:0,w:0};}
      srcGroups[i.source].count++;srcGroups[i.source].w+=w;
    });
    const totalW=Object.values(srcGroups).reduce((s,g)=>s+g.w,0);

    // Currency breakdown
    const ccyBreakdown = {};
    items.filter(i=>i.type!=="heading").forEach(i=>{
      const ccy = i.ccy || "USD";
      const value = (parseFloat(i.unitCost)||0) * (parseFloat(i.qty)||1);
      if(!ccyBreakdown[ccy]) ccyBreakdown[ccy] = {value:0, valueSC:0, count:0};
      ccyBreakdown[ccy].value += value;
      ccyBreakdown[ccy].valueSC += conv(value, ccy, proj.sellCcy, proj.rates);
      ccyBreakdown[ccy].count++;
    });

    // Margin analysis by confidence, supplier, and section
    const marginByConfidence = {"Very High":[], "High":[], "Medium":[], "Low":[], "Very Low":[]};
    const marginBySupplier = {};
    tree.forEach(n=>{
      const a = getAlloc(n);
      const sp = getItemSP(n);
      const margin = a.landed > 0 ? ((sp - a.landed) / sp * 100) : 0;
      const conf = getConfidence(n.source);
      if(marginByConfidence[conf]) {
        marginByConfidence[conf].push({item:n, margin, value:sp});
      }
      
      if(n.supplier) {
        if(!marginBySupplier[n.supplier]) marginBySupplier[n.supplier] = {items:0, totalMargin:0, totalValue:0};
        marginBySupplier[n.supplier].items++;
        marginBySupplier[n.supplier].totalMargin += margin;
        marginBySupplier[n.supplier].totalValue += sp;
      }
    });

    return(
      <div className="space-y-4">
        <div className="pcw-hero">
          <div>
            <div className="pcw-hero-meta">{proj.bu} · Rev {proj.rev}</div>
            <h2 className="pcw-hero-title">{proj.name||"Untitled Project"}</h2>
            <div className="pcw-hero-sub">{proj.ref||"—"} · {proj.customer.name||"No Customer"}{proj.customer.country?" · "+proj.customer.country:""}</div>
            <div className="flex flex-wrap gap-2 mt-3">
              <span className="pcw-pill">Incoterm: {proj.incoterm||"EXW"}</span>
              <span className="pcw-pill">Fulfilment: {fulfil}</span>
              <span className="pcw-pill">{totalDays}d lead time</span>
              <span className="pcw-pill">{items.filter(i=>i.type!=="heading").length} items</span>
              {isCIT&&<span className="pcw-pill" style={{background:"rgba(220,38,38,.3)"}}>🇧🇷 BR Tax</span>}
              <span className="pcw-pill font-semibold" style={{background:CONF_COLOR[autoConf]+"bb"}}>{CONF_LABEL[autoConf]} Confidence</span>
            </div>
          </div>
          <div className="text-right flex-shrink-0 ml-4">
            {isCIT ? (
              <>
                <div className="pcw-hero-meta">Sell Price</div>
                <div className="pcw-hero-total" style={{fontSize:28}}>{fc(grand)}</div>
                <div className="text-sm mt-1" style={{color:"#94a3b8"}}>{proj.sellCcy} (excl. sales taxes)</div>
                <div className="mt-3" style={{borderTop:"1px solid rgba(255,255,255,0.2)",paddingTop:12}}>
                  <div className="pcw-hero-meta">With Sales Taxes</div>
                  <div className="pcw-hero-total" style={{fontSize:28,color:"#a78bfa"}}>{fc(grandWithTax)}</div>
                  <div className="text-sm mt-1" style={{color:"#c4b5fd"}}>{proj.sellCcy} (customer pays)</div>
                </div>
              </>
            ) : (
              <>
                <div className="pcw-hero-meta">Grand Total</div>
                <div className="pcw-hero-total">{fc(grand)}</div>
                <div className="text-sm mt-1" style={{color:"#94a3b8"}}>{proj.sellCcy}</div>
              </>
            )}
          </div>
        </div>

        {needsSalesforce && (
          <div className="pcw-info-box" style={{background:"#fef2f2",borderColor:"#fecaca",color:"#991b1b"}}>
            <strong>⚠️ Salesforce Opportunity Required</strong> — Grand total exceeds $75,000 USD (currently {fc(grandUSD)} USD equivalent). Please create a Salesforce opportunity for this quote.
          </div>
        )}

        <div className={isCIT ? "grid grid-cols-5 gap-3" : "grid grid-cols-4 gap-3"}>
          {[
            {l:"Items COGS",      v:`${fc(topCOGS)} ${proj.sellCcy}`,    s:"Before landed costs"},
            {l:"Landed COGS",     v:`${fc(landedCOGS)} ${proj.sellCcy}`, s:"Inc. all duties & freight"},
            {l:"Items Sell Price",v:`${fc(itemsSP)} ${proj.sellCcy}`,    s:`GM items: ${fp((1-landedCOGS/itemsSP)*100)}`},
            {l:isCIT?"Sell Price":"Grand Total",     v:`${fc(grand)} ${proj.sellCcy}`,       s:`GM: ${fp(effGM)} | EBITDA: ${fp(ebitda)}`,accent:true},
            ...(isCIT ? [{l:"Sell Price (w/ Tax)", v:`${fc(grandWithTax)} ${proj.sellCcy}`, s:`+${fc(totalSalesTax)} sales tax`, accent:true, purple:true}] : []),
          ].map(s=>(
            <div key={s.l} className={`pcw-card ${s.accent?"pcw-kpi-dark":""}`}>
              <div className="pcw-stat-lbl">{s.l}</div>
              <div className="pcw-stat-val" style={s.purple?{color:"#a78bfa"}:s.accent?{color:"#fbbf24"}:{}}>{s.v}</div>
              <div className="pcw-stat-sub">{s.s}</div>
            </div>
          ))}
        </div>

        {/* EBITDA Explanation */}
        <div className="pcw-info-box" style={{background:"#f0fdf4",borderColor:"#bbf7d0",color:"#166534"}}>
          <strong>📊 EBITDA Calculation:</strong> Gross Margin ({fp(effGM)}) - S&A Expense ({fp(proj.sAndAExpense||0)}) = <strong>EBITDA {fp(ebitda)}</strong>
          <br/>
          <span style={{fontSize:11,color:"#15803d"}}>
            Expected profit margin after Sales & Administration expenses. Configure S&A % in Setup tab.
          </span>
        </div>

        <div className="grid grid-cols-2 gap-4">
          <Card>
            <div className="flex items-center justify-between mb-2">
              <H3>💱 Currency Breakdown</H3>
              <button
                onClick={()=>setShowCurrencyBreakdown(!showCurrencyBreakdown)}
                style={{background:"#f1f5f9",border:"none",color:"#64748b",fontSize:12,padding:"2px 8px",borderRadius:4,cursor:"pointer"}}
              >
                {showCurrencyBreakdown ? "▼" : "▶"}
              </button>
            </div>
            {showCurrencyBreakdown && (
              <div className="space-y-2">
                {Object.entries(ccyBreakdown).sort((a,b)=>b[1].valueSC - a[1].valueSC).map(([ccy, data])=>{
                  const pct = topCOGS > 0 ? (data.valueSC / topCOGS * 100) : 0;
                  return(
                    <div key={ccy} className="flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <div className="font-semibold text-sm" style={{color:"#1e293b",minWidth:40}}>{ccy}</div>
                        <div className="text-xs" style={{color:"#64748b"}}>{data.count} item{data.count!==1?"s":""}</div>
                      </div>
                      <div className="text-right">
                        <div className="pcw-mono text-xs font-semibold">{fc(data.value)} {ccy}</div>
                        <div className="text-xs" style={{color:"#64748b"}}>{fc(data.valueSC)} {proj.sellCcy} ({fp(pct)})</div>
                      </div>
                    </div>
                  );
                })}
                {Object.keys(ccyBreakdown).length === 0 && (
                  <div className="text-xs text-center py-4" style={{color:"#94a3b8"}}>No items yet</div>
                )}
              </div>
            )}
            {!showCurrencyBreakdown && (
              <div className="text-xs" style={{color:"#94a3b8"}}>
                {Object.keys(ccyBreakdown).length} {Object.keys(ccyBreakdown).length === 1 ? "currency" : "currencies"} • Click to expand
              </div>
            )}
          </Card>

          <Card>
            <div className="flex items-center justify-between mb-2">
              <H3>📊 Margin Analysis</H3>
              <button
                onClick={()=>setShowMarginAnalysis(!showMarginAnalysis)}
                style={{background:"#f1f5f9",border:"none",color:"#64748b",fontSize:12,padding:"2px 8px",borderRadius:4,cursor:"pointer"}}
              >
                {showMarginAnalysis ? "▼" : "▶"}
              </button>
            </div>
            {showMarginAnalysis && (
              <div className="space-y-3">
                <div>
                  <div className="text-xs font-semibold mb-1" style={{color:"#64748b"}}>By Confidence Level</div>
                  {[
                    {conf:'Very High', color:'#16a34a'},
                    {conf:'High', color:'#2563eb'},
                    {conf:'Medium', color:'#ca8a04'},
                    {conf:'Low', color:'#ea580c'},
                    {conf:'Very Low', color:'#dc2626'}
                  ].map(({conf, color})=>{
                    const items = marginByConfidence[conf] || [];
                    if(items.length === 0) return null;
                    const avgMargin = items.reduce((s,i)=>s+i.margin,0) / items.length;
                    const totalValue = items.reduce((s,i)=>s+i.value,0);
                    return(
                      <div key={conf} className="flex items-center justify-between py-1">
                        <div className="flex items-center gap-2">
                          <div className="w-2 h-2 rounded-full" style={{background:color}}/>
                          <span className="text-xs">{conf}</span>
                        </div>
                        <div className="text-right">
                          <span className="pcw-mono text-xs font-semibold">{fp(avgMargin)} avg</span>
                          <span className="text-xs ml-2" style={{color:"#64748b"}}>({items.length} items, {fc(totalValue)})</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
                
                {Object.keys(marginBySupplier).length > 0 && (
                  <div>
                    <div className="text-xs font-semibold mb-1" style={{color:"#64748b"}}>Top Suppliers by Value</div>
                    {Object.entries(marginBySupplier)
                      .sort((a,b)=>b[1].totalValue - a[1].totalValue)
                      .slice(0,3)
                      .map(([supplier, data])=>(
                        <div key={supplier} className="flex items-center justify-between py-1">
                          <span className="text-xs truncate" style={{maxWidth:120}}>{supplier}</span>
                          <div className="text-right">
                            <span className="pcw-mono text-xs font-semibold">{fp(data.totalMargin/data.items)} avg</span>
                            <span className="text-xs ml-2" style={{color:"#64748b"}}>({data.items} items)</span>
                          </div>
                        </div>
                      ))}
                  </div>
                )}
              </div>
            )}
            {!showMarginAnalysis && (
              <div className="text-xs" style={{color:"#94a3b8"}}>
                {tree.length} items analyzed • Click to expand
              </div>
            )}
          </Card>
        </div>

        <div className="pcw-grid-2 gap-4">
          <Card>
            <H3>Price Build-Up</H3>
            {(() => {
              // Calculate total discounts from items
              const totalDiscount = tree.reduce((sum, item) => {
                const sp = getItemSP(item);
                const discountAmount = sp * (item.qty || 1) * ((item.discount || 0) / 100);
                return sum + discountAmount;
              }, 0);
              
              const baseGrand = isCIT ? grandWithTax : grand;
              
              return [
                {l:"Items COGS",               v:topCOGS,                            c:"#6366f1"},
                {l:"Inbound Freight",           v:totalInbFrt,                        c:"#8b5cf6"},
                ...(isCIT ? [
                  {l:"🇧🇷 Import Costs (in Landed)",v:totalImportTax,                c:"#f59e0b"},
                ] : [
                  {l:"Import Taxes / Tariffs",    v:totalTax,                         c:"#f59e0b"},
                ]),
                {l:"Items Margin & Contingency",v:Math.max(0,itemsSP-landedCOGS),    c:"#22c55e"},
                ...(totalDiscount > 0 ? [
                  {l:"💸 Item Discounts",         v:-totalDiscount,                   c:"#ef4444", isDiscount:true},
                ] : []),
                {l:"Outbound Freight (Sell)",   v:totalOutSP,                         c:"#14b8a6"},
                ...(isCIT ? [
                  {l:"💰 Sales Taxes (creditable)",v:totalSalesTax,                   c:"#a78bfa"},
                ] : []),
              ].map(r=>{
                const pct=baseGrand>0?Math.max(0,Math.abs(r.v)/baseGrand*100):0;
                return(
                  <div key={r.l} className="mb-3">
                    <div className="flex justify-between text-xs mb-1">
                      <span style={{color:"#475569"}}>{r.l}</span>
                      <span className="pcw-mono">
                        {r.isDiscount && <span style={{color:"#ef4444"}}>-</span>}
                        {fc(Math.abs(r.v))} <span style={{color:"#94a3b8"}}>({pct.toFixed(1)}%)</span>
                      </span>
                    </div>
                    <div className="h-2 rounded-full" style={{background:"#f1f5f9"}}>
                      <div className="h-full rounded-full" style={{width:`${pct}%`,background:r.c,transition:"width .5s ease"}}/>
                    </div>
                  </div>
                );
              });
            })()}
            {isCIT && (
              <div className="mt-3 p-2 rounded" style={{background:"#f0fdf4",border:"1px solid #bbf7d0"}}>
                <div className="text-xs" style={{color:"#166534"}}>
                  <strong>💡 Import Costs:</strong> Includes Customs Charges, Import Tax (II), AFRMM, and Siscomex - all added to Landed COGS.
                  <br/>
                  <strong>💡 Sales Taxes:</strong> Charged to customer, creditable (recoverable). NOT included in your Landed COGS.
                </div>
              </div>
            )}
          </Card>
          <Card>
            <H3>Project Details</H3>
            {[["BU",proj.bu],["Customer",proj.customer.name||"—"],["Country",proj.customer.country||"—"],["Quote Ref",`${proj.ref||"—"} Rev ${proj.rev}`],["Selling Ccy",proj.sellCcy],["Dealer/Agent",fp(proj.defaultDealer)],["Incoterm",proj.incoterm||"EXW"],["Payment Terms",proj.paymentTerms||"—"],["Start",formatDate(sched.start)],["Lead Time",`${totalDays} days`],["Fulfilment",formatDate(fulfil)]].map(([k,v])=>(
              <div key={k} className="flex justify-between text-xs py-1 border-b" style={{borderColor:"#f8fafc"}}>
                <span style={{color:"#64748b"}}>{k}</span><span className="font-medium" style={{color:"#1e293b"}}>{v}</span>
              </div>
            ))}
          </Card>
        </div>

        <Card>
          <H3>Auto-Confidence from Source Values</H3>
          <div className="flex items-center gap-4 mb-3">
            <div className="flex flex-1 gap-1">
              {[1,2,3,4,5].map(v=>(
                <div key={v} className="flex-1 h-3 rounded-full" style={{background:v<=autoConf?CONF_COLOR[v]:"#e2e8f0",transition:"background .3s"}}/>
              ))}
            </div>
            <span className="text-sm font-semibold text-white px-3 py-1 rounded-full whitespace-nowrap" style={{background:CONF_COLOR[autoConf]}}>{CONF_LABEL[autoConf]}</span>
          </div>
          <p className="text-xs mb-2" style={{color:"#94a3b8"}}>COGS-weighted average: Actuals=5 · Quotation/Pricelist=4 · Estimate=3 · Budget=2 · Assumption=1</p>
          {Object.keys(srcGroups).length>0&&(
            <div className="flex flex-wrap gap-2">
              {Object.entries(srcGroups).sort((a,b)=>b[1].w-a[1].w).map(([src,g])=>(
                <div key={src} className="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full border" style={{background:"#f8fafc",borderColor:"#e2e8f0"}}>
                  <span className="w-2 h-2 rounded-full" style={{background:CONF_COLOR[SOURCE_SCORE[src]||3]}}/>
                  <span style={{fontWeight:600}}>{src}</span>
                  <span style={{color:"#64748b"}}>{g.count} item{g.count>1?"s":""} · {fp(totalW>0?g.w/totalW*100:0)} of value</span>
                </div>
              ))}
            </div>
          )}
        </Card>

        <div className="flex justify-end gap-2">
          <button className="pcw-btn-secondary" onClick={exportPDF}>📄 Export Complete PDF</button>
          <button className="pcw-btn-primary" onClick={exportCSV}>⬇ Export Pricing CSV</button>
        </div>
      </div>
    );
  };

  /* ── Tabs ── */
  const TABS=[
    {id:"setup",   label:`⚙ ${t('setup')}`},
    {id:"costing", label:`📋 ${t('costing')}`},
    {id:"freight", label:`🚢 ${t('freight')}`},
    ...(isCIT?[
      {id:"brazilImport",label:`🇧🇷 Import Taxes`,br:true},
      {id:"brazilSales",label:`💰 Sales Taxes`,br:true}
    ]:[]),
    {id:"schedule",label:`📅 ${t('schedule')}`},
    {id:"summary", label:`📊 ${t('summary')}`},
  ];
  useEffect(()=>{
    if((tab==="brazilImport"||tab==="brazilSales"||tab==="brazil")&&!isCIT) setTab("freight");
  },[isCIT,tab]);
  
  // Set default currency based on BU
  useEffect(()=>{
    const buCcy = {CIW:"USD",ECL:"EUR",CIT:"BRL",CIA:"ARS"};
    const newCcy = buCcy[proj.bu] || "USD";
    if(proj.sellCcy !== newCcy) {
      setProj(p=>({...p,sellCcy:newCcy}));
    }
  },[proj.bu]); // Only run when BU changes

  // Undo/Redo functions
  const saveToHistory = useCallback(() => {
    const snapshot = { items: JSON.parse(JSON.stringify(items)), proj: {...proj}, frt: {...frt} };
    setHistory(prev => {
      const newHistory = prev.slice(0, historyIndex + 1);
      newHistory.push(snapshot);
      if (newHistory.length > 20) newHistory.shift(); // Keep last 20
      else setHistoryIndex(i => i + 1);
      return newHistory;
    });
  }, [items, proj, frt, historyIndex]);

  // Save to history when items change (debounced)
  useEffect(() => {
    if (isFirstLoad.current) return;
    const timeout = setTimeout(() => {
      saveToHistory();
    }, 500);
    return () => clearTimeout(timeout);
  }, [items, proj, frt]);

  const undo = useCallback(() => {
    if (historyIndex > 0) {
      const snapshot = history[historyIndex - 1];
      setItems(snapshot.items);

                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Tab</kbd><span>Next Cell →</span>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Shift+Tab</kbd><span>Prev Cell ←</span>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Enter</kbd><span>Cell Below ↓</span>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Shift+Enter</kbd><span>Cell Above ↑</span>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Esc</kbd><span>Exit Cell</span>
                  <div style={{gridColumn:"1/-1",height:1,background:"#334155",margin:"4px 0"}}></div>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+S</kbd><span>Save</span>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+N</kbd><span>New Item</span>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+F</kbd><span>Search</span>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+Z</kbd><span>Undo</span>
                  <kbd style={{background:"#334155",padding:"1px 4px",borderRadius:3}}>Ctrl+Y</kbd><span>Redo</span>
                </div>
                {historyIndex >= 0 && (
                  <div className="mt-2 text-xs" style={{color:"#64748b"}}>
                    📜 History: {historyIndex + 1}/{history.length}
                  </div>
                )}
              </div>
            ) : (
              <button
                onClick={()=>setShowShortcuts(true)}
                style={{
                  background:"#1e293b",
                  color:"#cbd5e1",
                  border:"none",
                  borderRadius:8,
                  padding:"8px 12px",
                  fontSize:11,
                  cursor:"pointer",
                  boxShadow:"0 4px 12px rgba(0,0,0,.3)",
                  fontWeight:600,
                  display:"flex",
                  alignItems:"center",
                  gap:6
                }}
                title="Show keyboard shortcuts"
              >
                ⌨️ Shortcuts
              </button>
            )}
          </div>
        )}
      </div>
    </>
  );
}
